const RAW = "# Weight Agnostic Neural Networks（重みを学習しなくても動くネットワーク）\n\n- arXiv: https://arxiv.org/abs/1906.04358\n- 一次ソース: ../papers/arXiv-1906.04358v2/\n- 正規ノート: ../notes/arXiv-1906.04358v2.md\n\n---\n\n## 一言で言うと\n\n「重みの数字をいっさい学習しなくても、形（つなぎ方）だけで仕事をこなせるニューラルネットワーク」を見つけ出す方法を作った論文だよ。\n\n## どんな問題を解こうとしてるの？\n\nまず前提から。**ニューラルネットワーク**（脳の神経細胞をマネしてコンピュータの中に作る計算装置。「入力を受け取って何かの答えを出す機械」だと思ってOK）には、ふつう次の 2 つの要素があるよ。\n\n1. **形（アーキテクチャ）**: どの計算ノードとどの計算ノードを線でつなぐかの図。\n2. **重み**: 線ごとに「どのくらいの強さで信号を流すか」を決める数字。\n\nふつうの機械学習では、形は人間が決めて、重みは **学習**（たくさんのデータを見せて、答えが合うように数字を少しずつ調整する作業）で決める。だから「動くネットワーク」を作るには大量の計算が必要なんだ。\n\nでも著者はこんなことを思った。\n\n- 生まれたばかりの動物（カモの子・カメ・トカゲ）は、教えられなくても泳いだり、敵から逃げたりできる。学習する前から、体の作り自体に「やり方」が組み込まれている。\n- だったら、ニューラルネットワークも「形だけで仕事ができる」ものが作れるんじゃない？\n\n困りごとを身近な例えで言うと、たとえばハサミは「形」だけで紙を切れる。使い方を学習する必要はなくて、刃が交差する構造そのものが「切る」という機能を持っているよね。ニューラルネットも、そういう「形そのものに機能が入っている」ものを作れないか、というのがこの研究のテーマ。\n\n### これまでのやり方の何が足りなかったか\n- **NAS**（Neural Architecture Search、ニューラルアーキテクチャ探索 ← 形を自動で探すやり方）はあったけれど、これは「学習させたあとに良い形」を探すだけで、学習なしで動くかは見ていなかった。\n- 「アーキテクチャ自体がどれだけ問題を解く力を持っているか」を直接調べる研究がなかった。\n\n## どうやって解いたの？\n\n### コアアイデア\n\nふつうのネットワークは、線ごとに違う重み（線 1 番は 0.3、線 2 番は -1.5、…）を持っている。これを学習で決める。\n\n著者の発想はめちゃくちゃシンプル。**全部の線の重みを、たった 1 個の同じ数にしてしまう**。たとえば全部 +1 にしたり、全部 -2 にしたり。そのうえで、「いろんな数字を入れても、それなりに動く形」を探すんだ。\n\n例え話：オーケストラを想像してみて。ふつうは指揮者がバイオリン・トランペット・太鼓に「君はこの音量、君はこの音量」と細かく指示する（＝重みを学習する）。この論文では「全員、同じ音量で演奏してね」と指示しちゃう。それでも美しいメロディが鳴るような楽器配置（＝アーキテクチャ）を探す、という発想。\n\n### 仕組み\n\n- **step1（最小ネットから出発）**: 隠れノードなし、入力と出力をちょっとだけ結んだスカスカのネットワークをたくさん用意する。\n- **step2（共有重みでテスト）**: 1 つのネットワークに対して、共有重みの値を順に $-2, -1, -0.5, +0.5, +1, +2$ と差し替えながら、それぞれでタスクを実行してスコアを記録する。\n- **step3（3 つの観点で評価）**: 「平均スコア」「最高スコア」「線の本数の少なさ」の 3 つで順位を決める（線が少なくてシンプルな方が良いとする）。\n- **step4（形を少し変える）**: 上位のネットワークを選んで、形を 3 種類の変え方で少しいじって次の世代を作る。\n  - **ノードを追加**: 既存の線を 2 本に分けて、その間に新しい計算ノードを差し込む。\n  - **線を追加**: まだつながっていないノード同士を結ぶ。\n  - **計算の種類を変える**: あるノードの「働き方」を別の働き方に差し替える。\n- **step5（繰り返し）**: step2 に戻る。世代を重ねるごとに、共有重みでもちゃんと動く形が見つかっていく。\n\nノードの「働き方」（**活性化関数** ← 入力された数を、別の数に変えて次に渡すルール）には 10 種類を用意：linear（そのまま）、step（しきい値で 0 か 1）、sin（波）、cosine（波）、Gaussian（山型）、tanh、sigmoid（S 字）、abs（絶対値）、invert（マイナスにする）、ReLU（マイナスは 0、プラスはそのまま）。種類が多いほど、形だけで色んな関係を表現できるからだそうだよ。\n\n### 主要な数式\n\n論文には「ガッツリした数式」はあまり出てこないけれど、考え方の核を 3 つ式で書くとこうなる。\n\n#### ① 共有重みでのノードの計算\n\n$$ y = f\\bigl(w \\cdot (x_1 + x_2 + \\cdots + x_n)\\bigr) $$\n\n**この式が言ってること**: あるノードが受け取った入力 $x_1, x_2, \\ldots$ をぜんぶ足してから、同じ数 $w$ をかけて、最後に活性化関数 $f$ を通して次に渡している、ということだよ。線ごとに別の重みを使う代わりに、**たった 1 個の $w$ を全部の線で使い回している**のがポイント。\n\n**記号の意味**:\n- $x_1, x_2, \\ldots, x_n$ … そのノードに入ってくる入力の数。たとえば「カートの位置」「ポールの角度」みたいな情報。\n- $w$ … 全部の線で共通の「重み」の値（この論文では $-2, -1, -0.5, +0.5, +1, +2$ のどれか 1 つ）。\n- $f$ … 活性化関数（受け取った数を、波の形や山の形などに変身させてから次に渡すルール）。\n- $y$ … このノードから次のノードへ送り出される数。\n\n**身近な例え**: 学校のテストで、先生が「全科目で『3 点プラス』のげた履かせを全員に同じだけする」と決めるイメージ。ふつうは「国語は 5 点プラス、数学は 2 点プラス」みたいに科目ごとに違うけれど、ここでは全部に同じ数字を使う。それでも順位がちゃんと出るような問題の作り方（＝形の作り方）を探している、という感じ。\n\n#### ② 平均スコア（mean performance）\n\n$$ \\text{mean perf} = \\frac{R(-2) + R(-1) + R(-0.5) + R(+0.5) + R(+1) + R(+2)}{6} $$\n\n**この式が言ってること**: 6 種類の共有重み値それぞれで、ネットワークを実行してスコア（ごほうび）を測り、その 6 個の平均をそのネットワークの「平均スコア」と呼ぶ、というだけ。**いろんな重み値でそれなりに動く形ほど良い形**、という考え方を計算で表している。\n\n**記号の意味**:\n- $R(w)$ … 共有重みを $w$ に設定したときに、ネットワークがゲームをプレイして得たごほうび（スコア）。\n- $-2, -1, -0.5, +0.5, +1, +2$ … 試す 6 個の重み値（論文で固定）。重み 0 だと信号が流れない、3 以上だと飽和するので除外。\n- $6$ … 試した重み値の個数。\n\n**身近な例え**: テスト勉強で「先生が違う 6 人いて、それぞれ採点の厳しさが違う」場合に、6 人全員にテストを採点してもらって平均点を出す感じ。1 人の先生にだけ気に入られるのではなく、**どの先生が来てもそこそこ点を取れる答案**（＝形）が選ばれる。\n\n#### ③ 多目的ランキング（順位の決め方）\n\n$$ \\text{ランキング} = \\begin{cases} \\{\\text{平均スコア},\\ \\text{線の本数の少なさ}\\} & 80\\%\\text{の場合} \\\\ \\{\\text{平均スコア},\\ \\text{最高スコア}\\} & 20\\%\\text{の場合} \\end{cases} $$\n\n**この式が言ってること**: ネットワークの良さを決めるとき、80% の確率で「平均点が高く、線が少ない」を重視し、20% の確率で「平均点が高く、最高点も高い」を重視する、という二段構えのルール。線を少なくする方ばかり強調しすぎると、いったん線が増えてからじゃないと性能が伸びない形を見逃してしまうから、たまに線の少なさを無視して「とりあえず性能高めを残す」枠を作っている。\n\n**記号の意味**:\n- 平均スコア … ②の式で計算した平均点。\n- 線の本数の少なさ … 接続（線）が少ないほど良い、という指標。シンプルさ重視。\n- 最高スコア … 6 個の重み値の中で一番高かったスコア。\n- $80\\%, 20\\%$ … この 2 つのルールを使う確率の割合。\n\n**身近な例え**: クラスで「優秀者」を選ぶとき、ほとんどは「平均点が高い人＆ノートがコンパクトな人」を選ぶけど、5 回に 1 回くらいは「平均点が高い人＆得意科目で満点取れる人」も選ぶ、というイメージ。両方の基準で人を残しておくと、後で大化けする生徒を見落としにくい。\n\n## 何がすごいの？\n\n### 連続制御タスク（Table 1、100 回の平均）\n\nロボットを操縦するような問題 3 つで実験。「Random Shared Weight」は共有重みをランダムな値にしたときの成績、「Tuned Shared Weight」は 6 個から一番良い値を選んだとき、「Tuned Weights」は線ごとに別々の重みをちゃんと学習したとき。\n\n- **CartPoleSwingUp**（カートに乗ったポールを下から振り上げて立てる課題）\n  - WANN: 共有ランダム **515 ± 58**、共有最適 **723 ± 16**、線ごと学習 **932 ± 6**\n  - 人間が作った固定の形: 共有ランダムだと **7 ± 2** しか取れない\n  - → 共有ランダム重みでも、WANN の形なら 500 点以上取れる。\n- **BipedalWalker-v2**（二足歩行のロボットを進める課題）\n  - WANN: 共有ランダム **51 ± 108**、共有最適 **261 ± 58**、線ごと学習 **332 ± 1**\n  - WANN は **210 本** の線で動く。比較対象の SOTA（state-of-the-art、これまでの最高記録）は **2804 本** の線が必要。**約 13 分の 1** の線で動かせた。\n- **CarRacing-v0**（画面のピクセルを見ながら車を運転する課題）\n  - WANN: 共有ランダム **375 ± 177**、共有最適 **608 ± 161**、線ごと学習 **893 ± 74**\n  - SOTA（World Models）は **906 ± 21**、ただし RNN（時間情報を覚える仕組み）を使っている。WANN は時間記憶なしのシンプルな前向きネットだけで肉薄。\n\n### 画像分類（MNIST）\n\n**MNIST**（0〜9 の手書き数字を 28×28 ピクセルで集めたデータセット。機械学習の定番テスト問題）でもテスト。\n\n- 16×16 にダウンサンプル、入力 256・出力 10、線は **1849 本**。\n- 共有重み 1 個のままで、**約 92%** の正解率（イントロより。「higher than chance」＝でたらめより遥かに高い）。これは何千個もの重みを学習した 1 層のニューラルネットと同じくらい。\n- さらに、同じネットを違う共有重み値で複数動かして多数決させる「**アンサンブル**」（複数モデルの予測を合わせて答えを決める手法）にすると、ランダム重みより大幅に良くなる。\n\n### 著者が「貢献」として挙げているもの\n\n1. 重みを学習しなくてもタスクを解けるネットワーク（WANN）という概念を示した。\n2. NEAT（neuroevolution、形を進化させる古典手法）を「平均性能・最高性能・接続数」の 3 目的に拡張した探索アルゴリズムを作った。\n3. RL と MNIST の両方で示し、ネット図ごと公開して「中で何が起きているか」を解釈可能にした。\n4. コードとインタラクティブ記事で再現性を担保した。\n\n## キーワード辞典\n\n- **ニューラルネットワーク** … 入力を受け取って答えを出す、人工の脳もどき。ノードを線でつないだ図で表す。\n- **アーキテクチャ（形・トポロジー）** … ノードと線のつなぎ方の設計図。\n- **重み** … 線ごとの「信号を強くする/弱くする数」。ふつうは学習で決める。\n- **共有重み（shared weight）** … 全部の線で同じ数字を使うこと。この論文の核。\n- **活性化関数** … ノードが受け取った数を別の数に変えるルール（波・山・S 字 など）。\n- **NEAT** … ニューラルネットの形を進化させる古典アルゴリズム。WANN はこれを元にして重み学習を取り除いた。\n- **NAS（Neural Architecture Search）** … ネットワークの形を自動で探す研究分野。WANN とは違って、ふつう学習後の性能を見る。\n- **NSGA-II** … 複数の評価基準を同時に考えて順位をつけるアルゴリズム。WANN の 3 目的ランキングに使われている。\n- **トーナメント選択** … 何匹かランダムに選んで一番強いやつを親にする、進化計算の選び方。\n- **RL（強化学習）** … ゲームのスコアのような「ごほうび」を最大にするように行動を学ぶ枠組み。\n- **MNIST** … 手書き数字 0〜9 を集めた定番データセット。\n- **VAE（Variational AutoEncoder、変分オートエンコーダ）** … 画像を少ない数字（ここでは 16 個）に圧縮する仕組み。CarRacing で画像処理担当として使われる。\n- **アンサンブル** … 複数の予測を合わせて答えを出す方法。多数決とか平均とか。\n- **SOTA（state-of-the-art）** … その時点で一番良い記録、最強モデル。\n- **MDL（最小記述長）** … 「同じくらいの性能ならシンプルな方が良い」という考え方。WANN の「線が少ない方を優遇」のもと。\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **なぜ共有重み 1 個でも動くの？**: WANN は「線の重みの大きさ」ではなく「信号同士の関係」（足し算・引き算・対称性・反転）を形でエンコードしている。たとえば CartPoleSwingUp の解では、「カートの位置 $x$ をマイナスに反転」→「中心に引き寄せる力を作る」、「ポールの角速度 $d\\theta$ に Gaussian 活性化を当てる」→「動かないときだけ強い力を出す」、という構造が見える（generation 32 の図で確認できる）。\n- **個別ランダム重みだと壊れる**: WANN は共有重みなら良いが、線ごとに重みをランダムにすると CartPoleSwingUp で 57 ± 121 まで落ちる。つまり「重み同士の符号や一貫性」を前提にしている。タイトルだけ見ると完全に重みフリーに見えるが、正確には「**全部同じ 1 個の数なら何でも OK**」。\n- **重みの値の選び方**: $|w| > 3$ だと活性化関数（sigmoid, tanh など）が飽和して挙動が単調になる。$w \\approx 0$ だと信号が流れない。なので $[-2, 2]$ の範囲が「形の違いが性能差として現れる」スイートスポットになっている。\n- **20% の最高性能ランキング**: いきなりノードを 1 個足しただけだと性能が下がる場面でも、2〜3 個続けて足すと性能が伸びる「stepping stone（飛び石）」がある。線の少なさだけで毎回切り捨てると、その飛び石が消えてしまう。だからときどき「最高点」基準でも生き残らせる。\n- **論文中の率直な限界**: 著者自身が Discussion で「**CNN（画像処理に特化したネットワーク）に勝てたら逆に恥ずかしいくらいだ**」と書いている。CNN は何十年もかけて手で磨き上げられた構造で、WANN みたいに既存パーツを組み替えるだけでは追いつかない。新しい building block を発明することが本当の進歩、と著者は結んでいる。\n- **MNIST の数値が緩い**: 連続制御は Table 1 で明確な数値があるが、MNIST 側は本文では「higher than chance ~92%」と Figure 頼り。きっちりした SOTA 比較表は本文にない。\n- **計算コストはタダじゃない**: ハイパラを見ると MNIST で集団サイズ 960 × 4096 世代と、かなり重い探索をしている。「重み学習を省いた分が世代数の増加で相殺されているかどうか」は本文では公平比較されていない（正規ノートの Critical Thoughts でも指摘されているとおり）。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-1906.04358v2/`\n- 正規ノート: `notes/arXiv-1906.04358v2.md`\n";

  // スクロール位置を sessionStorage で保つ（--watch 時の auto refresh 対策）
  const key = 'scroll:' + location.pathname;
  const saved = sessionStorage.getItem(key);
  if (saved) window.scrollTo(0, parseInt(saved));
  window.addEventListener('scroll', () => sessionStorage.setItem(key, String(window.scrollY)));
});
</script>
</body>
</html>
