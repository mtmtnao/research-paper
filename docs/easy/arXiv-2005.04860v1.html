const RAW = "# Skyrmion confinement and dynamics in tracks patterned with magnetic anisotropy: theory and simulations（異方性パターンで作ったスカーミオン・トラックの壁力モデル）\n\n- arXiv: https://arxiv.org/abs/2005.04860\n- 一次ソース: ../papers/arXiv-2005.04860v1/\n- 正規ノート: ../notes/arXiv-2005.04860v1.md\n\n---\n\n## 一言で言うと\n\n磁気異方性エネルギーを場所ごとに変えて作ったスカーミオン用トラックについて、トラック外側の高異方性領域、すなわち anisotropy-wall、がスカーミオンを押し返す力を Thiele 方程式と剛体スカーミオン形状から導く論文。著者は、導出した壁力の式 (3) が MuMax3 による micromagnetic simulations とよく一致し、力はスカーミオンの変形ではなく magnetic-anisotropy undulation によるポテンシャル差から生じる、と主張している。\n\n## 何を議論する論文か\n\n- **問題設定**: スカーミオンを情報担体として回路やデバイスに使うには、スカーミオンの運動を案内する tracks が必要である。物理的に磁性膜を削った tracks では、demagnetizing field によって角に potential pockets ができる一方、magnetic-anisotropy energy の差で作った tracks は Abstract の表現では \"well-paved without a potential pocket\" とされる。この論文は、その track の wall と skyrmion の間に働く力を同定する。\n- **対象範囲 / 仮定**: 対象は magnetic thin films 中の magnetic skyrmion で、理論では skyrmion number $q=1$、helicity $\\gamma_{\\mathrm{helicity}}=0$ または $\\pi$ の Néel skyrmions を扱う。isolated skyrmions が運動中および力を受けている間も、半径 $R$、domain wall width $w$、centrosymmetric structures で記述される形を変えない、という剛体形状仮定を置く。\n- **既存研究との差分**: 先行研究として、magnetic-anisotropy energy でパターンした tracks と、外部電場による制御が挙げられている。これらは Brownian computation を見据え、thermal energy が tracks 内の skyrmions を駆動できること、また demagnetization fields の obstructive effects が小さいことを示してきた。本論文の差分は、そうした anisotropy-patterned tracks での skyrmion confinement と dynamics を、wall force の解析式と micromagnetic simulations で結びつける点にある。\n- **この論文で答えたい問い**: magnetic anisotropy が $K_-$ の wall と $K_+$ の track、ただし $K_- > K_+$、の境界近くで、skyrmion は位置 $X$、半径 $R$、幅 $w$ に応じてどのような反発力を受けるのか。その力は剛体形状に基づくポテンシャル勾配で説明できるのか。\n\n## 背景と前提\n\n- magnetic skyrmion は、二次元 magnetic thin film 内の localized spin configuration として説明される。Abstract では skyrmion の半径は典型的に 10-100 nm とされ、small size、topological stability、low critical current により memory や novel-device 用途の候補と位置づけられている。\n- この論文での track は、磁性膜の物理的な幅を削って作る道ではなく、magnetic anisotropy energy の差によって作る道である。Fig. 1 では shadowed region が $K_-$、track が $K_+$ とされ、$K_- > K_+$ なので skyrmion は track 内で低エネルギーになる。\n- magnetic anisotropy は、局所的な磁化ベクトルが膜に垂直な向きからどれだけ倒れているかにエネルギー罰を与える係数として式 (2) に現れる。スカーミオンの domain wall 部分では $n_z$ が大きく変化するため、anisotropy の空間ジャンプと重なるとポテンシャルが変化する。\n- Thiele equation は、skyrmion を粒子のような collective coordinate $\\mathbf{X}$ で表し、damping、Magnus force、外力の釣り合いとして運動を扱う枠組みである。この論文では、wall force の評価だけでなく、simulation から力を読み取るときにも Magnus force $\\mathbf{G}\\times\\mathbf{v}$ が使われる。\n- baseline というより比較対象は、式 (3) から得た theoretical force と MuMax3 の micromagnetic simulations である。Fig. 2 では theory が solid curves、simulation が dots と diamonds として比較される。\n\n## 提案手法\n\n### コアアイデア\n\nスカーミオン中心を $\\mathbf{X}$、wall-track 境界に垂直な相対位置を $X$ とし、位置依存の磁気異方性 $K(\\mathbf{r})$ によるポテンシャル $U(\\mathbf{X})$ を面積積分で書く。$K_- > K_+$ なので、skyrmion が高異方性側の anisotropy-wall に近づくと、式 (2) のエネルギーが増える。著者は、skyrmion の形を式 (4)(5) の $R$ と $w$ で決まる centrosymmetric な剛体として固定し、このエネルギーを $X$ で微分することで wall force の式 (3) を得る。\n\nこの手法の要点は、wall との相互作用を「衝突による変形」としてではなく、「位置依存の magnetic-anisotropy energy coefficient と skyrmion の磁化分布の重なり」として扱うことにある。Discussion では、力のピークは skyrmion の radius 付近にあり、これは transition part of the magnetization、すなわち domain wall、が $X=0$ の potential jump と重なるためだと説明されている。\n\n### 重要な定義・数式\n\n$$\n0 = -\\alpha \\mathbf{D}\\dot{\\mathbf{X}} + \\mathbf{G}\\times\\dot{\\mathbf{X}} + \\mathbf{F}\n$$\n\n**式の意味**: Results の式 (1) に対応する Thiele equation で、skyrmion の定常的な集団座標運動を、damping、Magnus 項、外力の釣り合いとして表す。速度項は Fig. 2 caption の $\\mathbf{G}\\times\\mathbf{v}$ に対応する。\n\n**記号の定義**:\n- $\\alpha$ ... damping constant。\n- $\\mathbf{D}$ ... dissipation dyadic。本文では skyrmion の形、すなわち $R/w$ に依存するとされる。\n- $\\mathbf{G}$ ... gyrocoupling vector。本文では skyrmion number $q$ に比例するとされる。\n- $\\mathbf{X}$ ... skyrmion の coordinate。\n- $\\dot{\\mathbf{X}}$ ... skyrmion の速度。Fig. 2 caption では $\\mathbf{v}$ と書かれる。\n- $\\mathbf{F}$ ... potential に由来する external force。\n\n**この論文での役割**: wall からの反発力、anisotropy gradient による駆動力、有限速度に伴う Magnus force を同じ運動方程式の中で扱うための出発点である。Fig. 2 の dots は $F_{\\mathrm{wall}}$ と $\\mathbf{G}\\times\\mathbf{v}$ の釣り合いから力を見積もる。\n\n$$\nU(\\mathbf{X}) = \\iint d^2\\mathbf{r}\\,K(\\mathbf{r})\\left(1-n_z^2(\\mathbf{r};\\mathbf{X})\\right)\n$$\n\n**式の意味**: Results の式 (2) に対応し、inhomogeneous magnetic anisotropy を持つ媒質中で、位置 $\\mathbf{X}$ にある skyrmion のポテンシャルエネルギーを定義する。$K(\\mathbf{r})$ が場所に依存するため、skyrmion を壁に近づけると積分値が変わる。\n\n**記号の定義**:\n- $U(\\mathbf{X})$ ... skyrmion が位置 $\\mathbf{X}$ にあるときの potential energy。\n- $\\mathbf{r}$ ... 膜面内の位置。\n- $K(\\mathbf{r})$ ... position-dependent magnetic anisotropy energy coefficient。\n- $n_z(\\mathbf{r};\\mathbf{X})$ ... 位置 $\\mathbf{X}$ に skyrmion があるときの magnetic vector field の $z$ 方向 cosine。\n- $1-n_z^2$ ... 磁化が $z$ 軸から倒れている成分に対応する項。\n\n**この論文での役割**: anisotropy-wall からの静的な力を \"minus the gradient of the potential energy\" として扱うための中心的な定義である。式 (3) は、この $U(\\mathbf{X})$ を剛体 skyrmion 形状のもとで $X$ 微分して得る。\n\n$$\n(F_{\\mathrm{wall}})_x\n= (K_- - K_+)\\int_{-\\infty}^{\\infty}dy\\,\n\\frac{\n4\\sinh^2(R/w)\\sinh^2\\left(\\sqrt{X^2+y^2}/w\\right)\n}{\n\\left[\n\\sinh^2(R/w)+\\sinh^2\\left(\\sqrt{X^2+y^2}/w\\right)\n\\right]^2\n}\n$$\n\n**式の意味**: Results の式 (3) に対応し、anisotropy-wall が skyrmion に及ぼす $x$ 方向の力を表す。力は $K_- - K_+$ に比例し、skyrmion の半径 $R$、domain wall width $w$、wall からの相対位置 $X$ によって形が決まる。\n\n**記号の定義**:\n- $(F_{\\mathrm{wall}})_x$ ... wall から受ける反発力の $x$ 成分。\n- $K_-$ ... anisotropy-wall 側の magnetic anisotropy。Fig. 1 caption では shadowed region の値。\n- $K_+$ ... track 側の magnetic anisotropy。\n- $X$ ... wall-track boundary に垂直な skyrmion の相対位置。\n- $y$ ... wall-track boundary に平行な方向の積分変数。\n- $R$ ... skyrmion radius。\n- $w$ ... domain wall width。\n\n**この論文での役割**: 論文の主要な解析結果である。Fig. 2 では、この式から得た theoretical force が solid curves として描かれ、dots と diamonds の micromagnetic simulations と比較される。Discussion では、この式が $X$ の符号反転に対して対称であるため、wall を越えた skyrmion にも track へ押し戻す力が働くと説明される。\n\n$$\n\\mathbf{n}(\\Theta,\\Phi)=\n\\begin{pmatrix}\n\\sin\\Theta\\cos\\Phi\\\\\n\\sin\\Theta\\sin\\Phi\\\\\n\\cos\\Theta\n\\end{pmatrix},\n\\qquad\n\\Theta(r)=2\\arctan\\left(\\frac{\\sinh(r/w)}{\\sinh(R/w)}\\right),\n\\qquad\n\\Phi(\\varphi)=q\\varphi+\\gamma_{\\mathrm{helicity}}\n$$\n\n**式の意味**: Method の式 (4)(5) に対応し、normalized magnetization $\\mathbf{n}$ と skyrmion の角度分布を定義する。境界条件は $\\Theta(0)=0$、$\\Theta(\\infty)=\\pi$ で、$(r,\\varphi)$ は polar coordinate system として導入される。\n\n**記号の定義**:\n- $\\mathbf{n}$ ... normalized magnetization。\n- $\\Theta,\\Phi$ ... 球面座標で磁化方向を表す角度。\n- $r,\\varphi$ ... 膜面内の polar coordinate。本文では $\\mathbf{r}=(x,y)=(r\\cos\\varphi,r\\sin\\varphi)$ とされる。\n- $R$ ... skyrmion radius。\n- $w$ ... domain wall width。\n- $q$ ... skyrmion number。この論文では $q=1$。\n- $\\gamma_{\\mathrm{helicity}}$ ... helicity。この論文では Néel skyrmions として $0$ または $\\pi$。\n\n**この論文での役割**: 式 (2) の $n_z$ を具体的に計算し、式 (3) の wall force を導くための形状仮定である。Discussion の \"such a crude model\" は、この孤立 skyrmion の剛体・中心対称な形状仮定を指している。\n\n### 実装 / アルゴリズム上の要点\n\n- step1: track と anisotropy-wall を、Fig. 1 のように $K_+$ と $K_-$ の二領域として置く。本文では $K_- > K_+$ とし、skyrmion は track 側で低エネルギーになる。\n- step2: skyrmion の磁化分布を式 (4)(5) で固定する。自由度は主に skyrmion の中心 $\\mathbf{X}$、radius $R$、domain wall width $w$ である。\n- step3: 式 (2) の $U(\\mathbf{X})$ を、位置依存 $K(\\mathbf{r})$ と $n_z(\\mathbf{r};\\mathbf{X})$ の重なりとして計算する。\n- step4: $X$ 微分により式 (3) の $(F_{\\mathrm{wall}})_x$ を得る。本文では「X-derivative of the energy provides the force」と説明される。\n- step5: MuMax3 による micromagnetic simulations で検証する。ひとつは wall-track boundary に平行な anisotropy slope を track に加え、定速運動に伴う Magnus force と wall force を釣り合わせる方法。もうひとつは boundary に垂直な anisotropy slope を加え、gradient force $F_g$ と wall force を釣り合わせる方法である。\n\n## 実験・結果\n\n- **データセット / ベンチマーク**: ML のデータセットではなく、MuMax3 を用いた micromagnetic simulations が検証手段である。Fig. 2 では relative positions $X$ に対する skyrmion-wall force を、理論曲線と simulation 点で比較する。\n- **比較対象 / baseline**: theoretical force は式 (3) から得た solid curves。simulation は solid circles と diamonds。circles は $F_{\\mathrm{wall}}$ と Magnus force $\\mathbf{G}\\times\\mathbf{v}$ の釣り合い、diamonds は $F_{\\mathrm{wall}}$ と gradient force $F_g$ の釣り合いから得られる。\n- **指標**: 主な量は $(F_{\\mathrm{wall}})_x$、relative position $X$、および skyrmion の shape parameter $R/w$ である。Fig. 2 caption では、blue、green、red の skyrmion に対して $(R,w)=(25.55\\,\\mathrm{nm},11.35\\,\\mathrm{nm})$、$(24.60\\,\\mathrm{nm},8.05\\,\\mathrm{nm})$、$(7.4\\,\\mathrm{nm},7.9\\,\\mathrm{nm})$ が示される。\n- **主な結果**: Abstract では simulation results が modeled skyrmions から計算した結果と \"good agreement\" と述べられ、Results でも simulation は Eq. (3) とよく一致するとされる。Discussion では、数値的に見積もられた力が simulations から得た力と \"almost identical\" とされる。\n- **著者が主張する貢献**: 力は wall との衝突で skyrmion が変形することではなく、potential energy difference から生じる。さらに、力のピークは skyrmion radius 付近にあり、$X$ の符号反転に対して対称なので wall を越えた skyrmion も track へ押し戻される。また magnetic anisotropy wall は additional friction を生じず、moving と at a stop のどちらでも同じ repulsive force が働く、と著者は述べている。\n\n## 妥当性と限界\n\n- **この主張を支える根拠**: 理論側では、式 (2) の anisotropy potential と式 (4)(5) の rigid skyrmion profile から式 (3) を導出している。検証側では、wall に平行な anisotropy slope による定速運動と Magnus force の釣り合い、wall に垂直な anisotropy slope による gradient force との釣り合い、という 2 つの読み出し方で simulation 点を得ている。Fig. 2 caption は theory と simulations の対応を明示している。\n- **著者が認めている limitations / future work**: 独立した limitations 節はない。ただし Discussion で、isolated skyrmions が radii、domain wall widths、centrosymmetric structures を保ち、motion and under forces の間に形を変えないという仮定を \"such a crude model\" と呼んでいる。これは剛体・孤立・中心対称という仮定がモデルの限界であることを示す。\n- **読者として注意すべき点**: Introduction では hub and bent tracks の実験に触れるが、ローカル一次ソースで確認できる図は Fig. 1 の straight wall schematic と Fig. 2 の skyrmion-wall force であり、hub や bent track の個別軌道図・数値表は示されていない。また material parameters、cell size、time step などの simulation 再現に必要な詳細値は、少なくともこのローカル `source.pdf` 本文・caption には明示されていない。\n- **追加で確認したい実験 / 疑問**: 有限温度、欠陥、複数 skyrmions、曲がり角や合流点で同じ式がどこまで使えるかは、この本文だけでは判断できない。skyrmion mass は Introduction で simulation conditions の一部として言及されるが、Results では mass effect の独立した定量結果は示されていないため、式 (3) の範囲外で慣性が効く運動をどう扱うかは追加確認が必要である。\n\n## 用語メモ\n\n一般的な辞書的定義ではなく、この論文での使われ方を中心に書く。\n\n- **skyrmion** ... magnetic thin films 中の localized spin configuration。Abstract では半径が典型的に 10-100 nm とされ、memory や novel-device 用途の候補として導入される。\n- **track** ... skyrmions の motion を guide する領域。この論文では主に magnetic-anisotropy energy の差で作る道を指す。\n- **anisotropy-wall** ... track より高い magnetic anisotropy $K_-$ を持つ領域。track 側の $K_+$ より大きいため、skyrmion にとって壁側は高エネルギーになる。\n- **magnetic anisotropy energy coefficient $K(\\mathbf{r})$** ... 式 (2) の係数。場所に依存し、$1-n_z^2$ と掛け合わされて skyrmion のポテンシャルを決める。\n- **domain wall width $w$** ... skyrmion 内で磁化が中心向きから外側向きへ遷移する幅。式 (3)(5) に入り、wall force の距離依存を決める。\n- **radius $R$** ... skyrmion の半径。Discussion では force peak が skyrmion radius に位置すると説明される。\n- **Thiele equation** ... skyrmion の dynamics を collective coordinate $\\mathbf{X}$ の釣り合いとして表す式 (1)。\n- **Magnus force** ... Thiele equation の $\\mathbf{G}\\times\\dot{\\mathbf{X}}$ に対応する横向きの力。Fig. 2 の dots はこの項と $F_{\\mathrm{wall}}$ の釣り合いから得られる。\n- **gradient force $F_g$** ... track region に付けた anisotropy slope によって生じる力。Fig. 2 の diamonds は $F_{\\mathrm{wall}}$ と $F_g$ の釣り合いから得られる。\n- **Néel skyrmion** ... Method で $q=1$、$\\gamma_{\\mathrm{helicity}}=0$ または $\\pi$ として扱われる skyrmion。\n- **MuMax3** ... micromagnetic simulations に使われるソフトウェア。References [10] と Results の simulation 検証に現れる。\n- **potential pocket** ... carved tracks の corner で demagnetizing field により生じると Abstract で述べられる局所的なポテンシャルのくぼみ。anisotropy-patterned tracks はこの問題を避けるものとして導入される。\n- **Brownian computation** ... Introduction で、先行する anisotropy-patterned track 技術の目標として挙げられる用途。thermal energy が tracks 内の skyrmions を駆動できることと関係づけられている。\n\n## 読む順番の提案\n\n- まず Abstract を読み、この論文の問いが \"identify the forces acting between skyrmions and walls of the tracks\" であることを確認する。\n- 次に Results の式 (1)(2)(3) を読む。式 (1) は運動方程式、式 (2) は anisotropy potential、式 (3) は主要結果である wall force で、正規ノートの Summary の「手法」「結果」に直接対応する。\n- Method の式 (4)(5) を読んで、式 (3) がどの skyrmion profile に依存しているかを確認する。ここが正規ノートの「剛体形状仮定」「Néel skyrmion」という記述につながる。\n- Fig. 1 caption で $K_- > K_+$ の幾何を確認し、Fig. 2 caption で three skyrmions の $(R,w)$、solid curves、dots、diamonds の意味を確認する。\n- 最後に Discussion を読む。正規ノートの Critical Thoughts は、この節の \"such a crude model\"、force peak at radius、$X$ symmetry、additional friction なし、という主張を評価するための入口になる。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2005.04860v1/`（このローカル一次ソースには TeX/README/main.bbl は見当たらず、`source.pdf` のみ）\n- 正規ノート: `notes/arXiv-2005.04860v1.md`\n";

    ],
    macros: MACROS,
    throwOnError: false,
    errorColor: '#cc4444',
    strict: 'ignore',
  });
  // スクロール位置を sessionStorage で保つ（--watch 時の auto refresh 対策）
  const key = 'scroll:' + location.pathname;
  const saved = sessionStorage.getItem(key);
  if (saved) window.scrollTo(0, parseInt(saved));
  window.addEventListener('scroll', () => sessionStorage.setItem(key, String(window.scrollY)));
});
</script>
</body>
</html>
