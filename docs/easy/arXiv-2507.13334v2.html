const RAW = "# A Survey of Context Engineering for Large Language Models（「文脈エンジニアリング」って何？ 大規模言語モデルに渡す情報のまとめ方ガイド）\n\n- arXiv: https://arxiv.org/abs/2507.13334\n- 一次ソース: ../papers/arXiv-2507.13334v2/\n- 正規ノート: ../notes/arXiv-2507.13334v2.md\n\n---\n\n## 一言で言うと\n\nChatGPT みたいな AI に「うまく答えてもらう」コツを、ただの呪文（プロンプト）じゃなくて「情報の組み立て方」として整理しなおした、1400 本以上の論文をまとめた大きな案内地図。\n\n## どんな問題を解こうとしてるの？\n\n- ChatGPT のような「大規模言語モデル」（巨大な文章生成 AI のこと。以下 LLM＝Large Language Model と呼ばれる）に質問するとき、聞き方ひとつで答えの良さがガラッと変わる。\n  - たとえば「宿題の作文を手伝って」とだけ言うのと、「中 2 の理科の感想文で、400 字以内で、こういう条件で書いて」と言うのとでは、AI の答えはまったく違う。\n- これまでこの「聞き方の工夫」は **プロンプトエンジニアリング**（prompt engineering＝AI に渡す質問文をうまく作る工夫）と呼ばれてきた。\n  - でも今の AI システムはもっと複雑で、ただ 1 つの質問文を送るだけじゃない:\n    - 過去のチャット履歴を覚えておく\n    - 図書館みたいに外部の文書から関連情報を引っぱってくる（これを **RAG**＝Retrieval-Augmented Generation、「検索して足してから答える」と呼ぶ）\n    - 計算機やウェブ検索などの「道具」を呼び出す\n    - 複数の AI どうしが会話して仕事を分担する\n- これらが **バラバラの研究分野** として進んでしまって、全体像がわからない。\n- さらに、AI には **大きな弱点** がある: 「読むのは得意なのに、長い文章を書くのは苦手」。これを著者は **理解と生成の非対称性**（読む力と書く力が釣り合っていない問題）と呼んでいる。\n\n## どうやって解いたの？\n\n### コアアイデア\n\n著者は「プロンプト＝1 本の文字列」という古い見方を捨てて、**文脈（context）＝AI に渡す情報全体を、いくつかの部品を組み立てて作る “お弁当” みたいなもの** と考え直した。\n\nたとえば遠足のお弁当を作るとき、ご飯・おかず・デザート・お箸・お手拭きを箱に詰めるよね。中身も、入れる順番も、箱のサイズに収まることも全部大事。それと同じで、AI に送る情報も「役割の違う部品」を集めてうまく詰める作業だ、というのがこの論文の見方。これを **Context Engineering**（コンテキスト・エンジニアリング、文脈の組み立て術）と名付けた。\n\n### 仕組み\n\n文脈は次の 6 種類の「部品」に分けられる:\n\n- **$c_{\\text{instr}}$**: 命令やルール（「丁寧語で答えて」みたいな指示）\n- **$c_{\\text{know}}$**: 外から引っぱってきた知識（教科書のページ、ウェブ記事など）\n- **$c_{\\text{tools}}$**: 使える道具の説明書（電卓、検索エンジンなど）\n- **$c_{\\text{mem}}$**: これまでの会話で覚えたこと（記憶）\n- **$c_{\\text{state}}$**: いまの状況（ユーザーが誰か、何をやっている途中か）\n- **$c_{\\text{query}}$**: ユーザーがいま聞いた質問そのもの\n\n論文ではこの 6 部品を組み合わせる方法を、大きく **2 段** に整理している。\n\n- **基礎部品（Foundational Components）** — お弁当の「具材」にあたる 3 つの技術\n  - step1: **Context Retrieval and Generation**（文脈の集め方・作り方）… プロンプトの書き方、Chain-of-Thought（後で説明）、外部の文書を引っぱってくる仕組み。\n  - step2: **Context Processing**（集めた情報の整え方）… 何万字もある長文を扱う技術、AI 自身が下書きを直す自己修正、表やグラフのような構造化データの取り込み。\n  - step3: **Context Management**（情報の整理整頓）… 古い情報を捨てる、要約して圧縮する、メモリーを階層化して長く覚える。\n- **実装システム（System Implementations）** — 具材を組み合わせた「お弁当の完成形」4 つ\n  - **RAG**: 質問のたびに図書館で関連文書を探してから答える AI。\n  - **Memory Systems**: 何日も前の会話を覚えていて引き出せる AI（MemoryBank, MemGPT, MemOS など）。\n  - **Tool-Integrated Reasoning**: 電卓・検索・コード実行などの外部ツールを呼び出して答える AI（Toolformer, ReAct など）。\n  - **Multi-Agent Systems**: 複数の AI が役割分担して話し合いながら 1 つの仕事をする仕組み（AutoGen, MetaGPT, CAMEL など）。\n\n### 主要な数式\n\n論文には数式が 6 本くらいあるけど、ここでは **3 つの中核** だけ拾って噛み砕く。\n\n---\n\n#### 式 ① 文脈の組み立て方\n\n$$ C = \\mathcal{A}(c_1, c_2, \\dots, c_n) $$\n\n**この式が言ってること**: AI に渡す情報全体（$C$）は、いくつかの部品 $c_1, c_2, \\dots$ を、組み立て役の関数 $\\mathcal{A}$ が並べたり整形したりして作る、ということ。1 本の長い文字列じゃなくて「組み立て品」だよ、という宣言。\n\n**記号の意味**:\n- $C$ … 最終的に AI に渡す文脈（情報のお弁当全体）\n- $c_1, c_2, \\dots, c_n$ … 文脈を作る部品（指示・知識・道具・記憶・状況・質問の 6 種類）\n- $\\mathcal{A}$ … 「関数」と呼ばれる、入力を受け取って出力を返す機械みたいなもの。ここでは「6 部品を受け取って、AI に渡す形に整える組み立て役」。料理人が材料を受け取ってお弁当に詰めるイメージ。\n\n**身近な例え**: 遠足のお弁当箱を $C$ とすると、$c_1$＝ご飯、$c_2$＝玉子焼き、$c_3$＝唐揚げ、$c_4$＝ミニトマト、$c_5$＝お箸、$c_6$＝メモ書きみたいに具材が並ぶ。$\\mathcal{A}$ はお母さん（または自分）が「ご飯を左、おかずを右、お箸は端」と詰めていく作業そのもの。\n\n---\n\n#### 式 ② コンテキスト・エンジニアリングの目標\n\n$$ \\mathcal{F}^* = \\arg\\max_{\\mathcal{F}} \\; \\mathbb{E}_{\\tau \\sim \\mathcal{T}} \\big[ \\text{Reward}(P_{\\theta}(Y | C_{\\mathcal{F}}(\\tau)), Y^*_{\\tau}) \\big] $$\n\n**この式が言ってること**: たくさんの種類のタスク（質問）を平均してみたとき、AI の答えがいちばん良くなるような「文脈の作り方」を見つけよう、というのがこの分野の目標だよ、と宣言している式。制約として「文脈の長さは AI が読める上限 $L_{\\max}$ を超えてはいけない」もつく。\n\n**記号の意味**:\n- $\\mathcal{F}$ … 文脈を作るための「やり方一式」（部品の選び方・並べ方・知識の検索方法 など）\n- $\\mathcal{F}^*$ … その中でも最高に良いやり方（$^*$ は「ベスト」の印）\n- $\\arg\\max_{\\mathcal{F}}$ … 「$\\mathcal{F}$ を色々試して、中身を最大にするやつを選ぶ」という操作\n- $\\mathbb{E}_{\\tau \\sim \\mathcal{T}}[\\cdot]$ … **期待値**（読み方: きたいち）。中学生は習っていないので少しだけ説明: サイコロをたくさん振って平均の目を取るような「平均値」のこと。$\\mathcal{T}$ という「タスクの全種類」からひとつ $\\tau$ を選んで、それを全部について平均する、という意味。\n- $\\tau$ … 1 個 1 個の質問（タスク）\n- $\\mathcal{T}$ … 質問の全種類（たとえば「算数の問題」「翻訳」「メール書き」など全部）\n- $P_{\\theta}(Y | C_{\\mathcal{F}}(\\tau))$ … 「文脈 $C$ を渡したときに、AI が答え $Y$ を出す確率」。$\\theta$ は AI の頭の中の設定値、$P$ は **確率**（起こりやすさを 0〜1 で表した数。中学生は習っていないので: ジャンケンでグーが出る確率は約 1/3 ≒ 0.33、みたいに「どれくらい起こりやすいか」の数字だと思って OK）。\n- $Y$ … AI が出してくる答え\n- $Y^*_\\tau$ … その質問にとっての「理想の正解」\n- $\\text{Reward}(\\cdot, \\cdot)$ … 「ご褒美」「点数」。AI の答えが正解にどれだけ近いかを点数化する関数。\n\n**身近な例え**: 学校で 100 種類のテストを受けると想像してみよう。$\\mathcal{F}$ は「テスト勉強のやり方」（教科書を読む順番、ノートの取り方、暗記カードの作り方など）。色々な勉強法を試して、100 種類のテストの **平均点** がいちばん高くなる勉強法 $\\mathcal{F}^*$ を探す、というのがこの式の言いたいこと。ただし「1 日の勉強時間は $L_{\\max}$ 時間まで」という制約あり。\n\n---\n\n#### 式 ③ 賢い情報検索のしかた\n\n$$ \\text{Retrieve}^* = \\arg\\max_{\\text{Retrieve}} \\; I(Y^*; c_{\\text{know}} \\mid c_{\\text{query}}) $$\n\n**この式が言ってること**: 質問に答えるための知識を図書館から取ってくるとき、「ただ質問と似てる文書」じゃなくて「答えを当てるのにいちばん役に立つ文書」を選ぼう、という指針を表した式。\n\n**記号の意味**:\n- $\\text{Retrieve}$ … 知識を引っぱってくる作業（検索する仕組み）\n- $\\text{Retrieve}^*$ … その中で最高のやり方\n- $I(A; B \\mid C)$ … **相互情報量**（読み方: そうごじょうほうりょう）。中学生は習っていないので: 「$C$ を知っている前提で、$B$ を見ると $A$ についてどれだけ新しいことがわかるか」を測る数字。大きいほど「$B$ は $A$ を当てる手がかりとして強い」という意味。\n- $Y^*$ … 理想の答え\n- $c_{\\text{know}}$ … 図書館から取ってきた知識\n- $c_{\\text{query}}$ … ユーザーの質問\n\n**身近な例え**: 「織田信長について教えて」と聞かれて、教科書から資料を持ってくる場面を考えよう。\n- ✕ 悪い例: 表紙に「織田信長」と書いてあるけど中身は目次だけのページ（質問とは似てるけど、答えに役立たない）\n- ◎ 良い例: 「織田信長が桶狭間の戦いで勝った」と書かれたページ（質問とちょっと言い方は違うけど、答えを当てる手がかりとして最強）\n\nこの式は「◎ の方を選べ」と言っている。\n\n## 何がすごいの？\n\nこれは **サーベイ論文**（survey paper＝ある分野の論文を大量にまとめて整理する論文）なので、自分で新しい実験はしていない。代わりに、引用先の数字をたくさん並べて分野の現状を見せてくれる。\n\n- **規模**: 1400 本以上の論文をレビューして、全体を 1 枚の地図（taxonomy＝分類体系）にまとめた。\n- **読む力と書く力のギャップ**:\n  - **GAIA** という「AI アシスタントの総合テスト」では、人間は 92% 正解できるのに、GPT-4 は **15% しか正解できない**（evaluation.tex §6.3.1）。\n  - **WebArena**（ウェブ操作テスト）の首位は IBM CUGA で 61.7%、2 位は OpenAI Operator で 58.1%（evaluation.tex tab:x_webarena_leaderboard）。\n  - **LongMemEval**（長い会話の記憶テスト、500 問）では、商用 AI アシスタントの精度が長い対話で **30% 落ちる**（evaluation.tex §6.1.2）。\n- **工夫すれば良くなる**:\n  - 自己修正（**Self-Refine** や **Reflexion**）を使うと GPT-4 の成績が **約 20% 改善**（evaluation.tex §6.1.1）。\n  - **GraphWiz** はグラフ問題で平均 65% 正解、GPT-4 の 43.8% を大きく上回る（future.tex §7.2.3）。\n  - 検索を組み合わせた「重ね合わせプロンプト」でウェブ文書探しの精度が **18 倍** に（why_ce.tex §3.2.2）。\n  - 数例だけ見せる **few-shot 学習**（あらかじめ手本を 2〜3 個見せてから本番に挑ませる方法）で、バグ修正の正解一致率が **+175.96%**（why_ce.tex §3.2.2）。\n- **道具テストの規模**: BFCL は 2,000 ケース、API-Bank は 73 API・314 会話、ToolHop は 995 質問 × 3,912 道具、など、評価ベンチマークの一覧表が整理されている。\n- **著者が自分で挙げている貢献**（abstract / intro より）:\n  1. Context Engineering を **数式付きで** 新しい学問分野として定義した。\n  2. 「基礎部品 × 実装システム × 評価 × 未来の課題」という **二層分類** を作って、図（taxonomy forest, tree.pdf, ce.pdf）で見える化した。\n  3. 1400+ 本の論文と、評価方法・通信プロトコル・未解決課題を一望できるリストを作った。\n  4. **「読むのは得意、書くのは苦手」** という非対称性を、今後最も大事な未解決問題として宣言した。\n\n## キーワード辞典\n\n- **LLM**（Large Language Model）… 大規模言語モデル。膨大な文章で学習した、ChatGPT のような巨大な文章生成 AI。\n- **Context（コンテキスト・文脈）** … AI に渡す情報全部。質問・指示・参考資料・履歴などをひっくるめた呼び方。\n- **Prompt Engineering** … AI に渡す質問文をうまく作る工夫。\n- **Context Engineering** … 質問文だけじゃなく、参考資料・記憶・道具・状況など全部を組み立てる工夫。プロンプトエンジニアリングの上位概念だと著者は主張。\n- **RAG**（Retrieval-Augmented Generation）… 「検索して足してから答える」AI。質問のたびに外部の文書を引っぱってきて、それも一緒に AI に読ませる。\n- **Chain-of-Thought（CoT）** … 「考えのつなぎ方」。AI に途中の計算や考え方を書かせると、最終的な答えが良くなるテクニック。\n- **Tree-of-Thoughts（ToT）/ Graph-of-Thoughts（GoT）** … CoT を木や網のように枝分かれさせて、複数の考え方を試させる発展版。\n- **Self-Refine / Reflexion** … AI が自分の出した答えを読み返して直す「自己修正」のしくみ。\n- **Memory System** … AI が過去の会話を覚えておく仕組み。MemoryBank, MemGPT, MemOS などが代表例。\n- **Tool-Integrated Reasoning** … AI が電卓や検索などの外部ツールを呼んで答える仕組み。\n- **Function Calling** … プログラム的に「この道具を、こういう引数で呼んで」と AI が指示する仕組み。\n- **Multi-Agent System** … 複数の AI が役割分担して協力する仕組み。\n- **MCP / A2A / ACP / ANP** … AI どうしが話し合うときのお約束（通信プロトコル）。それぞれ Anthropic, Google, IBM, ANP コミュニティが提案。\n- **GAIA / WebArena / LongMemEval / BFCL / GTA / ToolHop** … AI の力を測るテスト（ベンチマーク）の名前。\n- **Taxonomy（分類体系）** … 生き物の「動物→哺乳類→犬→柴犬」みたいに、技術を階層に分けて整理した地図。\n- **Token（トークン）** … AI が読み書きする「ことばの最小単位」。日本語だと文字や単語くらい、英語だと単語の一部くらいの粒。\n- **期待値**（$\\mathbb{E}$）… サイコロを何度も振って平均を取るような「平均値」。\n- **確率**（$P$）… 「どれくらい起こりやすいか」を 0〜1 の数字で表したもの。\n- **相互情報量**（$I$）… 「片方を知ると、もう片方についてどれだけわかるか」を測る数字。\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- 論文には他にも 3 つ式が出てくる。\n  - 式 (1) は **自己回帰モデル**（autoregressive model）と呼ばれる、LLM の基本動作:\n    $$P_\\theta(Y|C) = \\prod_{t=1}^T P_\\theta(y_t | y_{<t}, C)$$\n    意味は「答え $Y$ 全体を 1 文字ずつ前から順に作っていく。$t$ 文字目を作るときは、それまでに作った $t-1$ 文字 $y_{<t}$ と元の文脈 $C$ を見て決める」。$\\prod$ は「全部かけ算」の記号。一文字ずつの確率を全部かけ算すると、文章全体の確率になる、というしくみ。\n  - 式 (5)(6) はベイズ流の見方で、「文脈を 1 つに決め打ちするんじゃなくて、もっともらしさで重み付けして選ぶ」という考え方。中学生にはまだ難しいので「そういう発展形もあるんだな」くらいで OK。\n- 著者は数式を出すけど、「じゃあその式をどう解くか（どんなアルゴリズムを使うか）」は本文に書いていない。**式は “目指す方向” を示しているだけで、具体的な解き方は読者に委ねる**、という survey らしいスタイル。\n- BLEU や ROUGE という、文章生成 AI の従来の評価方法（答え文と正解文の単語の一致率を測る方法）は **もう古い**、と著者は主張している。複雑な推論や道具の使い方を測るには、もっと別の物差し（成功率・修正の改善幅・取引の整合性 など）が必要だという指摘。\n- 著者は中国の研究機関（中国科学院 ICT、北京大学、清華大学、UCAS）の人がほとんどで、UC Merced（米）と Queensland（豪）が混じる構成。これは TeX に書かれていないが、選ばれる論文に多少の偏りがある可能性は知っておくと良い（評者補足）。\n- 著者自身も Acknowledgments で「分野の進化が速くて見落としがあるかもしれない」と認めている。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2507.13334v2/`\n- 正規ノート: `notes/arXiv-2507.13334v2.md`\n";
