const RAW = "# Acon: Optimizing Context Compression for Long-horizon LLM Agents（長く働く AI のための「メモ要約」最適化）\n\n- arXiv: https://arxiv.org/abs/2510.00615\n- 一次ソース: ../papers/arXiv-2510.00615v2/\n- 正規ノート: ../notes/arXiv-2510.00615v2.md\n\n---\n\n## 一言で言うと\n\n長く働く AI（エージェント）が抱える「どんどん膨らむ作業メモ」を、賢く要約するルールを自動で作って、メモ量を 26〜54% 減らしても成績はほぼ落とさない仕組みを作ったよ。\n\n## どんな問題を解こうとしてるの？\n\n- いま流行りの「**LLM**（Large Language Model = 大きな言葉のモデル。ChatGPT みたいに、文章を入れると次の文章を作ってくれる AI のこと）」を使って、**エージェント**（人間の代わりにメールを送ったり、ファイルを整理したりする AI ロボットのこと）を作りたい。\n- でもエージェントは、たくさんの手順（例: メールを開く → 内容を読む → 返信を書く → 送る → ...）をこなすうちに、過去にやったこと全部を「作業メモ」として持ち歩く必要がある。\n  - 身近な例: 宿題ノートに「3 時間目にやった問題」「4 時間目にやった問題」「5 時間目にやった問題」を全部書き写しながら次の問題を解くようなもの。ノートがどんどん分厚くなって、新しい問題に集中できなくなるよね。\n- 困りごとは 2 つ。\n  1. メモが長くなるほど、AI を動かすお金と時間がかかる（長い文を読むのは大変）。\n  2. 余計な情報が混じると、AI がうっかり間違える。\n- これまでの解き方の足りないところ:\n  - 「古い部分をバッサリ切る」「ざっくり要約する」だけだと、エージェントにとって大事な情報（例: ログインに必要なパスワード、メール ID、口座残高など）まで消えてしまう。\n  - 1 回きりの質問応答用に作られた要約ツール（**LongLLMLingua** や **Selective Context** など）は、何十手も続くエージェント用には作られていない。\n\n## どうやって解いたの？\n\n### コアアイデア\n\n要点は「**作業メモを要約する『お手本ルール』を、AI 自身に書き直してもらう**」こと。\n- ふつう機械学習だと「数字をちょっとずつ調整する（**勾配**＝坂道の傾きを使った調整。中学では習わないけど、〝間違いの大きさを見て少しずつ正解に近づける〟やり方）」を使う。\n- でもこの論文は、調整するものが**自然言語で書かれたルール（プロンプト）**なので、AI に「このルールだと失敗したよ。ここをこう直したら？」と日本語（実際は英語）で批評させて書き直してもらう。\n- 身近な例: 料理レシピを書き直すとき、味見した友達に「塩が足りなかった」と感想をもらってレシピを改良するイメージ。数字をいじるんじゃなくて、文章を書き直すから「**勾配を使わない（gradient-free）**」と呼ぶ。\n\n### 仕組み\n\n- **step1: 2 種類のメモを別々に要約する**\n  - **history compression（履歴の要約）**: これまでの全手順をまとめた長い記録。長さがしきい値 $T_{\\sf hist}$（例えば 4096 文字くらい）を超えたら要約する。\n  - **observation compression（最新観察の要約）**: いま開いたメール本文や Web ページなど、その場で AI に届いたデータ。長さがしきい値 $T_{\\sf obs}$（例えば 1024 文字くらい）を超えたら要約する。\n  - 直近の (やった行動, 結果) のペアは絶対に消さない。\n- **step2: わざと失敗例を集める**\n  - 同じ仕事を「要約なし」と「要約あり」両方でやらせる。\n  - 「要約なしでは成功、要約ありでは失敗」した仕事だけ集めて「対比サンプル集 $\\mathcal{D}_{\\sf cont}$」を作る。← これが「要約で大事な情報を消した証拠」になる。\n- **step3: 賢い AI に批評させてルールを書き直す（UT ステップ）**\n  - 強い AI（既定では `o3` という OpenAI の推論モデル）に「要約前と要約後を比べて、何を消したから失敗したか」を文章で答えさせる。\n  - その意見を集めて、要約ルール $\\mathcal{P}^{(0)}$ を $\\mathcal{P}^{(1)}$ に書き直す。\n  - 5 個くらい候補を作って、いちばん良いのを選ぶ。\n  - これを **UT = Utility Maximization step**（成功率を上げる工程）と呼ぶ。\n- **step4: もう一段、短さを追求する（CO ステップ）**\n  - 今度は「要約ありで成功した仕事」だけ見て、「実際に役に立った情報はどれだったか」を AI に答えさせる。\n  - 「あんまり使わなかった情報は思い切ってカット」とルールを更にしぼり、$\\mathcal{P}^{(1)} \\to \\mathcal{P}^{(2)}$ に進化。\n  - これを **CO = Compression Maximization step**（メモを短くする工程）と呼ぶ。\n- **step5: 大きい要約 AI を小さい AI に「弟子入り」させる（distillation）**\n  - 強い AI（gpt-4.1）で要約した結果を、小さい AI（Qwen3-14B など。約 140 億個の数字を持つ AI で、ChatGPT 系の大型モデルよりずっと小さい）に「お手本」として真似させる。\n  - **LoRA**（Low-Rank Adaptation = 巨大な AI 全部を訓練し直さず、小さな〝後付けパーツ〟だけ訓練して安く済ませる技。rank 16 など小さい設定で済む）を使う。\n  - こうすると、本番では「賢く高い AI」じゃなく「安い小さい AI」が要約係を担当できる。\n\n### 主要な数式\n\n#### ① エージェントが次の一手を決める式\n\n$$ \\mathcal{M}(o_t, \\mathbf{h}_{t-1};\\,\\theta,\\,\\mathcal{P}_{\\sf agent}) \\mapsto a_t $$\n\n**この式が言ってること**: AI「$\\mathcal{M}$」が、いまの観察「$o_t$」とこれまでのメモ「$\\mathbf{h}_{t-1}$」を読んで、次にやる行動「$a_t$」を決めるよ、という意味。\n\n**記号の意味**:\n- $\\mathcal{M}$ … AI 本体（LLM のこと）\n- $o_t$ … いまの観察。例: 開いたメールの本文\n- $\\mathbf{h}_{t-1}$ … これまでの作業メモ。$t-1$ 個目までの (観察, 行動) を並べたもの\n- $\\theta$ … AI の中身の「数字パラメータ」一式。訓練済みで固定\n- $\\mathcal{P}_{\\sf agent}$ … AI に渡す「お仕事マニュアル」（指示文や例）\n- $a_t$ … この瞬間にやる行動。例: 「返信ボタンを押す」\n\n**身近な例え**: 料理人 $\\mathcal{M}$ が、いまテーブルにあるお客さんの注文票 $o_t$ と、これまでに作った料理リスト $\\mathbf{h}_{t-1}$ を見て、次に焼く料理 $a_t$ を決めるみたいなもの。$\\theta$ は料理人の腕（経験）、$\\mathcal{P}_{\\sf agent}$ はお店のルールブック。\n\n---\n\n#### ② 全体のコスト（メモを読むのにかかる手間）\n\n$$ C(\\mathcal{H}) = \\sum_{t=1}^{T} \\mathcal{C}(\\mathbf{h}_{t-1},\\, o_t) $$\n\n**この式が言ってること**: 仕事が終わるまでの各ステップ $t=1$ から $T$ まで、毎回の「メモを読む手間 $\\mathcal{C}$」を足し算したものが全体コスト $C$。長いメモを何度も読むほど、合計コストが大きくなるよ、ということ。\n\n**記号の意味**:\n- $C(\\mathcal{H})$ … 仕事 1 個分の合計コスト（全部でいくら手間がかかったか）\n- $\\mathcal{H}$ … 仕事全体の「メモと観察」のリスト\n- $T$ … その仕事を終えるまでにかかったステップ数\n- $\\mathcal{C}(\\mathbf{h}_{t-1}, o_t)$ … $t$ ステップ目に「メモと観察を読む」のにかかった手間。だいたい「文字数（トークン数）」に比例する\n- $\\sum_{t=1}^{T}$ … $t=1, 2, ..., T$ までの合計（中学で習う総和の記号）\n\n**身近な例え**: 1 日に何回も電車に乗るとき、毎回切符を買うと「1 回目の運賃 + 2 回目の運賃 + ... + 最後の運賃」が合計でかかる。長く乗るほど高くつくのと同じ。\n\n---\n\n#### ③ Acon が目指すゴール\n\n$$ \\max_{\\psi}\\; \\mathbb{E}\\big[\\mathcal{R}(s_T(\\psi))\\big] \\;-\\; \\lambda\\,\\mathbb{E}\\big[C(\\mathcal{H}'(\\psi))\\big] $$\n\n**この式が言ってること**: 要約のやり方 $\\psi$ を、「仕事の点数（ごほうび）が最大になる」かつ「メモのコストが最小になる」ようにバランスよく選ぼう、という目標。\n\n**記号の意味**:\n- $\\max_{\\psi}$ … 「$\\psi$ を動かして、右側を一番大きくしてね」という指示\n- $\\psi$ … 要約 AI の中身（パラメータ $\\phi$ ＋ ルール $\\mathcal{P}$）。これを調整する\n- $\\mathbb{E}[\\cdot]$ … 「平均」のこと（いろんな仕事でやってみた平均値。確率の期待値だけど、ここでは〝平均〟と思って OK）\n- $\\mathcal{R}(s_T(\\psi))$ … 仕事が最後の状態 $s_T$ に着いたときにもらえるごほうび点数（例: 仕事成功なら 1、失敗なら 0）\n- $\\mathcal{H}'(\\psi)$ … 要約後のメモ全体\n- $C(\\mathcal{H}'(\\psi))$ … 要約後のメモ全部にかかるコスト\n- $\\lambda$（ラムダ）… 「コストをどれだけ気にするか」のさじ加減の数。0 以上の固定値\n\n**身近な例え**: お弁当作りで「おいしさは最大に、材料費は最小に」両方目指す感じ。$\\lambda$ は「節約をどれくらい優先するか」のダイヤル。$\\lambda$ を大きくすると節約優先、小さくするとおいしさ優先。\n\n---\n\n#### ④ メモが長すぎたら要約する（履歴の場合）\n\n$$ \\mathbf{h}_t' = \\begin{cases} f(\\mathbf{h}_t;\\,\\phi,\\,\\mathcal{P}_{\\sf hist}) & \\text{もし } |\\mathbf{h}_t| > T_{\\sf hist} \\\\ \\mathbf{h}_t & \\text{それ以外} \\end{cases} $$\n\n**この式が言ってること**: いまのメモ $\\mathbf{h}_t$ の長さがしきい値 $T_{\\sf hist}$ より大きければ要約 AI $f$ に通して短くする。短ければそのまま使う。\n\n**記号の意味**:\n- $\\mathbf{h}_t'$ … 要約済み（または手付かず）の最終的なメモ\n- $f$ … 要約をする AI（compressor）\n- $\\phi$ … 要約 AI の中身の数字パラメータ\n- $\\mathcal{P}_{\\sf hist}$ … 履歴を要約するときのルール（プロンプト）\n- $|\\mathbf{h}_t|$ … メモの長さ（文字数・トークン数）\n- $T_{\\sf hist}$ … しきい値。論文では 4096 トークン（AppWorld / OfficeBench）\n\n**身近な例え**: ノートのページが 5 ページを超えたら「ここまでのまとめ」を書いて元のページは捨てる、というルール。5 ページ未満ならそのまま使う。\n\n## 何がすごいの？\n\n論文では 3 つのベンチマーク（テスト用課題集）で実験してるよ。\n\n- **AppWorld**（メール、ファイル管理、ToDo アプリなどを操作するエージェント課題、test-normal で 168 タスク）\n  - 要約なし: 正答率 56.0% / 最大メモ量 9.93k トークン\n  - **Acon (UT+CO)**: 正答率 **56.5%** / 最大メモ量 7.33k トークン（**−26% の削減**で精度はむしろ上**）\n  - 比較対象（baseline）: FIFO（古い順に捨てる）45.8%、Retrieval（検索で必要分だけ取る）27.4%、LLMLingua 39.3%、Prompting 43.5% → Acon の圧勝\n  - とくに**難しい 63 タスク**だと、FIFO は 15.9%、Retrieval は 7.9% まで崩壊。Acon は 28.6〜31.8% を維持。\n- **OfficeBench**（オフィス作業のエージェント課題、95 タスク）\n  - 要約なし: 76.84%、Acon UT: **74.74%**、最大メモ量 7.27k → 4.93k（**−32%**）\n- **Multi-objective QA**（NQ という QA データセットを 8 質問束ねて 1 タスクにした課題、100 タスク）\n  - 要約なし: EM（完全一致）0.366 / F1 0.488 / 最大メモ量 10.35k\n  - Acon UT: **EM 0.373 / F1 0.494** / 最大メモ量 4.71k（**−54.5%**）\n  - 要約したのに精度が上がるレアケース。\n- **小さい AI に弟子入りさせても 95% 以上の精度をキープ**（gpt-4.1 → Qwen3-14B / 8B / Phi-4 / gpt-4.1-mini に蒸留）。\n- **エージェント本体が小さい AI のときほど効果が大きい**:\n  - Qwen3-14B が AppWorld で 26.8% → 33.9%（**+32% の改善**）\n  - 8-obj QA で EM 0.158 → 0.197（**+46%**）\n  - OfficeBench で **+20%**\n\n著者が論文中で挙げている貢献は 4 つ:\n1. 履歴と観察の両方を統一的に要約するエージェント専用フレームワーク Acon を提案。\n2. 失敗から学ぶ・タスクに合わせた、勾配を使わない要約ルール最適化（UT + CO の 2 段階）。\n3. 蒸留で要約 AI を小型化しても 95% 以上の精度を保てる。\n4. 3 ベンチマークで最大メモ量を 26〜54% 削減、小さい AI を 20〜46% 改善。\n\n## キーワード辞典\n\n- **LLM**（Large Language Model）… 大量の文章を学んで、続きの文を生成できる大型 AI（ChatGPT など）\n- **エージェント（agent）**… 人間の代わりに複数手順の仕事をこなす AI ロボット\n- **長 horizon タスク**… 何十〜何百手も繰り返す仕事\n- **context（コンテキスト）**… AI に毎回見せる作業メモ（過去のやりとり全部）\n- **トークン（token）**… AI が文章を区切る単位。だいたい単語や記号 1 つ分\n- **history compression / observation compression**… 履歴 or 最新観察を要約すること\n- **しきい値（threshold）$T$**… 「これより長かったら要約する」の境目の数\n- **POMDP**（Partially Observable Markov Decision Process）… 「次の状態の決まり方」を表す数学モデル。エージェント研究の標準的な書き方。中学生は「ゲームのルールを式にしたもの」と思って OK\n- **報酬（reward）$\\mathcal{R}$**… 仕事を達成したときにもらえる点数\n- **gradient-free（勾配なし）**… 数字パラメータを少しずつ動かす機械学習を使わず、文章だけで改良する方法\n- **prompt（プロンプト）**… AI に渡す指示文\n- **TextGrad / OPRO / DSPy / APO**… 文章で AI のルールを最適化する研究の名前\n- **contrastive feedback**… 「成功例 vs 失敗例」を比べて違いから学ぶフィードバック\n- **UT / CO ステップ**… UT は成功率を上げる調整、CO は短さを追求する調整\n- **distillation（蒸留）**… 大きい AI のふるまいを真似させて、小さい AI に同じ仕事をさせる訓練法\n- **SeqKD**… 蒸留のやり方の 1 つ（先生 AI の作った文章を生徒 AI に真似させる）\n- **LoRA**（Low-Rank Adaptation）… AI 全体を訓練し直さず、後付けの小さなパーツだけ訓練する省エネ手法\n- **AppWorld / OfficeBench / Multi-objective QA**… エージェントの能力を測るテスト集（ベンチマーク）\n- **FIFO**（First-In-First-Out）… 古いメモから順に捨てる単純な方法\n- **EM / F1**… QA の正解の合い方を測る指標。EM は「完全一致」、F1 は「部分一致もカウント」\n- **KV-cache**… AI が一度読んだ文章の途中計算をメモしておく仕組み。再利用すると速くなるが、要約で文を書き換えるとこのメモが壊れる\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **正直に書いてある限界**: 履歴を要約すると **KV-cache**（前回の計算メモ）が壊れて、結局 API のお金は減らないどころか増えることがある。最大メモ量（peak token）は確かに減るけれど、ドル建ての合計コストが減るのは観察要約の方。\n- **contrastive feedback の効き目は実は控えめ**: AppWorld で contrastive 抜きは 50.6、ありは 51.2。差は **+0.6pt** しかない。著者は強調しているが ablation 上は marginal。\n- **optimizer LLM の選び方**: `o3` で 51.2、`gpt-5` で 50.6、`gpt-4.1` だと 47.6 まで落ちる。要約ルールを書き直す側には「考えるのが得意な強い AI」が要る。\n- **しきい値 sweet spot**: $T_{\\sf hist}=4096$、$T_{\\sf obs}=1024$ がちょうど良い。小さくしすぎると要約頻度が増えて精度が下がる。\n- **OfficeBench は train/test を著者が自作で 92:95 に分けた**ので、テストへの「漏れ」がゼロとは保証されていない（要約ルールが間接的にテストに引っ張られる可能性）。\n- **「世界モデルとしての context」**: 著者は agent の context を「環境の世界モデル」と呼んでいる。中に入っている情報は (a) 因果関係（メールを送ると下書きが残る）、(b) 変化する状態（口座残高）、(c) 前提条件（ログインが必要）、(d) 未来の判断の手がかり（締切日）の 4 種類。これら全部を残すのが難しいから、ただの要約じゃダメ、という主張。\n- **訓練設定**: LoRA rank 16, α=32, 学習率 $10^{-4}$, 3 epoch, バッチ 4, 系列長 10k, AdamW + 5% warmup + weight decay 0.01, A100 80GB GPU 1 枚。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2510.00615v2/`\n- 正規ノート: `notes/arXiv-2510.00615v2.md`\n";
const MACROS = {"\\cmark": "\\checkmark", "\\xmark": "\\ding{55}", "\\yc": "{\\color{cyan}{#1}}", "\\RED": "{\\color{red}{#1}}", "\\huinan": "\\textcolor{blue}{\\textbf{[Huinan:} #1\\textbf{]}}", "\\rsim": "\\textcolor{olive}{\\textbf{[RSim:} #1\\textbf{]}}", "\\lw": "\\textcolor{teal}{\\textbf{[LW:} #1\\textbf{]}}", "\\wn": "{\\color{brown}{#1}}", "\\ours": "\\textsc{Acon}\\xspace", "\\lowours": "\\textsc{Acon}\\xspace", "\\eg": "\\textit{e.g.,}\\xspace", "\\UTIL": "{\\protect\\color{chocolate} $\\overline{\\underline{\\textsc{ut}}}$}\\xspace", "\\COMP": "{\\protect\\color{indigo} $\\overline{\\underline{\\textsc{co}}}$}\\xspace", "\\SAG": "{\\protect\\color{indigo} $\\overline{\\underline{\\textsc{\\texttt{sag}}}}$}\\xspace", "\\sectionautorefname": "Section", "\\subsectionautorefname": "Section", "\\subsubsectionautorefname": "Section", "\\fix": "\\marginpar{FIX}", "\\new": "\\marginpar{NEW}", "\\train": "\\mathcal{D}", "\\valid": "\\mathcal{D_{\\mathrm{valid}}}", "\\test": "\\mathcal{D_{\\mathrm{test}}}", "\\tens": "\\bm{\\mathsfit{#1}}", "\\etens": "\\mathsfit{#1}", "\\KL": "D_{\\sf KL}", "\\hKL": "\\hat{D}_{\\sf KL}", "\\argmax": "\\operatorname{arg\\,max}", "\\argmin": "\\operatorname{arg\\,min}", "\\arraystretch": "1.3"};
