<script>
const RAW = "# Continuous Thought Machines（脳みたいに「時間を使って考える」AI モデル）\n\n- arXiv: https://arxiv.org/abs/2505.05522\n- 一次ソース: ../papers/arXiv-2505.05522v4/\n- 正規ノート: ../notes/arXiv-2505.05522v4.md\n\n---\n\n## 一言で言うと\n\nAI の中の「ニューロン」一個一個に時間の流れと個性を持たせ、ニューロン同士の「タイミングの合い方」を答えに使う新しい仕組みを作ったよ、という研究。\n\n## どんな問題を解こうとしてるの？\n\n- 人間の脳の中には「ニューロン」という小さな部品がたくさんあって、お互いに電気信号でやり取りしている。生きている脳では「いつ信号を出すか」「他のニューロンと同じタイミングで光るか」がとても大事。\n  - 例え話: クラスで一斉に拍手するとき、みんなのタイミングが揃うほど「拍手」だと分かる。バラバラだと、ただの雑音。脳もこの「タイミングの揃い方」で情報をやり取りしている、というのが生物学者の考え方。\n- ところが今ふつうに使われている AI（ニューラルネットワーク、← 脳の真似をして作った、たくさんの数字の掛け算でできた計算機）では、計算を速くするためにこの「いつ光るか」という情報を捨ててしまっている。一瞬の写真みたいに「今の状態」だけを次へ次へと渡している。\n- 著者は「これだと AI が柔軟に考えたり、初めて見るものに応用したり、常識を持つのが難しい原因になっているのでは？」と疑った。\n- これまでの方法（LSTM ← 時間に沿って情報を覚えておける昔ながらのネットワーク、Transformer ← 今いちばん人気のある、言葉や画像を扱う巨大なネットワーク）は、時間を扱えるものはあったけれど、ニューロン 1 個 1 個の時間的な振る舞いを「答えそのもの」に使うアイデアはなかった。\n\n## どうやって解いたの？\n\n### コアアイデア\n\n著者は **Continuous Thought Machine（CTM）** という新しいモデルを作った。日本語にすると「ずっと考え続ける機械」みたいな意味。CTM の中には 2 つの新しい工夫がある。\n\n1. **ニューロン 1 個 1 個に「自分専用の小さな脳」を持たせる**。ふつうの AI ではすべてのニューロンが同じ単純な計算（たとえば「0 より大きいときだけ値を通す」）をする。CTM ではニューロンごとに違う重み（← 計算の中で使う、覚えておく数字）を持つミニ計算機をくっつける。\n2. **答えに使うのは「ニューロンの一瞬の値」ではなく「ニューロン同士のタイミングの合い方」**。たとえば 2 人の人がジャンプするときに「同じタイミングでジャンプしているか / ズレているか」を答えに使うイメージ。\n\n例え話: クラスの 32 人の生徒（ニューロン）がいて、それぞれ自分なりのペースで「手を上げる／下ろす」を 75 回繰り返す。ふつうの AI は「今、誰が手を上げてる？」のスナップショット（一瞬の写真）を見て答えを出す。CTM は「A さんと B さんは同じタイミングで手を上げているね」「C さんと D さんは逆だね」という **ペアの合い方** を見て答えを出す。これだとニューロンたちが自由に動いても、合い方さえ揃えれば情報が伝わる。\n\n### 仕組み\n\n論文の図 1（main.tex L245-249）にある順番をなぞると:\n\n- step1: 入力データ（画像や迷路）を **特徴抽出器**（← 画像を数字の集まりに変える小さなネットワーク。ResNet ← 「残差ネットワーク」という有名な画像 AI）でいったん数字の集まりにする。\n- step2: モデルは **内部時刻** $t = 1, 2, \\dots, T$ という、データとは別の「自分だけの時計」を持っている。たとえば $T=75$ なら 75 回、頭の中で考え直す。\n- step3: 各内部時刻ごとに **シナプスモデル**（← ニューロンの間で情報をやり取りする部分。人間の脳のニューロンをつなぐ「シナプス」から名前を取った）が動いて、各ニューロンに「次の入力」を渡す。\n- step4: 各ニューロンは自分の **直近 $M$ 回ぶんの履歴**（過去 $M$ ステップで自分に来た入力を順に並べたもの）を、自分専用のミニ計算機 **NLM（Neuron-Level Model = ニューロンレベルの小さなネットワーク）** に通して、新しい値を出す。\n- step5: ニューロンたちの新しい値をぜんぶ並べた表 $\\mathbf{Z}^t$（← 横が時間、縦がニューロン番号の表）から、**同期行列 $\\mathbf{S}^t$**（← 「2 つのニューロンの動きがどれくらい揃っているか」を全ペアで表した表）を作る。\n- step6: $\\mathbf{S}^t$ の中からいくつかの値をサンプリング（← 全部使うと量が多すぎるので、決まった数だけ選び取ること）して、その値から **答え $\\mathbf{y}^t$** と **注目先 $\\mathbf{q}^t$**（← attention のクエリ。次に画像のどこを見るかを決めるための「目印」）を計算する。\n- step7: 注目先 $\\mathbf{q}^t$ を使って **アテンション**（← AI に「画像のここを見ろ」と教える仕組み）で画像のどこを見るか決めて、その情報を次の内部時刻の入力に混ぜる。\n- step8: これを $T$ 回繰り返す。途中で出た答え $\\mathbf{y}^1, \\dots, \\mathbf{y}^T$ のうち「もっとも当たっていた瞬間」と「もっとも自信があった瞬間」の 2 つを使って学習する（下の「主要な数式 (3)」参照）。\n\n### 主要な数式\n\n#### (1) ニューロン 1 個ずつに専用の小さなネットワーク\n\n$$\\mathbf{z}_d^{t+1} = g_{\\theta_d}(\\mathbf{A}_d^t)$$\n\n**この式が言ってること**: $d$ 番目のニューロンは、自分の過去 $M$ 回ぶんの入力を見て、自分専用の小さなネットワークに通して、次の値を計算する。「ニューロンごとに違うミニ計算機を持っている」のがポイント。\n\n**記号の意味**:\n- $d$ … ニューロンの番号（たとえば 2048 個あれば $d = 1, 2, \\dots, 2048$）\n- $t$ … 内部時刻（モデルの中だけにある時計の何回目か、$t = 1, 2, \\dots, T$）\n- $\\mathbf{A}_d^t$ … ニューロン $d$ が直近 $M$ 回で受け取った入力を順に並べたもの（数を $M$ 個並べた表）\n- $g_{\\theta_d}$ … ニューロン $d$ 専用のミニ計算機（中で重み $\\theta_d$ という数を使う。← 学習で少しずつ調整される数）\n- $\\mathbf{z}_d^{t+1}$ … ニューロン $d$ の、次の内部時刻での値\n\n**身近な例え**: クラスの全員に「最近 25 日ぶんの自分の宿題提出状況のメモ」を渡して、それを見てから「明日どう過ごすか」を決めさせるイメージ。しかも一人ひとり考え方のクセ（$\\theta_d$）が違うので、同じメモを見ても出てくる答えが違う。\n\n#### (2) 答えに使うのは「ニューロン同士の合い方」\n\n$$\\mathbf{S}^t = \\mathbf{Z}^t \\cdot (\\mathbf{Z}^t)^\\intercal$$\n\n**この式が言ってること**: 「ニューロンたちのこれまでの動きの履歴」をまとめた表 $\\mathbf{Z}^t$ を使って、**どの 2 つのニューロンがどれくらい似た動き方をしているか** を全ペアぶん計算する。これが CTM の「答えのもと」になる。\n\n**記号の意味**:\n- $\\mathbf{Z}^t$ … 縦がニューロン番号、横が時間（$t$ までの全内部時刻）の表。たとえば 2048 個のニューロンが 75 回ずつ動いたら 2048 行 × 75 列の表。\n- $(\\mathbf{Z}^t)^\\intercal$ … 「縦と横をひっくり返した」表（数学では「転置」と呼ぶ）。元が 2048 行 × 75 列なら 75 行 × 2048 列になる。\n- $\\mathbf{S}^t$ … 「ニューロン $i$ とニューロン $j$ の動きの合い具合」を全ペアぶん書き込んだ正方形の表（2048 行 × 2048 列）。\n- $\\cdot$ … 表どうしの掛け算（「内積」と呼ばれる計算。2 つの動きが似ているほど大きい数字、逆ほど小さい・マイナスの数字になる、というルールがある計算と思って OK）\n\n**身近な例え**: 2 週間ぶんの天気を記録する。A 君は毎日「晴れたら +1、雨なら −1」、B 君も同じように記録する。2 週間ぶんの数を「掛け算して全部足す」と、A と B の天気が毎日揃っていれば大きいプラスに、逆になっていればマイナスになる。これを **クラス全員のペア** で計算した表が $\\mathbf{S}^t$。CTM は「この表のどこに大きい値があるか」を答えにする。\n\n#### (3) 2 つの「ご褒美ポイント」で学習する\n\n$$L = \\frac{\\mathcal{L}^{t_1} + \\mathcal{L}^{t_2}}{2}$$\n\n**この式が言ってること**: 75 回ある内部時刻のうち **2 か所だけ** を選んで、その 2 か所での「間違い度」を平均したものを最終的な「間違い度」とする。選ぶ 2 か所は (a) いちばん当たっていた時刻 $t_1$ と、(b) いちばん自信があった時刻 $t_2$。これで「速く解ける問題は速く、難しい問題は時間をかける」という賢い止まり方を、わざわざ別の仕組みを足さなくても自然に学んでくれる。\n\n**記号の意味**:\n- $\\mathcal{L}^t$ … 内部時刻 $t$ で出した答えがどれくらい間違っているかを表す数字（「ロス」「損失」と呼ぶ。← 小さいほど良い、テストの間違い数みたいなもの）\n- $t_1$ … 75 回のうち $\\mathcal{L}^t$ がいちばん小さかった（＝いちばん当たっていた）時刻\n- $t_2$ … 75 回のうち「モデル自身がいちばん自信を持っていた」時刻（自信度 $\\mathcal{C}^t$ がいちばん大きかった時刻）\n- $L$ … 最終的にモデルが小さくしたい「間違い度」\n\n**身近な例え**: 1 つの問題に 75 回答え直すテストを受けたとする。先生は **「いちばん当たっていた回」** と **「あなたが『これだ！』と一番自信を持って書いた回」** の 2 回ぶんだけ採点する。これだと「自信があるときが当たっているとき」になるよう自然に練習できるし、簡単な問題なら早めに自信を持って終わらせていい、難しい問題なら粘って考えていい、という戦略を勝手に学ぶ。\n\n## 何がすごいの？\n\n論文の本文と表から、TeX に書いてある具体的な結果を拾ってきた。\n\n- **2D 迷路を解ける（main.tex L326-359）**: $39 \\times 39$ マスの迷路で、スタートからゴールまでの動き（左・右・上・下・待つ）を最大 100 ステップ予測する課題。CTM はパラメータ（← モデルが覚えている数字の総数）3200 万個で、LSTM ベースライン（4200 万〜1 億 900 万個）や単純なネットワーク（5480 万個）よりも高い精度を出した。位置を教えるヒント（位置埋め込み ← 「ここは画像の左上ですよ」と教える数）を **使っていない** のに、迷路の構造を頭の中で組み立てて解ける。\n- **学習で見たことのない大きさの迷路にも対応（main.tex L357-359）**: $39 \\times 39$ で訓練したのに、$99 \\times 99$ の大きな迷路にも、自分が学んだやり方を繰り返し当てはめることで解ける。\n- **ImageNet-1K（← 100 万枚以上の写真を 1000 種類に分ける有名な画像テスト）でも動く（main.tex L365-387）**: ResNet-152（← 画像処理によく使われる 152 層の有名なネットワーク）と組み合わせて、トップ 1 正解率 **72.47%**、トップ 5（上位 5 候補に正解が入っていたら OK）**89.89%**。著者は「SOTA（state-of-the-art ← その分野でいちばん良い記録）を狙ったわけではない」と明記している。\n- **適応的計算（adaptive compute ← 問題によって考える時間を変えること）が自然に出る（main.tex L384）**: 自信度 0.8 を超えたら止める、というルールを入れると、ほとんどの画像は 50 回の内部時刻のうち 10 回未満で答えが出せる。難しい画像には長く考える。\n- **キャリブレーション（← 「90% 自信がある」と言ったら本当に約 90% 当たる、ということ）が良い（main.tex L378-384）**: 普通のネットワークは自信過剰になりがちだが、CTM はちゃんと自信どおりに当たる。\n- **パリティ課題（← 0 と 1 が並んだ列を見て「ここまでで 1 はぐう数か奇数か」を答える課題）でアルゴリズム的な解き方を学ぶ（main.tex L389-441）**: 64 桁の列について 75 回や 100 回の内部時刻を使うと、同じパラメータ数の LSTM より良く、運が良いシード（← 学習の最初に振るサイコロの目）では完璧に解ける。注目（attention）の動かし方を見ると、列の先頭から末尾へ順に走査したり、逆に末尾から先頭へ走査したり、人間が見ても理解できるやり方を学ぶ。\n- **CIFAR-10（← 10 種類の小さなカラー画像を当てるテスト）で人間と比較（main.tex L478）**: 同じ画像で人間がどれくらい迷ったかというデータと比べて、CTM は人間に近い「迷い方」を示した。LSTM は人間と同じく自信不足だった、と書かれている。\n- **迷路の切り分け実験（ablation ← 部品を 1 つずつ外してみて、どれが効いているか調べる実験）（main.tex L1316-1319）**: 解けた率（solve rate）の比較。\n  - CTM: 65.9%\n  - NLM を外す（自分専用ミニ計算機なし）: 35.0%\n  - 同期行列を使わない: 37.5%\n  - LSTM に同期行列だけ足す: 33.8%\n  → **「ニューロン専用ミニ計算機」と「同期行列」の両方が揃って初めて効く** ことを示している。\n- **数字を順番に観測して計算する Q&A MNIST（main.tex L482）**: 数字を 1 つずつ順に見せて、後で「3 番目と 5 番目を足して 7 で割った余りは？」のような問題に答えさせる課題。CTM は同じ大きさの LSTM が 21% 以下しか正解できない難設定で 96% を超えた。\n- **強化学習（reinforcement learning, RL ← 「ご褒美」を頼りに自分で行動を学ぶ AI の分野）でも動く（main.tex L483）**: CartPole（棒を倒さないように台車を動かすゲーム）や MiniGrid Four Rooms（簡単な迷路ゲーム）で LSTM と同等の成績を出しつつ、より豊かな内部の動きを見せた。\n\n著者が論文で「貢献」として明示的に挙げているのは (1) CTM のアーキテクチャ自体、(2) 内部時間軸と自信度ベースの損失による native adaptive compute（後付けでなく自然に出てくる「考える時間の調整」）、(3) 迷路を位置情報なしで解く・画像を「見回す」・パリティをアルゴリズムとして解く・Q&A MNIST で同期行列を記憶として使う、などの **創発的な振る舞い**（emergent behavior ← わざわざ教えていないのに勝手に出てくるかしこい挙動） だ（main.tex L213-219）。\n\n## キーワード辞典\n\n- **ニューラルネットワーク（neural network）** … 脳の真似をして作った、たくさんの数字の掛け算でできた計算機。\n- **ニューロン（neuron）** … ネットワークの中の小さな部品。1 個の数字を出す。\n- **重み（weight）** … 計算の途中で使う、学習で少しずつ調整される数字。\n- **学習（training）** … たくさんのデータを見せて、重みを少しずつ正解に近づける作業。\n- **損失 / ロス（loss）** … 答えがどれくらい間違っているかを示す数字。小さいほどえらい。\n- **内部時刻 / internal tick** … 入力データとは別に CTM が頭の中だけで進める時計。論文では $T=75$ や 50 回など。\n- **NLM（Neuron-Level Model）** … ニューロン 1 個 1 個に付けた専用の小さなネットワーク。自分の過去の入力履歴を見て次の値を出す。\n- **同期 / synchronization** … 2 つのニューロンが同じタイミングで似た動きをしているかどうか。\n- **同期行列 $\\mathbf{S}^t$** … 全ペアの同期度を書き込んだ正方形の表。\n- **シナプス（synapse）モデル** … ニューロン同士をつなぐ部分。CTM では U-Net 型 MLP という形のミニネットワーク。\n- **MLP（Multi-Layer Perceptron）** … 多層パーセプトロン。一番単純なニューラルネットワークの種類。\n- **U-Net** … いったん情報を絞ってからまた広げる、U の字みたいな形のネットワーク。\n- **アテンション / attention** … 「次にどこを見るか」を決める仕組み。CTM では画像のどこを観察するかを選ぶのに使う。\n- **クエリ $\\mathbf{q}^t$** … アテンションで「これを探している」と伝える目印になる数の集まり。\n- **クロスアテンション（cross attention）** … 「自分の質問（クエリ）」と「別のデータ（画像の特徴）」を比べて重みを決めるアテンションの種類。\n- **特徴抽出器（feature extractor）** … 画像を、AI が扱いやすい数字の集まりに変える前処理ネットワーク。論文では ResNet を使う。\n- **ResNet** … 「残差ネットワーク」。画像処理でよく使われる有名なネットワーク。\n- **LSTM（Long Short-Term Memory）** … 時間に沿って情報を覚えておける昔ながらのネットワーク。CTM の比較相手。\n- **Transformer** … 言葉や画像を扱う今いちばん人気のあるネットワーク。CTM は直接の比較相手にはしていない。\n- **適応的計算（adaptive compute）** … 入力の難しさに応じて考える時間を変えること。\n- **キャリブレーション（calibration）** … 「○% の自信がある」と AI が言ったときに、本当にその% で当たること。\n- **位置埋め込み（positional embedding）** … 「これは画像の左上の点ですよ」と AI に教えるための数。CTM は迷路ではこれを **使わない**。\n- **パラメータ（parameter）** … モデルが覚えている数字の総数。多いほど大きいモデル。\n- **シード（seed）** … 学習をスタートするときに振るサイコロの目。これが違うと結果も少し変わる。\n- **創発（emergent）** … わざわざ教えていないのに、結果として勝手に出てくる賢い振る舞い。\n- **ベースライン（baseline）** … 比較相手にする、すでにある手法。\n- **SOTA（state-of-the-art）** … その分野でいちばん良い記録。CTM は SOTA を狙っていないと明記。\n- **アブレーション（ablation）** … 部品を 1 つずつ外して、何が効いているか調べる実験。\n- **強化学習（reinforcement learning, RL）** … 「ご褒美」を頼りに行動を自分で学ぶ AI の分野。\n- **CTC（Connectionist Temporal Classification）損失** … 「出力をいつ出すか」がズレてもいいように作られた損失の種類。CTM のソート実験で使う。\n- **CIFAR-10 / CIFAR-100** … 10 種類 / 100 種類のカラー画像を当てる練習用データセット。\n- **ImageNet-1K** … 1000 種類の画像を当てる、画像 AI 業界の代表的なテスト。\n- **MNIST** … 0〜9 の手書き数字を当てるシンプルなデータセット。\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **「同期 = 内積」の正確な式（main.tex L298-305）**: 論文では同期行列に **学習可能な指数減衰** $r_{ij} \\geq 0$ をかけている。これは「古いタイミングは少しずつ忘れて、最近のタイミングを重視する」ためのつまみ。$r_{ij} = 0$ なら全期間を平等に、$r_{ij}$ が大きいほど最近重視。タスクごとに最適な値が違って、迷路ではよく使われたが ImageNet ではほとんど使われなかった（main.tex L306 の脚注）。\n- **同期行列を効率よく計算する工夫（main.tex L302, Appendix sec:appendix-recursion）**: 普通に書くと内部時刻 $t$ ごとに $\\mathcal{O}(D^2 t)$ で爆発するが、一次再帰の形に書き直すことで $t$ ごとに $\\mathcal{O}(D_\\text{sub})$ で済む。これがないと大きいモデルでは現実的に動かない。\n- **ペアの選び方は 3 種類（main.tex L646-662）**: $D \\times (D+1)/2$ 個もある全ペアを使うのは多すぎるので、(a) Dense（少数のニューロンの全ペア）、(b) Semi-dense（2 グループの組み合わせ）、(c) Random（適当に選ぶ＋自分自身のペアを少し含めて、もし必要なら昔のスナップショット表現も復元できるようにする）から選ぶ。迷路では Dense、ImageNet では Random、パリティと Q&A MNIST は Semi-dense を使っていて、なぜそうなるかの原理的説明は論文にない（評者の感想として）。\n- **$t_1$ は学習中しか分からない**: 「いちばん間違いが少なかった時刻」$t_1$ は正解ラベルを使って計算するので、テスト時には決められない。学習時と推論（テスト）時で止め方の規準が違うのは、論文中で深く議論されていない点。\n- **パリティの学習はシード依存（main.tex L1024 付近 / Appendix）**: 75 内部時刻・記憶 25 で動かした 3 つのシードのうち 1 つは完璧でない解に収束。「完璧に解けた CTM はいつも『先頭→末尾の走査』か『逆順の走査』のどちらかを学ぶ」と Appendix の創発項目に書かれている。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2505.05522v4/`\n- 正規ノート: `notes/arXiv-2505.05522v4.md`\n";
