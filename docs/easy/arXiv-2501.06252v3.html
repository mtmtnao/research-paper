<script>
const RAW = "# Transformer-Squared: Self-adaptive LLMs（日本語パラフレーズ：「自分で自分の重さを調整できる、しゃべる AI」）\n\n- arXiv: https://arxiv.org/abs/2501.06252\n- 一次ソース: ../papers/arXiv-2501.06252v3/\n- 正規ノート: ../notes/arXiv-2501.06252v3.md\n\n---\n\n## 一言で言うと\n\nLLM（おしゃべり AI）が問題を見てから、自分の中の「専門家ベクトル」を選んで合体させ、答える前に頭の中身を切り替える仕組みを作った話。\n\n> ※ LLM（Large Language Model）＝大きな言語モデル。インターネット中の文章を山ほど読んで「次にどんな言葉が来そうか」を予想できるようにした AI のこと。ChatGPT などの中身。\n\n---\n\n## どんな問題を解こうとしてるの？\n\n身近な例で言うと、こういう感じ。\n\n- 君が「数学の問題」「英作文」「プログラミング」を 1 人でぜんぶできるように勉強するとする。\n- 全部いっしょに詰め込もうとすると、頭の中で混ざって、どの教科もちょっとずつヘタになる（**overfitting** や **task interference**＝詰め込みすぎでヘタになる現象）。\n- 教科ごとに別の参考書（＝専門家モジュール）を作って、必要なときに開けばいい、というアイデアがある。\n\nそこで普通使われているのが **LoRA**（ローラ）という方法。\n> LoRA（Low-Rank Adaptation）＝ AI の重さ（パラメータ）を全部書き換えるのは大変なので、「小さい付け足しシート」だけ新しく作って貼り付ける節約手法。\n\nでも LoRA には弱点がある:\n1. 教科ごとに「付け足しシート」を作ると、結局シートが分厚くなる（**パラメータ数が増える**）。\n2. シートが**狭い問題に過剰適応**（カンニングペーパーを丸暗記しすぎて応用が効かなくなる）しやすい。\n3. シートを**組み合わせて使う**（「数学＋論理」みたいに混ぜる）方法がきれいに決まっていない。\n4. 答えだけ書いてあるデータ（GSM8K の最後の数字だけなど）では、LoRA は「次の言葉を当てる」方式の勉強なので学習しづらい。\n\nこの論文は「**もっと少ない手書きメモで、しかも組み合わせ自由で、テスト本番中にも頭を切り替えられる**」AI を作ろう、という話。\n\n---\n\n## どうやって解いたの？\n\n### コアアイデア\n\n例え話: AI の中には「ピアノの音をたくさんかさねたオーケストラ」みたいなものが入っている。\nそれぞれの音（成分）は、音の高さは決まっているけど、**音量**は調整できる。\n\nこの論文の発想は「**音そのものは触らずに、音量つまみだけをいじる**」。\nつまり、AI の中の「ピアノの音色」はそのまま使い、各音色の**音量つまみを教科ごとに別セットで用意**しておく。\n本番では「あ、今は数学の問題っぽいから、数学用の音量セットに切り替えて答えよう」とやる。\n\nこれが **SVF（Singular Value Fine-tuning、エス・ブイ・エフ）**＝特異値ファインチューニング。\nそして、テストの最中に**まず問題をひと目見て、どの音量セットを使うか決める → そのあと答える**、という 2 段階の仕組みを **Transformer²（トランスフォーマー・スクエアド）** と呼ぶ。\n\n### 仕組み\n\n論文では学習と推論の 2 フェーズに分かれている。\n\n**[学習フェーズ — 教科ごとの「音量つまみセット」を作る]**\n\n- step1: AI の中の重さの板（**重み行列** $W$）を、SVD という分解法で「ピアノの音色 + 音量つまみ」に分ける。\n  > SVD（Singular Value Decomposition、特異値分解）＝四角い数字の表を「縦の音色 × 音量 × 横の音色」に分解する数学の道具。中学では習わないけど、「数字の大きい表を、3 つのもっと小さい部品にバラす」と思えば OK。\n- step2: 音色（$U$ と $V$ という部品）はそのままにして、**音量つまみ $z$**（教科ごとの数値リスト）だけを学習する。\n- step3: 教科（数学・コード・常識クイズ）ごとに、答え合わせをして「合ってたら +1、まちがってたら −1」のごほうび点をもらいながら、つまみを少しずつ良くしていく。これは **強化学習（RL, Reinforcement Learning）** という、犬のしつけと似た仕組み。\n  > 強化学習＝正解したらおやつ、まちがえたら無し、を繰り返して上達させる学習法。\n  > 具体的には **REINFORCE**（リインフォース）というシンプルなアルゴリズムを使う。\n- step4: ただし、つまみを全力でいじりすぎると元の AI の性格がこわれるので、「**もとの AI からあまり離れすぎないでね**」という罰（**KL ペナルティ**）も足す。\n  > KL ペナルティ＝「もとのしゃべり方とのズレ具合」に応じてマイナス点をつけるルール。\n\nこれで「数学用つまみセット $z^{(数学)}$」「コード用 $z^{(コード)}$」「常識クイズ用 $z^{(ARC)}$」など、教科ごとに**専門家ベクトル**（expert vector）ができあがる。\n\n**[推論（本番）フェーズ — 2 回読む]**\n\n- step5（1 パス目）: 入ってきた問題を AI に読ませて、「これは何の教科か？」を判断させ、それに合ったつまみセット $z'$ を選ぶ／作る。\n- step6（2 パス目）: 重み行列 $W$ を「**つまみを切り替えた $W'$**」に置き換えてから、本当の答えを生成する。\n\nstep5 の「どうやって選ぶか」に 3 つやり方がある（テスト本番でどれだけヒントが使えるかで使い分け）:\n\n- **(A) Prompt**: AI に「これ何の教科？」と聞いて、その答えで 1 つ選ぶ。一番カンタン。\n- **(B) Cls-expert**: 「教科を当てるためだけの専用つまみセット $z^c$」を別途学習しておいて、それで判定する。Prompt より精度が高い。\n- **(C) Few-shot**: その教科の練習問題を数問だけ用意して、「数学用 30% + ARC 用 50% + コード用 20%」みたいに**つまみ同士を混ぜる比率**を CEM という探索法で決める。一番強い。\n  > CEM（Cross-Entropy Method）＝「いろんな比率をランダムに試して、上位だけ残してまた試す」を繰り返す方法。サイコロをふって良かった目だけ覚えていく感じ。\n  > few-shot＝「お手本を数問見せる」やり方。\n\n### 主要な数式\n\n論文の中核は次の 3 つ。\n\n---\n\n**① 重みのバラし方（SVD と SVF のつまみ）**\n\n$$ W' = U \\, \\Sigma' \\, V^{\\mathsf{T}}, \\qquad \\Sigma' = \\Sigma \\otimes \\mathrm{diag}(z) $$\n\n**この式が言ってること**: もとの重み板 $W$ を「縦音色 × 音量 × 横音色」に分けたあと、**音量の部分だけ** $z$ というつまみで一つひとつスケール（拡大／縮小）して、新しい重み板 $W'$ を作るよ、ということ。音色そのもの（$U$ と $V$）は触らない。\n\n**記号の意味**:\n- $W$ … もとの AI の中にある四角い数字の表（重み行列）。ここをいじって AI の性格を変える。\n- $U$ … 「縦の音色集」（重み行列の左がわの部品）。今回は固定。\n- $V$ … 「横の音色集」（右がわの部品）。今回は固定。\n- $V^{\\mathsf{T}}$ … $V$ を縦横ひっくり返したもの（**転置**）。中学では出てこないけど、「表をたおして向きを変える」だけ。\n- $\\Sigma$ … もとの音量を並べた表（対角線にだけ数字がある特別な表）。\n- $\\Sigma'$ … 音量を変えたあとの新しい音量表。\n- $z$ … 教科ごとに学習する「音量つまみのリスト」。長さは音色の数 $r$ だけある。\n- $\\mathrm{diag}(z)$ … $z$ のリストを対角線にならべて表にしたもの。\n- $\\otimes$ … 中身の数字どうしを「対応する位置でかけ算する」しるし。\n- $r$ … 音色の数（$W$ が縦 $n$、横 $m$ なら $r = \\min(n, m)$、小さい方）。\n- $W'$ … つまみを変えたあとの新しい重み板。\n\n**身近な例え**: イコライザー付きのラジカセを想像しよう。**低音／中音／高音のつまみ** ($z$) を、曲のジャンル（教科）ごとに別セットで覚えておく。曲が始まったら、その曲用のつまみセットに一発でガチャンと切り替える。**スピーカーやマイクそのものは取り替えていない**（$U$, $V$ は固定）のがミソ。\n\n---\n\n**② 学習のごほうび関数（REINFORCE + KL ペナルティ）**\n\n$$ J(\\theta_z) = \\mathbb{E}\\!\\left[\\log \\pi_{\\theta_{W'}}(\\hat{y}_i \\mid x_i)\\,r(\\hat{y}_i, y_i)\\right] - \\lambda \\, D_{\\mathrm{KL}}\\!\\left(\\pi_{\\theta_{W'}} \\,\\|\\, \\pi_{\\theta_W}\\right) $$\n\n**この式が言ってること**: 「**正解したら、その答え方をもっとしやすくする**。まちがえたら、その答え方をしにくくする。ただし、**もとの AI からあまり性格が変わりすぎないように**罰を入れる」。これを満たす方向に、つまみ $z$ を少しずつ動かすよ、という最大化したい目標。\n\n**記号の意味**:\n- $J(\\theta_z)$ … つまみ $z$ をどれくらい良いかを表す「点数」。これを大きくしたい。\n- $\\theta_z$ … 学習対象のつまみセット（要するに $z$ をぜんぶまとめたもの）。\n- $\\theta_{W}$ … もとの AI の重さ全部。\n- $\\theta_{W'}$ … つまみで書き換えたあとの AI の重さ全部。\n- $\\pi_{\\theta_W}$ … もとの AI が「次にどの言葉を出すか」の出し方（くせ・確率）。\n  > $\\pi$ は「ポリシー」、「AI の答え方のクセ」のことだと思ってよい。\n- $\\pi_{\\theta_{W'}}$ … 新しい AI（つまみ書き換え後）の答え方のクセ。\n- $x_i$ … 入力の問題（$i$ 番目）。\n- $\\hat{y}_i$ … AI が出した答え。\n- $y_i$ … 正解の答え。\n- $r(\\hat{y}_i, y_i)$ … 答え合わせ点。あってれば +1、まちがいなら −1 の 2 択。\n- $\\log \\pi_{\\theta_{W'}}(\\hat{y}_i \\mid x_i)$ … 「新しい AI が、問題 $x_i$ に対してその答え $\\hat{y}_i$ をどれくらい出しやすいか」を表す数。\n  > log（対数）＝中学では習わないけど、ここでは「確率を、足し算しやすい形に変えた量」と思えばよい。確率が大きいほど log も大きい（0 に近づくほどマイナスに大きい）。\n- $\\mathbb{E}[\\cdots]$ … 「いろんな問題で平均すると」という意味（**期待値**＝平均みたいなもの）。\n- $D_{\\mathrm{KL}}(P \\,\\|\\, Q)$ … 2 つの「答え方のクセ」 $P$ と $Q$ がどれくらいズレているかの距離。0 ならまったく同じ。\n- $\\lambda$ … 「ズレちゃダメ罰」の強さを決める小さい数。\n- $\\|$ … KL の中で「$P$ と $Q$ を比べる」しるし。割り算ではない。\n\n**身近な例え**: 部活のテスト勉強。\n- 「正解したやり方は次もやる、まちがえたやり方はやめる」← 第 1 項。\n- 「でもキャラが激変したら**もともと得意だった他の科目**まで忘れちゃうから、性格の変化は控えめに」← $\\lambda$ で罰する第 2 項。\nこれがあるおかげで、数学のためにつまみを動かしすぎて国語ができなくなる事故を防いでいる。\n\n---\n\n**③ Few-shot 適応で複数のつまみを混ぜる**\n\n$$ z' = \\sum_{k=1}^{K} \\alpha_k \\, z_k $$\n\n**この式が言ってること**: 教科 1〜$K$ で学習した $K$ 個のつまみセット $z_k$ を、それぞれの**混ぜ具合** $\\alpha_k$ で**足し合わせて**、本番用の新しいつまみセット $z'$ を作るよ、ということ。混ぜ具合 $\\alpha_k$ は CEM で「練習問題で点が高くなる組み合わせ」を探して決める。\n\n**記号の意味**:\n- $z'$ … 本番で実際に使うつまみセット（新しいオリジナル）。\n- $K$ … 学習で用意した教科の数（この論文では 3 つ: 数学・コード・常識クイズ）。\n- $k$ … 教科の番号（1, 2, …, $K$）。\n- $z_k$ … $k$ 番目の教科のつまみセット。\n- $\\alpha_k$ … $k$ 番目のつまみセットをどれだけ混ぜるかの割合（数）。\n- $\\sum$ … 「ぜんぶ足す」しるし。\n\n**身近な例え**: ジュースのブレンド。リンゴ汁・オレンジ汁・ブドウ汁を $\\alpha_1, \\alpha_2, \\alpha_3$ の割合で混ぜると、新しいオリジナルジュースができる。最初に試飲（few-shot 練習問題）して「今日の気分にはリンゴ多めがいいな」と比率を決め、その比率で大きいピッチャーぶん混ぜる感じ。\n\n---\n\n## 何がすごいの？\n\n論文 TeX に書かれている主な結果（Table 1, 2, 3, 4, 5 と本文 + 正規ノートで裏取り済み）。\n\n**(1) SVF が LoRA より強い（学習した教科で）**\n- Llama3-8B-Instruct + GSM8K（小学校レベル算数文章題）: 元の 75.89 → **SVF で 79.15**（LoRA は 77.18）。\n- Mistral-7B-Instruct-v0.3 + GSM8K: 42.83 → **49.74**（「+16%」改善と本文に明記）。\n- Llama3-70B-Instruct + GSM8K: 85.29 → **88.32**（LoRA は同条件で 77.26 にむしろ崩れる）。\n- 視覚言語モデル（VLM、Llama3-Llava-Next-8B）の TextVQA で **39% 以上**の改善（本文記載）。\n\n**(2) 学習してない教科にも適応できる（Table 2）**\n- Llama3-8B、MATH（中学〜高校レベル数学）: 24.54 → **25.47**（Few-shot）。\n- Llama3-8B、Humaneval（プログラム書く）: 60.98 → **62.99**（Few-shot）。\n- Llama3-8B、ARC-Challenge（常識クイズ難）: 80.63 → **82.61**（Few-shot）。\n- Mistral-7B + Humaneval: 43.29 → **47.40**（Few-shot）。\n- 同じ条件で LoRA は MATH や Humaneval を**大きく悪化**させる（例：Llama3-70B の MATH で 40.64 → 25.40）。\n\n**(3) 3 つの戦略はキレイに順位がつく**\n- Prompt < Cls-expert < Few-shot。**テスト本番で使える情報が増えるほど良くなる**という単調な階段。\n\n**(4) 推論コストは生成系では実用的（Table 3）**\n- 1 パス目／2 パス目の比は MATH **13%**、Humaneval **19%**、ARC-Challenge **47%**。生成が長いほど 1 パス目の判定コストは相対的に安い。\n\n**(5) パラメータがとても少ない（Table 4）**\n- SVF は MLP + attention 両方やっても **0.58M** パラメータで GSM8K 79.23 / MATH 25.04。\n- LoRA に RL を組み合わせるとぐちゃぐちゃに崩れる（**6.82M** で GSM8K 57.92 / MATH 15.72）。SVF + RL の方が**桁違いに小さくて、しかも強い**。\n\n**(6) 違う AI 同士でつまみを流用できる（Table 5、本文 Analysis 4）**\n- Llama で学んだつまみ $z$ をそのまま Mistral にあてはめても**3 教科中 2 教科で改善**。\n- ただし、$z$ の中身の**順番をシャッフルすると壊れる**（順番に意味があるという証拠）。\n\n**論文中で著者が「貢献（contribution）」として挙げているのは:**\n1. **Transformer² という自己適応フレームワーク**そのもの。事前に作っておいた専門家たちを、本番中に動的に組み合わせる方法。\n2. **SVF という新しい PEFT**（パラメータの少ないファインチューニング法）。RL とも相性が良く、組み合わせ自由で、過学習しにくい。\n3. **3 つの適応戦略**（Prompt / Cls-expert / Few-shot）。場面によって使い分けられる。\n\n---\n\n## キーワード辞典\n\n出てくる順で、中学生むけの 1 行定義。\n\n- **LLM（Large Language Model、大規模言語モデル）** … 文章をたくさん読んで、続きの言葉をうまく当てられるようにした巨大 AI。ChatGPT の中身。\n- **self-adaptive（自己適応）** … 状況を見て自分のパラメータを変える性質。\n- **fine-tuning（ファインチューニング）** … できあがった AI に「追加練習」をさせて特技を持たせること。\n- **PEFT（Parameter-Efficient Fine-Tuning）** … パラメータをほぼ増やさずに追加練習する省エネ手法のジャンル。\n- **LoRA（Low-Rank Adaptation）** … PEFT の代表。AI の重さの「上書きシート」を、低ランク（少ない数字）で作って貼り付ける。\n- **重み行列（weight matrix） $W$** … AI の中で入力をかけ算して出力を作る、四角い数字の表。これがいっぱい積み重なって AI ができている。\n- **SVD（Singular Value Decomposition、特異値分解）** … 四角い表を「縦音色 × 音量 × 横音色」の 3 つにバラす数学の道具。\n- **特異値（singular value） $\\sigma_i$** … バラした音量の各成分。大きいほど大事な成分。\n- **SVF（Singular Value Fine-tuning）** … この論文の提案手法。音量だけ教科ごとに切り替える追加練習。\n- **expert vector（専門家ベクトル） $z$** … 教科ごとに学習したつまみセット。教科ごとに 1 本ずつ作る。\n  > ベクトル＝数を順番に並べたもの。たとえば「(身長 165, 体重 55, 視力 1.0)」のように、複数の数字で 1 つの何かを表す道具。\n- **RL（Reinforcement Learning、強化学習）** … 正解にはおやつ、まちがいには無し、を繰り返して上達させる学習法。\n- **REINFORCE** … 強化学習の昔ながらのシンプルなやり方。1992 年に Williams が提案。\n- **報酬（reward） $r$** … 正解 +1、まちがい −1 の 2 択点数。\n- **KL（KL divergence）** … 2 つの「クセ」がどれくらいちがうかを測るものさし。\n- **$\\lambda$**（ラムダ） … KL 罰の強さの小さい数。\n- **Transformer²（トランスフォーマー・スクエアド）** … この論文のフルシステム名。2 回読んで答える仕組み。\n- **2 パス推論** … 「1 回目で何の問題か見る → 2 回目で答える」の 2 段階。\n- **Prompt 戦略** … AI に「何の教科？」と聞いて分類させる方式。\n- **Cls-expert 戦略** … 教科を当てる専用のつまみセット $z^c$ を別途用意する方式。\n- **Few-shot 戦略** … 練習問題で混ぜ具合を決めて、複数のつまみセットを足し算する方式。\n- **few-shot prompt** … お手本の問題を数問見せること。\n- **CEM（Cross-Entropy Method、クロスエントロピー法）** … ランダムに試して上位だけ覚える、を繰り返す最適化法。\n- **GSM8K** … 小学校算数の文章題ベンチマーク。\n- **MATH** … 数学コンテスト級の難しい問題集。\n- **MBPP-Pro** … プログラミング問題集。\n- **Humaneval** … プログラミング問題集（別のやつ）。\n- **ARC-Easy / ARC-Challenge** … 常識クイズの簡単版／難しい版。\n- **TextVQA / OKVQA** … 画像を見ながら質問に答える（視覚言語）タスク。\n- **VLM（Vision-Language Model）** … 画像と文章を両方あつかえる AI。\n- **MoE（Mixture of Experts）** … 「複数の専門家を並べてトークンごとに切り替える」アーキテクチャ。論文はこれと違い、**問題ごと**に切り替える。\n- **overfitting（過学習）** … 練習問題に合わせすぎて本番でこける現象。\n- **task interference（タスク干渉）** … いろんな教科を一度に詰めると互いに足を引っ張る現象。\n\n---\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **なぜ「音量だけ」で十分強くなるのか**: 大きな AI の重み $W$ にはすでに知識がぎっしり詰まっており、$U$ や $V$（音色）に「役立つ部品」がもう含まれている、という仮説（先行研究 Sharma+ 2023）。新しい知識を加えるより、**もう持っている部品の使い方を変える**方が省エネで効くという主張。\n- **LoRA はなぜ組み合わせにくいか**: LoRA は $A, B$ という 2 つの行列をかけて使うが、$A B = (A P)(P^{-1} B)$ のように見た目の数字を入れ替える自由があり、同じ機能の LoRA でも数字の並びがバラバラになりうる。複数 LoRA を「足す」と、この並びの不一致でぐちゃぐちゃになる。SVF は $U, V$ を共通で固定して $\\sigma$ にだけ手を入れるので、つまみ同士の足し算が意味を持つ。\n- **どこの層にあてるか（アブレーション、Table 4）**: MLP だけ、attention だけ、両方、を比較していて、両方が一番強い。MLP 単独でも attention 単独より効くと報告。\n- **報酬がスパースだと困る**: ベースの AI が問題をほとんど解けないと、報酬 $r$ がほぼ常に −1 になり学習信号が消える。著者自身が conclusion と sec3 で limitation として明記している。\n- **CEM のコスト**: 教科の数 $K$ が増えると探索する $\\alpha$ の次元も増えるので、本番前の「1 回だけ走る」コストが上がる。これも著者が conclusion で認めている。\n- **Llama3-70B + MATH だけは惜しい**: 40.64 → 40.44（Prompt 戦略）で、わずかに劣化。GPU 不足で「半分の層だけ SVF した」と論文に断りがある。Few-shot や Cls-expert を 70B + MATH で動かしたらどうなるかは本文表からは読めない（正規ノートでも限界として指摘されている）。\n- **Cross-model 転移は「順序の意味」が鍵**: Llama で学んだ $z$ を Mistral にあてる実験で、$z$ の中身を**順番シャッフル**するとガクッと落ちる。これは「i 番目のつまみは i 番目に大きい音色をいじっている」という**並びそのもの**に転移性があるという証拠。\n\n---\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2501.06252v3/`\n- 正規ノート: `notes/arXiv-2501.06252v3.md`\n- GitHub: https://github.com/SakanaAI/self-adaptive-llms\n";
