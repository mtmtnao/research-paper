<script>
const RAW = "# Learning Transferable Visual Models From Natural Language Supervision（自然な言葉を「先生」にして、いろんな画像分類ができる AI を作った話 ＝ CLIP）\n\n- arXiv: https://arxiv.org/abs/2103.00020\n- 一次ソース: ../papers/arXiv-2103.00020v1/\n- 正規ノート: ../notes/arXiv-2103.00020v1.md\n\n---\n\n## 一言で言うと\n\nネットから集めた 4 億枚の「画像＋説明文」ペアで AI を学習させ、追加学習なしで新しい画像分類タスクを解けるようにした研究。\n\n## どんな問題を解こうとしてるの？\n\n- **困りごと**: それまでの画像認識 AI は「犬・猫・車…」みたいに、あらかじめ決められた 1000 個の答えしか出せなかった。「もしこの AI に新しく『たい焼き』を見分けてほしい」と思ったら、たい焼きの写真をたくさん集めて、人が「これはたい焼き」とラベルを 1 枚ずつ貼り直して、学習させる必要があった。とても大変。\n- **たとえると**: 単語帳が 1000 語しか入っていない辞書みたいなもの。それ以外の単語を覚えさせるには、毎回新しい単語帳を作り直さないといけない。\n- **これまでのやり方の何が足りなかったか**:\n  - ImageNet（1000 種類のラベル付き画像データ）や JFT-300M（18291 種類）など、「人が手作業でラベルを貼った」データに頼っていた。集めるのが超大変。\n  - 自然言語の説明文を使う先行研究（Visual N-Grams）は、ImageNet で 11.5% しか正解できなかった（同じ ImageNet を頑張って学習した普通の AI は 88.4% も正解できる）。実用に程遠かった。\n  - 一方 NLP（自然言語処理）の世界では GPT-3 などが「ネットから集めた大量の文章だけで」何でもできるようになっていた。**「画像でも同じことができないの？」** というのがこの論文の出発点。\n\n## どうやって解いたの？\n\n### コアアイデア\n\nネットには「画像と、その画像を説明する文章」がペアになっているものが山ほどある（SNS の投稿、商品ページ、ニュース写真のキャプションなど）。これを 4 億組も集めてくれば、人手でラベルを貼らなくても AI に色んな視覚概念を教えられるはず。\n\nそして学習のやり方は「画像から説明文を一字一句作らせる」のではなく、**「画像とその正しい説明文を、間違った説明文の中から当てさせる」** という、もっと簡単なクイズに変えた。これがミソ。\n\n例えると、テストで「次の絵にあう英文を 1 から完全に書きなさい」（むずかしい・答えがいっぱいある）ではなく、「次の絵にあう英文を選択肢 32768 個から選びなさい」（やさしい・答えが 1 つ）に変える感じ。後者の方がずっと速く学習が進む。\n\n### 仕組み\n\n- step1: ネットから画像と説明文のペアを 4 億組集める（このデータセットを **WIT**＝WebImageText と呼ぶ）。\n- step2: 集め方は、英語版 Wikipedia でよく出てくる 50 万個の単語・フレーズをクエリにして、各クエリにつき最大 2 万組ずつ集める（≒バランスよく色んな話題を入れる）。\n- step3: AI は 2 つのパーツでできている。\n  - **画像エンコーダ**: 画像を「数字の並び」に変換する（中身は ResNet または ViT という、有名な画像処理 AI）。\n  - **テキストエンコーダ**: 文章を「数字の並び」に変換する（中身は Transformer という、文章処理 AI）。\n  - ← この「数字の並び」のことを **ベクトル**（数を順番に並べたもの。住所の数字みたいに、複数の数で 1 つの物を表す道具）と呼ぶ。\n- step4: 学習はこんなクイズ形式。\n  - 1 回のクイズで画像 N 枚と説明文 N 個（論文では N=32768）を用意する。\n  - AI は N×N 個のすべての組合せを採点。\n  - 正しいペア（N 組）の点数を上げ、間違ったペア（N²−N 組）の点数を下げる。\n  - これを何回もくり返す（32 epoch ＝ 4 億組を 32 周）。\n- step5: 学習が終わったら **追加学習なしで** 新しい画像分類に使える。やり方：\n  - 分類したいラベル名（例: \"cat\", \"dog\", \"car\"…）をテキストエンコーダに通してベクトルにする。\n  - 分類したい画像も画像エンコーダに通してベクトルにする。\n  - 画像のベクトルと一番似ているラベルのベクトルを答えとする。\n- これを **ゼロショット (zero-shot) 分類** と呼ぶ ← 新しいタスクの学習データを 1 枚も使わずに分類すること。\n\n### 主要な数式\n\n#### 数式①：コサイン類似度（2 つのベクトルがどれくらい似ているか）\n\n$$ \\mathrm{sim}(a, b) = \\frac{a \\cdot b}{\\|a\\|\\,\\|b\\|} $$\n\n**この式が言ってること**: 2 つの「数字の並び（ベクトル）」が、向きとしてどれくらい似ているかを −1〜+1 の数字で表すよ。+1 なら完全に同じ方向、0 ならまったく無関係、−1 なら正反対。\n\n**記号の意味**:\n- $a, b$ … 比べたい 2 つのベクトル（CLIP では画像ベクトルと文章ベクトル）。\n- $a \\cdot b$ … 「内積」と呼ばれる計算。2 つの並びの同じ位置の数字をそれぞれ掛けて全部足したもの。例: $a=(1,2,3),\\ b=(4,5,6)$ なら $1\\cdot4+2\\cdot5+3\\cdot6=32$。\n- $\\|a\\|$ … ベクトル $a$ の「長さ」。中身を全部 2 乗して足してルートを取ったもの（三平方の定理を多次元に拡張したやつ）。$\\|a\\|\\,\\|b\\|$ で割るのは「長さの違いをなくしたい」から。\n- $\\mathrm{sim}(a, b)$ … 似ている度合い（最大 +1、最小 −1）。\n\n**身近な例え**: 2 人の友だちが「好きな食べ物ランキング」を 10 個ずつ書いたとする。順番がまったく同じなら $+1$（仲良し！）、てんでバラバラなら $0$、まったく逆順なら $-1$。CLIP も同じで「画像という人」と「文章という人」が同じ方向を向いているかをチェックしている。\n\n#### 数式②：CLIP の学習目標（ざっくり版）\n\n$$ \\mathrm{loss} = \\frac{1}{2}\\bigl(\\mathrm{loss}_{\\text{画像→文章}} + \\mathrm{loss}_{\\text{文章→画像}}\\bigr) $$\n\nここで $\\mathrm{loss}_{\\text{画像→文章}}$ は「N 枚の画像それぞれについて、N 個の文章の中から正しい 1 個を当てる」クイズの間違い度。「クロスエントロピー損失」と呼ばれる ← AI の答えが正解からどれくらいズレているかを表す数値で、当たれば 0 に近く、外れるほど大きくなる。\n\n**この式が言ってること**: 「画像から文章を当てるテスト」と「文章から画像を当てるテスト」の両方の点数の平均を取って、これが小さくなるように AI を訓練するよ。両方向にテストするから対称（symmetric）と呼ばれる。\n\n**記号の意味**:\n- $\\mathrm{loss}$ … 全体の間違い度。小さいほど良い。\n- $\\mathrm{loss}_{\\text{画像→文章}}$ … 各画像について「どの文章が相棒？」を 32768 択から選ぶクイズの平均間違い度。\n- $\\mathrm{loss}_{\\text{文章→画像}}$ … 各文章について「どの画像が相棒？」を 32768 択から選ぶクイズの平均間違い度。\n- $\\frac{1}{2}$ … 2 つを平均するため。\n\n**身近な例え**: 32768 人がいる体育館で「ペアダンス」をするとき、自分の本当の相手を見つけるゲーム。「男子から女子を見つける」「女子から男子を見つける」両方やって、間違いの平均を毎回減らしていくイメージ。間違うほど先生に怒られて（loss が大きくなって）、学習が進む。\n\n#### 数式③：温度つきソフトマックスでクラスを選ぶ（推論時）\n\n$$ p(\\text{画像が class } k) = \\frac{\\exp\\bigl(\\mathrm{sim}(I, T_k)/\\tau\\bigr)}{\\sum_{j=1}^{K} \\exp\\bigl(\\mathrm{sim}(I, T_j)/\\tau\\bigr)} $$\n\n**この式が言ってること**: 画像 $I$ について、ラベル候補 $K$ 個のうち $k$ 番目である「確からしさ」を計算するよ。各候補との似ている度合いをいったん $\\exp$ という関数で大きい値に増幅して、全部足したもので割る（合計が 1 になるように整える）。\n← $\\exp$ は「指数関数」のことで、入力の数字が大きいほど結果がもっとずっと大きくなる関数（例: $\\exp(1)\\approx 2.72,\\ \\exp(2)\\approx 7.39,\\ \\exp(3)\\approx 20.1$）。差を強調する役目。\n← $\\sum$ は「ぜんぶ足す」記号。\n\n**記号の意味**:\n- $I$ … 画像をベクトルにしたもの。\n- $T_k$ … $k$ 番目のラベル文（例: \"A photo of a cat.\"）をベクトルにしたもの。\n- $\\mathrm{sim}(I, T_k)$ … 数式①で説明したコサイン類似度。\n- $\\tau$（タウ）… **温度** と呼ばれるツマミ。小さいと「一番似てる候補」だけがほぼ 100% になり、大きいとどの候補も似たような確率になる（料理の火加減みたいなもの）。CLIP では学習中に AI が自動で調整する。\n- $K$ … ラベルの総数。例えば ImageNet なら $K=1000$。\n- $p(\\cdot)$ … 「確率」。0〜1 の値で、全候補を足すと 1 になる。\n\n**身近な例え**: クラスでくじ引きをして、当たりやすさを数字で出す感じ。「みかんが好き」「りんごが好き」「ぶどうが好き」と書かれた紙との「似てる度合い」を全部測って、一番似てるやつを「答え」にする。$\\tau$ は「迷い度ツマミ」で、小さくすると 1 個に絞り、大きくするとぼんやり全部の確率がそろう。\n\n### プロンプト工夫（地味だけど効く）\n\nラベルが `\"cat\"` だけだと、ネットの文章とギャップがある（ネットには「猫」単独より「a photo of a cat」みたいな文章のほうが多いから）。だから\n\n- `\"A photo of a {label}.\"` の形にするだけで ImageNet の正解率が **+1.3%** 上がる。\n- さらに「猫の写真」「大きい猫の写真」「小さい猫の写真」など 80 通りの聞き方を作って結果を平均する（**プロンプトアンサンブル**）と +3.5%。\n- 合わせて約 **+5%** の改善。タダで手に入る底上げ。\n\n## 何がすごいの？\n\n論文に書かれた具体的な数値（TeX に書かれているもの）:\n\n- **ImageNet ゼロショット**: Visual N-Grams が 11.5% だったのを **76.2%** に押し上げた。ImageNet の 128 万枚の学習データを 1 枚も使っていないのに、その学習データでガチで学んだ ResNet-50 と同じ正解率。Top-5 正解率は 95%（Inception-V4 並み）。\n- **他の 2 データセットでも圧勝**: aYahoo が 72.4 → **98.4**、SUN が 23.0 → **58.5**（Table 1）。\n- **30 以上のデータセットで評価**: 27 個のデータセット中 **16 個** で、ちゃんと学習した ResNet-50 の線形分類器を上回った。\n- **動画の動作認識**: Kinetics700 で ResNet-50 比 **+14.5%**、UCF101 で **+7.7%**。文章には動詞（走る、跳ぶ等）がたくさん出てくるから、「物の名前しか教えてくれない」ImageNet 学習より動詞に強い。\n- **STL10 で 99.3%**（当時の SOTA＝最高記録）← 1 枚も学習に使っていないのに。\n- **データ効率**: ゼロショット CLIP は「同じ特徴空間で 4 枚ずつのラベル付き画像を見て学んだロジスティック回帰」と同じくらいの強さ。データセットの中央値で 5.4 枚／クラスぶんの学習に相当。\n- **線形プローブ**（特徴ベクトルの上に簡単な分類器を載せた評価）: 27 データセット中 **21 個** で Noisy Student EfficientNet-L2（当時のチャンピオン）に勝った。平均で **+5%**。\n- **ViT は ResNet より約 3 倍計算効率が良い**（同じ性能を出すのに必要な計算量で）。\n- **頑健性 (robustness)**: ImageNetV2/Sketch/A/R, ObjectNet, Youtube-BB, ImageNet-Vid という 7 つの「分布シフト」（学習データと違う雰囲気の画像）テストで、ゼロショット CLIP は普通の ImageNet モデルに比べてズレを最大 **75% 縮めた**。逆に、CLIP を ImageNet 専用に追加学習させると ImageNet では +9.2%（85.4%）になるけど、頑健性は少し下がる。\n- **人間との比較**: Oxford-IIIT Pets（37 種の犬猫）で人間ゼロショット 53.7% に対し CLIP ゼロショット **93.5%**。\n- **苦手なタスク**: 衛星画像（EuroSAT）、リンパ節腫瘍（PatchCamelyon）、ものを数える（CLEVRCounts）、ドイツの道路標識（GTSRB）、車との距離（KITTI Distance）など特殊・抽象的なタスクには弱い。MNIST（手書き数字）はたった **88%**（生の画素のロジスティック回帰にすら負ける）。\n- **スケーリング**: モデルを 5 段階に大きくしていくと、ゼロショット誤差は計算量に対しきれいなログログ直線で下がる（44 倍のレンジで）。\n- **大きさのバリエーション**: 8 モデルを訓練 — RN50, RN101, RN50x4, RN50x16, RN50x64, ViT-B/32, ViT-B/16, ViT-L/14（+ @336px）。一番大きい RN50x64 は **V100 GPU を 592 台、18 日間** 使った。一番大きな ViT は 256 台 × 12 日。\n\n著者が「貢献」として挙げているもの:\n\n1. 4 億ペアでの対照学習による画像-言語事前学習 **CLIP** という方法を提案。\n2. 30 以上のデータセットでゼロショット／線形プローブ／頑健性／人間比較を網羅的に評価。\n3. 自然言語で「動的に分類器を作れる」インターフェースが、画像分類のタスク汎用化を大きく前進させると実証。\n4. バイアス（FairFace）、監視（CCTV、CelebA）、データ重複の影響を分析した Broader Impacts 節を提示。\n5. コードと事前学習済みの重みを公開（github.com/OpenAI/CLIP）。\n\n## キーワード辞典\n\n出現順で並べた。\n\n- **CLIP** … Contrastive Language-Image Pre-training の略。この論文の手法名。「対照学習で画像と文章を結びつける事前学習」という意味。\n- **事前学習 (pre-training)** … 大きいデータで AI に「基礎」を仕込む段階。あとから少し追加学習するだけで色んなタスクに使い回せる。\n- **ゼロショット (zero-shot)** … そのタスクの学習データを 1 枚も使わずに解くこと。CLIP の最大の売り。\n- **対照学習 (contrastive learning)** … 「正しいペア」と「間違ったペア」を区別するように学習する方法。画像生成のような重い作業をせずに済むので速い。\n- **エンコーダ (encoder)** … 入力（画像や文章）を「数字の並び＝ベクトル」に変換する装置。\n- **ベクトル** … 数を順番に並べたもの。CLIP では画像も文章も例えば 512 個の数字の並びになる。\n- **コサイン類似度** … 2 つのベクトルが「同じ方向を向いているか」を −1〜+1 で表す指標。\n- **ResNet** … 「残差接続」というしくみを持つ画像認識ニューラルネット。2015 年に有名になった定番アーキテクチャ。\n- **ViT (Vision Transformer)** … 画像を小さなパッチに分けて、文章処理用 AI と同じ Transformer で処理する新しい画像 AI。\n- **Transformer** … 文章を処理するのが得意な AI 構造。「注意 (attention)」というしくみで、文章中のどの単語に注目すべきかを自分で学ぶ。\n- **注意 (attention)** … 入力のどこを重視するか AI が自分で決めるしくみ。「文中のどの単語を見れば次の単語が予測できるか」みたいなことを学習する。\n- **クロスエントロピー損失** … 予測した確率と正解のズレを表す数値。AI を訓練するときの「罰金」。\n- **ソフトマックス** … いくつかの数字を「合計が 1 になる確率」に変換する関数。一番大きい数字が一番高い確率になる。\n- **温度 $\\tau$** … ソフトマックスの「とがり度」を調整するツマミ。小さいほど一番高い候補に集中、大きいほど平らに広がる。\n- **エポック (epoch)** … 学習データ全部を 1 周見ること。CLIP は 32 周。\n- **バッチ (batch)** … 1 回の学習ステップで AI に見せる画像のセット。CLIP は 32768 枚を 1 バッチに。\n- **Adam** … よく使われる「学習率自動調整」付きの学習アルゴリズム ← AI のパラメータをどっち向きにどれくらい動かすかを決めるルール。\n- **線形プローブ (linear probe)** … 事前学習した AI の出すベクトルの上に、シンプルな線形分類器だけを追加で学習して性能を測る方法。事前学習がどれだけ良い「素材」を作れたかを測る定番の方法。\n- **few-shot** … そのタスクのラベル付き画像を「ちょっとだけ」（例えば 1 枚、4 枚、16 枚）使って学習すること。\n- **頑健性 (robustness)** … 学習時と違う雰囲気の画像（ぼやけた、スケッチ風、別アングルなど）が来ても性能が落ちにくいこと。\n- **分布シフト (distribution shift)** … テストデータが学習データと違う性質を持っている状態。\n- **prompt（プロンプト）** … テキストエンコーダに渡す文の書き方。\"cat\" より \"A photo of a cat.\" の方が成績が良い、みたいな話。\n- **fine-tuning（追加学習）** … 事前学習済みの AI を、特定のタスクのデータでさらに少し学習し直すこと。\n- **WIT** … WebImageText の略。CLIP の学習用に新しく作られた 4 億ペアのデータセット。\n- **BPE (Byte Pair Encoding)** … 文章を「単語より小さい部品（サブワード）」に分ける方法。語彙サイズは 49152。\n- **ハイパーネットワーク (hypernetwork)** … 「別の AI のパラメータを生成する AI」。CLIP のテキストエンコーダは「ラベル文 → 線形分類器の重み」を生成するハイパーネットワークと見なせる、と著者は言っている。\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **「caption を当てる」より「対応を当てる」が 4 倍速い**: 同じ文章を扱うのに、「画像から caption を一字一句生成する」やり方より「画像と caption の組合せを当てる」やり方のほうが、ImageNet ゼロショットでの学習効率が 4 倍良かった（Figure 2）。理由は「一字一句生成」だと正解の表現が無数にあって学習信号がぼやけるから。\n- **テキストエンコーダ = 動的な分類器ジェネレータ**: 普通の分類 AI は「最後の層」に出てくる分類器の重みが固定。CLIP は「分類したいラベルの文章」をテキストエンコーダに通すと、その都度「重み」が生成される。だから新しいクラスが増えても再学習不要。\n- **温度 $\\tau$ は log-parameterized**: $\\tau$ を直接学習させると 0 に近づきすぎて不安定になるので、$\\log\\tau$ を学習する形にして、$\\tau$ が極端な値にならないようクリップしている（最大 100 まで）。\n- **8 モデルの中での最良**: ViT-L/14 を最後の 1 epoch だけ 336×336 ピクセルの高解像度で追加学習した **ViT-L/14@336px**。論文中で「CLIP」と書かれているのは基本このモデル。\n- **ゼロショットを使うほうが頑健**: CLIP を ImageNet 専用に linear probe で fine-tune すると ImageNet 精度は +9.2% で 85.4% まで上がるが、分布シフト下の平均精度はわずかに下がる。「pretraining → 固定ゼロショット」のほうが OOD（out-of-distribution、想定外のデータ）にはむしろ強い。\n- **MNIST が弱い理由（著者の推測）**: WIT に手書き数字の画像がほとんど含まれていない。「データを大規模化すれば全部 in-distribution になる」という発想の限界の例として、著者自身が limitations 節で正直に書いている。\n- **1000 倍の計算量で SOTA に届くと推定**: ゼロショット CLIP が完全な SOTA に並ぶには現状の **1000 倍** の計算量が必要、と単純な外挿で見積もっている。著者は「現行のハードウェアでは不可能」と認めている。\n- **バイアスへの言及**: FairFace を使った評価で、`Black` カテゴリの画像の 14% が non-human（動物・チンパンジー等）に誤分類された。一方で `child` カテゴリを追加すると、0〜20 歳の crime/non-human への誤分類が大幅に減った。これは「クラス設計そのものがバイアス源にも改善源にもなる」ことの定量的な示唆。\n- **評価セットの選び方の自己批判**: 著者自身が「27 データセットの選び方は CLIP の開発と co-adapt している（テスト中に何度も val を見て調整した）」と認めている。完全に純粋なゼロショット評価ではない。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2103.00020v1/`\n- 正規ノート: `notes/arXiv-2103.00020v1.md`\n";
