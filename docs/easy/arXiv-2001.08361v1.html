<script>
const RAW = "# Scaling Laws for Neural Language Models（ニューラル言語モデルのスケーリング則）\n\n- arXiv: https://arxiv.org/abs/2001.08361\n- 一次ソース: ../papers/arXiv-2001.08361v1/\n- 正規ノート: ../notes/arXiv-2001.08361v1.md\n\n---\n\n## 一言で言うと\n\n「文章を予測する AI（言語モデル）」は、モデルの大きさ・データ量・計算量を増やすほど、**きれいな決まった曲線**にそってどんどん賢くなる、という法則を見つけた論文。\n\n## どんな問題を解こうとしてるの？\n\n- 「文章の続きを予測する AI」（← これを **言語モデル** と言うよ。スマホの予測変換の超強力版みたいなもの）は、大きく作るほど賢くなることは経験的に知られていた。でも、\n  - **モデルの大きさ**（中身の部品の数）\n  - **データの量**（読ませる文章の量）\n  - **計算機の力**（どれだけたくさん計算させるか）\n  - **形（何層に積むか・横にどれだけ広げるか）**\n\n  のうち「**どれをどれだけ増やせば、どれだけ賢くなるか**」を、誰もちゃんと整理していなかった。\n- たとえるなら「サッカーを上達するには、走り込みと筋トレと試合練習のどれをどれだけやれば、どれくらいうまくなる？」がわかっていない状態。お金（＝計算機の予算）が決まっているとき、どこにどれだけ振ったらいいの？ という現場の悩みに答える理論がなかった。\n- 既存の研究はサイズを 2〜3 倍変えて比べる程度。**8 桁**（1 億倍）もの幅で系統的に比べた人はいなかった。\n\n## どうやって解いたの？\n\n### コアアイデア\n\n「物の値段と量の関係」みたいに、賢さ（正確には「間違いの大きさ」）と規模の関係が **べき乗則（power law）** という単純な式 1 本にきれいに乗るんじゃないか？ という発想。\n\nたとえば「お小遣いを 10 倍にすると、買えるお菓子は何倍になる？」みたいな関係を考える。普通の比例（10 倍払えば 10 倍買える）じゃなくて、**「10 倍にしても 1.2 倍にしかならない」みたいな、ゆるく効いていく関係**を「べき乗則」と呼ぶよ。著者たちは「言語モデルの賢さは、サイズを 10 倍にすると間違いが 0.84 倍に減る」のような、まさにこの形の関係になっていることを大量の実験で示した。\n\n### 仕組み\n\n- step1: **decoder-only Transformer**（← 文章を「次の単語、次の単語…」と左から順に予測するタイプの AI。スマホ予測変換の親玉。「Transformer」は今の AI の主流アーキテクチャ）を、サイズや形を変えて何百個も学習させる。\n- step2: 訓練データには **WebText2**（Reddit で「いいね」が 3 つ以上ついたリンク先のウェブ文章をかき集めたもの。20.3M 文書、96GB、約 229 億 **トークン**）を使う。「トークン」は「単語に近い、文章を切り分ける単位」のこと。文字列 \"playing\" は「play」と「ing」みたいに分かれることもある。\n- step3: モデルの大きさ $N$（部品の数）を **768 個から 15 億個** まで、データ量 $D$ を **2200 万トークンから 230 億トークン** まで、形（深さ・幅）、バッチサイズ（一度にまとめて学習する量）、文脈長（一度に見られる文章の長さ。基本 1024 トークン）など、ひとつずつ独立に変えて測る。\n- step4: 全部の実験で「**間違いの大きさ（loss）**」を測り、グラフに点を打って、ぴったり合う 1 本の式を探す。\n- step5: 見つけた式から「予算 $C$ が決まっているとき、$N$（大きさ）、$D$（データ）、$S$（学習ステップ数）にいくら振り分けるのが一番得か」を計算する。\n\nここで使う言葉:\n- **loss**（ロス、損失）… AI の「間違いの大きさ」を 1 個の数字にしたもの。小さいほど賢い。\n- **cross-entropy loss**（クロスエントロピー損失）… 「次の単語、これだと思う！」と AI が出した確率が、実際の正解からどれだけズレているかを測る数字。正解を自信満々で当てるとほぼ 0、ハズすとどんどん大きくなる。\n- **nats**（ナッツ）… loss の単位。点数のスケールだと思えば OK。\n- **べき乗則（power law）** … $y = (定数 / x)^{\\text{ちょっとした数}}$ の形。$x$ を 10 倍にすると $y$ が決まった倍率で動く関係。\n- **パラメータ**… AI の中にある「学習で調整するつまみ」の数。多いほどモデルは大きい。\n\n### 主要な数式\n\n#### 式 1: モデルの大きさ $N$ と賢さの関係\n\n$$ L(N) = \\left( \\frac{N_c}{N} \\right)^{\\alpha_N},\\quad \\alpha_N \\approx 0.076,\\ \\ N_c \\approx 8.8 \\times 10^{13} $$\n\n**この式が言ってること**: モデルの部品数 $N$ を増やすほど、間違い $L$ は小さくなる。ただし、ものすごくゆっくり。$N$ を 10 倍にしても $L$ は $10^{-0.076} \\approx 0.84$ 倍にしか減らない。\n\n**記号の意味**:\n- $L$ … loss。「AI の間違いの大きさ」の点数（小さいほど賢い）。\n- $N$ … 部品の数（パラメータ数。ただし「単語の埋め込み表」みたいな部分は数えない決まり）。\n- $N_c$ … 約 $8.8 \\times 10^{13}$。「もしモデルがこの大きさだったら $L=1$ になるはず」という基準サイズ。\n- $\\alpha_N$（アルファエヌ）… 約 0.076。「$N$ を増やすと $L$ がどれくらい減るか」の効きの強さ。小さいほどゆっくり効く。\n\n**身近な例え**: 筋トレと体重の関係に似ている。ベンチプレスを「2 倍に増やす」と上がる重量は 2 倍にはならず、せいぜい 1.05 倍くらい。大変な努力をしても、効果はじわじわとしか伸びない、というイメージ。$\\alpha_N = 0.076$ が小さいというのは「筋トレを 10 倍に増やしても、上がる重量はちょっとしか増えない」みたいな話。\n\n---\n\n#### 式 2: データ量 $D$ と賢さの関係\n\n$$ L(D) = \\left( \\frac{D_c}{D} \\right)^{\\alpha_D},\\quad \\alpha_D \\approx 0.095,\\ \\ D_c \\approx 5.4 \\times 10^{13} $$\n\n**この式が言ってること**: 読ませる文章の量 $D$（トークン数）を増やすほど、間違い $L$ は小さくなる。これも「ゆっくり」効く。\n\n**記号の意味**:\n- $L$ … 間違いの大きさ。\n- $D$ … 訓練に使った文章の総トークン数。\n- $D_c$ … 約 $5.4 \\times 10^{13}$ トークン。基準データ量。\n- $\\alpha_D$ … 約 0.095。「データを増やすと $L$ がどれくらい減るか」の効きの強さ。\n\n**身近な例え**: 「英単語帳をたくさん覚えるほど英語が読めるようになる」みたいな話。ただし「単語帳のページを 10 倍にしても、読める文章は 10 倍にはならず、ちょっと増えるだけ」というゆっくりした関係。$\\alpha_D$ が $\\alpha_N$ よりちょっと大きいので、データのほうがほんの少しだけ効きやすい。\n\n---\n\n#### 式 3: 大きさ $N$ とデータ量 $D$ を同時に動かすときの式\n\n$$ L(N, D) = \\left[ \\left( \\frac{N_c}{N} \\right)^{\\alpha_N / \\alpha_D} + \\frac{D_c}{D} \\right]^{\\alpha_D} $$\n\n**この式が言ってること**: 「モデルだけ大きくしてもデータが足りないと頭打ち」「データだけ増やしてもモデルが小さいと頭打ち」になる現象を、1 本の式で書いたもの。中の 2 つの項のうち **大きい方**（足を引っぱっている方）が答えを決める。\n\n**記号の意味**:\n- $L(N, D)$ … 大きさ $N$ の AI に量 $D$ のデータを与えたときの間違いの大きさ。\n- $N, D$ … 上と同じ。\n- $N_c, D_c, \\alpha_N, \\alpha_D$ … 上と同じ定数。\n- 中の「足し算」… 「モデルが足を引っぱる分」と「データが足を引っぱる分」を足して、最終的な間違いを出す気持ち。\n\n**身近な例え**: ラーメンの「麺の量」と「スープの量」みたいな話。麺だけ大盛りでもスープが少なければ食べにくいし、その逆もダメ。両方バランスよく増やさないと「ちゃんとしたラーメン」にならない。式の中の 2 項のうち少ない方が「足を引っぱって」全体を決める。著者は「モデルを 8 倍にしたら、データは **約 5 倍** 増やせば足りる」と教えてくれる（厳密には $D \\propto N^{0.74}$）。\n\n---\n\n#### 式 4: 計算予算 $C$ を増やしたとき、どこにいくら振るのが得？\n\n$$ N \\propto C^{0.73},\\quad B \\propto C^{0.24},\\quad S \\propto C^{0.03} $$\n\n**この式が言ってること**: お金（計算量 $C$）が増えたとき、その大部分（指数 0.73）は **モデルを大きくする** のに使え。バッチサイズ $B$（一回でまとめる学習量）はそこそこ増やせ（0.24）。学習ステップ $S$（何回つまみを動かすか）は **ほとんど増やさなくていい**（0.03）。\n\n**記号の意味**:\n- $C$ … 計算量（FLOPs：足し算掛け算の総回数。単位は PF-days = ペタフロップス × 1 日）。\n- $N$ … モデルの大きさ。\n- $B$ … バッチサイズ。「次の単語を当てる練習」を一度に何セット並行して回すか。\n- $S$ … ステップ数。「つまみを少し動かす」のを何回くり返すか。\n- $\\propto$ … 「比例する」の記号。$N \\propto C^{0.73}$ は「$C$ を 10 倍にすると $N$ は $10^{0.73} \\approx 5.4$ 倍にする」という意味。\n\n**身近な例え**: 試験勉強の時間配分に似ている。勉強時間 $C$ が 100 倍に増えたら、\n- **教科書を分厚いものに買い替える（$N$ を増やす）** に大半を使え。100 倍勉強時間が増えたら教科書は 28 倍分厚くしろ。\n- **一度に解く問題数（$B$）** はそこそこ増やせ。約 5.5 倍。\n- **何日かけるか（$S$）** はほとんど増やすな。約 1.2 倍。\n\n直感に反する結果。普通の人は「時間が増えたら長く勉強する」と考えるけど、AI の場合は **「教科書を分厚くして、ちょっとだけ多めに解いて、すぐ終わらせる」のが一番得** と言っている。\n\n---\n\n#### 式 5: 計算量と FLOPs の見積もり\n\n$$ C \\approx 6\\, N\\, B\\, S $$\n\n**この式が言ってること**: 1 回の学習にかかる計算量 $C$ は、ざっくり「部品数 × バッチサイズ × ステップ数」の 6 倍。\n\n**記号の意味**:\n- $C$ … 学習全体の計算量（足し算掛け算の総回数）。\n- $N$ … 部品数。\n- $B$ … バッチサイズ（1 ステップで処理するトークン数）。\n- $S$ … ステップ数。\n- $6$ … Transformer の構造から出てくる定数（前向き計算 2 + 後ろ向き計算 4 みたいなノリ）。\n\n**身近な例え**: 工場の生産量みたいな話。「作業員数 × 1 ライン何個ずつ流すか × 何回ライン動かすか」で総生産量が決まる、というイメージ。$N$ が作業員、$B$ が 1 回の処理量、$S$ がライン稼働回数。\n\n---\n\n## 何がすごいの？\n\n- **8 桁** ものスケール（1 億倍の幅！）で、ぜんぶの実験が **1 本のべき乗則のグラフに乗った**。これだけ広い範囲で AI の振る舞いが整理されたのは前例がない。具体的には:\n  - **計算量 $C_{\\min}$**: 8 桁にわたって power law が成立\n  - **モデル $N$**: 6 桁にわたって成立\n  - **データ $D$**: 2 桁にわたって成立\n- **形（depth / width / heads）はほとんど関係ない**: 同じ $N$ なら、層を 6 層にしても 207 層にしても loss は数% しか変わらない。$(n_\\text{layer}, d_\\text{model}) = (6, 4288)$ と $(48, 1600)$ で loss の差は 3% 以内。\n- **「大きいモデルは少ないデータで賢くなる（サンプル効率が良い）」** ことを定量的に示した。\n- **「予算が決まっているなら、巨大なモデルを少しだけ学習して途中で止める」のが最適**: 普通の研究者がやる「小さいモデルを収束まで長く回す」より、**同じ loss を出すのに 2.7 倍大きいモデル・7.7 倍少ないステップ・35% の計算量** で済む。\n- **オーバーフィット（覚えすぎ）を防ぐ条件**: $D \\gtrsim 5\\times 10^3 \\cdot N^{0.74}$。モデルを 8 倍にしてもデータは 5 倍で足りる。\n- **他のデータでも同じ伸び方**: WebText2 で学習したモデルを Books Corpus・Common Crawl・Wikipedia・Internet Books でテストしても、伸び方は同じ。少しだけ下駄を履いた（一定の loss が足された）形で平行に伸びる。\n- **LSTM**（← 古いタイプの文章 AI。「リカレント」と呼ばれる前後をループする構造）と比べると、文章の最初の方の単語予測は LSTM も Transformer もほぼ互角だが、**後ろの方の単語**になると LSTM が大きく負ける。\n- **将来の予想**: 計算量を $C^\\ast \\sim 10^4$ PF-days、モデルを $N^\\ast \\sim 10^{12}$ パラメータ、データを $D^\\ast \\sim 10^{12}$ トークンまで増やすと、$L^\\ast \\sim 1.7$ nats/token あたりで法則は破綻するはず、と予言した。\n- **著者が「貢献」として強調しているのは**:\n  1. $N, D, C_{\\min}$ 全てに対してべき乗則が成立することを実証\n  2. $L(N,D)$ と $L(N,S)$ という 2 変数版の式を導いた\n  3. 固定予算 $C$ の最適配分 $N \\propto C^{0.73}$ を理論と実測の両方で出した\n  4. 「大モデルほどサンプル効率が高い」「収束させずに止めるのが最適」という運用指針を出した\n\n> この論文の予言通りに作られたのが **GPT-3**（2020 年に発表された巨大言語モデル。1750 億パラメータ）。今の ChatGPT や Claude も、この論文の発想の延長線上にいる。\n\n## キーワード辞典\n\n- **言語モデル** … 「次に来る単語」を予測する AI。スマホ予測変換の超強力版。\n- **Transformer**（トランスフォーマー）… 今の文章 AI の主流アーキテクチャ。並列処理が得意で、長い文章を一気に見られる。\n- **decoder-only Transformer** … 「左から右へ次の単語を予測する」専用にした Transformer。\n- **LSTM**（Long Short-Term Memory）… 古いタイプの文章 AI。一語ずつ順番に処理するため遅く、文章の後半で性能が落ちる。\n- **Universal Transformer** … 同じ層のつまみを使い回す省パラメータ版 Transformer。\n- **パラメータ（$N$）** … AI の中にある「学習で調整するつまみ」の数。本論文では **埋め込み行列は除外** して数える。\n- **embedding（埋め込み）** … 単語を数字の並びに変換する辞書部分。$N$ には含めない。\n- **トークン** … 文章を切り分ける最小単位（ほぼ単語、英語だと 1 単語が 1〜2 トークン）。本論文は **BPE**（byte-pair encoding。よく出る文字列をまとめる方式）で 50257 種類に区切る。\n- **WebText2** … Reddit で人気のリンク先文章を集めたデータセット。約 229 億トークン。\n- **データ量（$D$）** … 訓練に使ったトークンの総数。\n- **計算量（$C$）** … 学習に使った足し算掛け算の総回数。単位は **PF-days**（ペタフロップス・日 = $8.64 \\times 10^{19}$ 回の計算）。\n- **loss / cross-entropy loss** … AI の間違いの大きさ。小さいほど賢い。単位は **nats**。\n- **べき乗則（power law）** … $y = a x^b$ の形の関係。両対数グラフで直線になる。\n- **バッチサイズ（$B$）** … 1 ステップでまとめて処理するトークン数。\n- **ステップ数（$S$）** … つまみを動かす回数。\n- **critical batch size（$B_\\text{crit}$）** … 「これより大きくしても効率が落ちる」境目のバッチサイズ。\n- **early stopping** … 過学習する前に学習を止めること。\n- **overfitting（オーバーフィット、過学習）** … 訓練データを覚えすぎて、新しい文章で性能が落ちる現象。\n- **sample efficiency（サンプル効率）** … 「少ない訓練データでどれだけ賢くなれるか」の度合い。\n- **compute-efficient training** … 「計算量あたりで最も効率良く賢くなる学習」。\n- **Adam / Adafactor** … つまみの動かし方（最適化手法）の名前。Adafactor は省メモリ版。\n- **PF-days** … 1 ペタフロップス（1 秒間に $10^{15}$ 回の計算）で 1 日動かしたときの計算量。\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **なぜ「埋め込みを除外」した $N$ なの？**\n  単語の辞書部分（embedding 行列）のサイズはタスクの本質的な「賢さ」とは関係なく、語彙サイズで決まる「ノイズ」みたいなもの。これを含めて数えると、深いモデルと浅いモデルがバラけて法則が汚くなる。除外するときれいに 1 本の線になる。ALBERT のように「埋め込みは小さくしても OK」という流れにつながる。\n- **critical batch size $B_\\text{crit}(L) = B_\\ast / L^{1/\\alpha_B}$** ($B_\\ast \\approx 2 \\times 10^8$ tokens, $\\alpha_B \\approx 0.21$): 賢くなる（$L$ が小さくなる）ほど、最適バッチサイズは大きくなる。loss が 13% 減るごとに $B_\\text{crit}$ がほぼ倍になる。これを使うと「測ったときのバッチサイズ」と「最小計算量に直したバッチサイズ」を換算でき、実験条件の違いを吸収できる。\n- **$L(N,S) = (N_c/N)^{\\alpha_N} + (S_c / S_\\text{min})^{\\alpha_S}$** ($\\alpha_S \\approx 0.76$, $S_c \\approx 2.1 \\times 10^3$): モデルサイズとステップ数の同時依存。これから理論的に $N \\propto C^{\\alpha_C^\\text{min} / \\alpha_N} \\approx C^{0.71}$ が出て、実測の $C^{0.73}$ とよく合う。\n- **指数の関係**: $\\alpha_C^\\text{min} = 1 / (1/\\alpha_S + 1/\\alpha_B + 1/\\alpha_N)$ という美しい式で結ばれている（「合成抵抗」の式と同じ形）。\n- **$C \\approx 6NBS$ が破綻する条件**: 文脈長 $n_\\text{ctx}$ が $12 d_\\text{model}$ より大きくなると、attention の計算量が無視できなくなり近似が崩れる。今の超長文脈 LLM では注意が必要。\n- **著者の自覚的限界（§Caveats）**:\n  - 理論的根拠はない。「なぜ power law になるか」は分かっていない。\n  - WebText2 という 1 種類のデータでしか測っていない。データ品質を変えると指数が変わる可能性。\n  - dropout 10% 固定で、正則化は最適化していない。\n  - 初期化や momentum などのハイパラも完全には調整していない。\n  - 学習率は target loss に依存する可能性があり、短い run では別の最適値があるかも。\n- **後の修正**: 2022 年の **Chinchilla** 論文（Hoffmann+ 2022）は、推論コストや fit の方法を見直した結果「$D \\propto C^{0.5}, N \\propto C^{0.5}$」と、本論文より **データに振るべき** と修正した。本論文の $N \\propto C^{0.73}$ は「データを増やすコストを過小評価していた」と批判されることになる。\n- **$L^\\ast \\approx 1.7$ nats/token は自然言語のエントロピー下限か？** という考察があるが、指数のわずかな違いで桁がズレるため、著者自身も「highly uncertain」と書いている。\n- **同時期に独立に同じ ansatz を出した研究**: Rosenfeld+ 2019（arXiv 1909.12673）。\n- **先行研究の Hestness+ 2019**（PPoPP'19）は「データを増やすほど効く」という super-linear なスケーリングを報告していたが、本論文は sub-linear と逆の結論を出した。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2001.08361v1/`\n- 正規ノート: `notes/arXiv-2001.08361v1.md`\n";
const MACROS = {"\\arraystretch": "1.5", "\\be": "\\begin{equation}", "\\ee": "\\end{equation}", "\\CB": "{\\cal B}", "\\blue": "\\color{blue}"};
