<script>
const RAW = "# DeepSeek-V3 Technical Report（DeepSeek-V3 技術レポート：超巨大 AI を安く・賢く・安定して育てる）\n\n- arXiv: https://arxiv.org/abs/2412.19437\n- 一次ソース: ../papers/arXiv-2412.19437v2/\n- 正規ノート: ../notes/arXiv-2412.19437v2.md\n\n---\n\n## 一言で言うと\n\n巨大な AI（大規模言語モデル）を、専門家チーム方式と新しい工夫で「賢いまま安く」育てる方法をまとめた報告書。\n\n## どんな問題を解こうとしてるの？\n\n- ChatGPT のような **大規模言語モデル**（← 大量の文章を読んで「次にくる単語」を当てる練習をした、文章を作るのが得意な AI のこと。略して LLM = Large Language Model）は、強いものほどお金と電気をすごく食う。\n  - 例えるなら「東大に合格するまでに 100 億円かかる塾」みたいなもので、ふつうの会社や大学では真似ができない。\n- これまで誰でも使える「オープンソース」（← 設計図と部品を公開しているという意味）の AI は、GPT-4o や Claude-3.5 のような「会社の中だけで秘密にされている AI（クローズドソース）」にどうしても勝てなかった。\n- さらに細かい技術的な悩みが 4 つあった:\n  1. AI を「専門家チーム」に分けると、人気の専門家ばかりに仕事が集中して、他の専門家がヒマになってしまう（→ チームが偏ると勉強の効率が落ちる）。\n  2. たくさんのコンピュータをつなげて計算するとき、データのやり取り（通信）でみんなが待ち時間だらけになる。\n  3. 数字を「ざっくり 8 ビットだけで表す」省エネ計算（FP8）は本当に大規模でうまくいくのか、まだ証拠が少なかった。\n  4. 「じっくり考えるタイプの AI（R1）」のうまさを、ふつうのサクッと答える AI に移植する方法が確立していなかった。\n\n## どうやって解いたの？\n\n### コアアイデア\n\nふつうの AI は「すべての知識を 1 人の天才に詰め込む」イメージなのに対して、DeepSeek-V3 は **「専門家が 257 人いる学校」**みたいな仕組み（MoE = Mixture of Experts、混ぜ合わせ専門家方式）を使う。生徒（入力された単語）が来るたびに「数学はあの先生、英語はあの先生」と少人数の先生だけを呼び出して教えてもらう。だから全員（合計 6710 億人分の知識）を抱えていても、毎回動かすのは 370 億人分だけ。電気代がずっと安くなる。\n\nそのうえで、人気の先生に生徒が殺到しないように、**先生ごとに「忙しさメーター（バイアス）」を足し引きするだけ**でクラス分けをならす、という新しい工夫を導入した。「先生の人気投票」自体は触らないので、得意分野で呼ばれるのは妨げない。\n\n### 仕組み\n\n- step1: **MLA（Multi-head Latent Attention、マルチヘッド潜在注意）** で「文章のどこに注目するか」を計算するときの記憶（KV キャッシュ）を圧縮してメモリ節約。\n  - **Attention（アテンション）** … 「今読んでいる単語が、文章のどこと関係しているか」を表す仕組み。例: 「彼は…バットを振った」の「彼」が誰か知るには「太郎が…」を見にいく必要がある、そのリンクの強さを数で表す。\n- step2: **DeepSeekMoE** … 専門家を 1 人の「みんなが必ず使う共通の先生」+ 256 人の「ルートで呼ばれる専門家」に分け、1 つの単語につき 8 人だけ呼び出す。\n- step3: **補助ロスなしの負荷バランス**（auxiliary-loss-free load balancing）… あとで詳しく式で説明。\n- step4: **MTP（Multi-Token Prediction、複数トークン予測）** … 「次の単語」だけでなく「次の次の単語」も予測する練習を同時にやらせる。実戦の答えを 1.8 倍速で出すのにも使える。\n- step5: **FP8 訓練**（← 数字を 8 ビットというすごく荒い精度で計算する。ふつうは 16 ビットや 32 ビットを使うので半分以下のメモリで済む）を初めて超大規模でやりきった。\n- step6: **DualPipe** という新しい段取り方法で、コンピュータ同士の「データの受け渡し」と「計算」を同時にこなして待ち時間をほぼゼロにした。\n- step7: 学習が終わったあと、**SFT**（Supervised Fine-Tuning、お手本付きの追加レッスン）と **RL**（Reinforcement Learning、強化学習：上手にできたらご褒美を与えるしつけ方）でしっかり仕上げる。R1 という「考えるのが得意な兄貴分 AI」の答えを真似させる蒸留も行う。\n\n### 主要な数式\n\n#### 式①: 「専門家を選ぶときだけ忙しさメーターを足す」ルール\n\n$$\ng'_{i,t} = \\begin{cases} s_{i,t}, & s_{i,t} + b_i \\in \\operatorname{Topk}(\\{s_{j,t} + b_j\\}, K_r) \\\\ 0, & \\text{それ以外} \\end{cases}\n$$\n\n**この式が言ってること**: 単語 $t$ に対して、各専門家 $i$ の「相性スコア $s_{i,t}$」に「忙しさメーター $b_i$」を足したものを比べ、上位 $K_r$ 人に入った専門家だけを呼び出す。ただし**呼んだあとに掛け算で使う重み $g'_{i,t}$ は、忙しさメーターを足す前のスコア $s_{i,t}$ そのまま**にする。つまり「選ぶときだけ調整して、評価点はいじらない」。\n\n**記号の意味**:\n- $s_{i,t}$ … 専門家 $i$ と単語 $t$ の相性スコア（点数。高いほど得意分野）\n- $b_i$ … 専門家 $i$ の「忙しさメーター」。働きすぎたらマイナスされ、ヒマだとプラスされる\n- $\\operatorname{Topk}(\\ldots, K_r)$ … カッコの中の点数のうち、上から $K_r$ 個を選ぶ操作\n- $K_r$ … 1 単語あたり呼び出す専門家の人数（V3 では 8）\n- $g'_{i,t}$ … 選ばれた専門家の答えに掛ける「重み」のもとになる値\n\n**身近な例え**: 学校の発表会で、先生が「いつも当てられている子（$b_i$ がマイナスになっている子）はちょっと後回し」と心の中だけで判断して指名する。ただし発表したあとの成績表（$g'$）は普段の実力 $s$ だけで付ける、というイメージ。指名のときだけ忙しさを気にする。\n\n#### 式②: 「バイアスの更新ルール（書き言葉）」\n\n$$\nb_i \\leftarrow \\begin{cases} b_i - \\gamma, & \\text{専門家 } i \\text{ が今ステップで働きすぎ} \\\\ b_i + \\gamma, & \\text{専門家 } i \\text{ が今ステップでヒマ} \\end{cases}\n$$\n\n**この式が言ってること**: 1 ステップ学習するたびに、働きすぎの専門家はメーターを少し下げ（次は呼ばれにくく）、ヒマな専門家はメーターを少し上げる（次は呼ばれやすく）。だんだん仕事量がならされていく。\n\n**記号の意味**:\n- $b_i$ … 専門家 $i$ の忙しさメーター\n- $\\gamma$ … メーターを動かす速さ（ハイパーパラメータ）。本番では最初 0.001、最後 500B トークンは 0\n- $\\leftarrow$ … 「左辺を右辺で書き換える」記号\n\n**身近な例え**: 給食の盛り付け係を 8 人選ぶとき、前回いっぱい働いた人は「次は休んでていいよ」と札を 1 段下げ、サボった人は「次は来てね」と札を 1 段上げる。札（$b_i$）を毎日少しずつ動かすだけで、結局みんな同じくらい働くようになる。\n\n#### 式③: 補助バランス損失（おまけの罰金）\n\n$$\n\\mathcal{L}_{\\mathrm{Bal}} = \\alpha \\sum_{i=1}^{N_r} f_i P_i\n$$\n\n**この式が言ってること**: 1 つの文章の中で「特定の専門家にだけ仕事が偏らないように」、偏った度合いに応じて小さな罰金 $\\mathcal{L}_{\\mathrm{Bal}}$ を AI に与える。$\\alpha$ がとても小さい（0.0001）ので、主役はあくまで式①②、これは補助。\n\n**記号の意味**:\n- $\\mathcal{L}_{\\mathrm{Bal}}$ … バランスを崩したときの罰金（**Loss、ロス**＝ AI が間違えたら大きくなる「悪さの点数」。AI はこれを小さくしようと学ぶ）\n- $\\alpha$ … 罰金の強さ。0.0001 と小さい\n- $N_r$ … ルートで呼ばれる専門家の総人数（256）\n- $f_i$ … その文章の中で専門家 $i$ が選ばれた頻度（呼び出し回数の割合）\n- $P_i$ … その文章での専門家 $i$ の平均相性スコア\n- $\\sum_{i=1}^{N_r}$ … $i$ を 1 から $N_r$ まで動かして全部足す記号\n\n**身近な例え**: 給食係の指名で、1 日のうちに同じ人ばかり選びすぎたら「ちょっとだけ反省点を付けるね」と先生がメモする感じ。点数は小さいので主役ではなく、極端な偏りだけを抑える保険。\n\n## 何がすごいの？\n\n- **訓練コスト**: H800 という GPU を合計 278.8 万時間（278 万 8 千時間）使い、1 時間 2 ドル換算で **約 557.6 万ドル（およそ 8 億円）** で完成。トレーニング 1 本だけの数字とはいえ、ふつうの巨大 AI（噂では数千万 GPU 時間）と比べると桁が違う安さ。\n- **訓練の安定性**: 14.8 兆トークン（← トークン＝単語のかけら。AI が文章を読み書きする最小単位）を学習する間、**「やり直し（rollback）」も「致命的な loss の暴れ」もゼロ**。事故ナシで完走した。\n- **ベンチマーク（学力テスト）成績**（チャット版 = `tables/chat_evaluation.tex`、TeX より抜粋）:\n  - MMLU 88.5、MMLU-Redux 89.1、MMLU-Pro 75.9 … 一般教養テストで GPT-4o や Claude-3.5-Sonnet と肩を並べる。\n  - DROP（読解 3-shot F1）91.6。\n  - **数学**: AIME 2024 = 39.2、MATH-500 = 90.2、CNMO 2024 = 43.2（じっくり考えない型の AI で当時の最高水準）。\n  - **コード**: HumanEval-Mul 82.6、LiveCodeBench(CoT) 40.5、SWE-Bench Verified 42.0（Claude-3.5-Sonnet の 50.8 に次ぐ 2 位）、Codeforces percentile 51.6（GPT-4o の 23.6 を大きく上回る）。\n  - **オープンエンド対話**: Arena-Hard **85.5（オープンソース AI で初めて 85% 超え）**、AlpacaEval 2.0 LC-win 70.0。\n  - **中国語事実問題** C-SimpleQA 64.8（GPT-4o の 59.3 を 5.5 ポイント上回る）。一方で英語の SimpleQA は 24.9 で GPT-4o の 38.2 に負ける（英語と中国語の学習データ配分のトレードオフ、と著者は明記）。\n- **アブレーション（ある工夫を抜いたらどうなるか実験）**:\n  - MTP を入れると HumanEval が 44.5 → 53.7、GSM8K が 72.3 → 74.0 へ向上（228.7B モデル）。\n  - 補助ロスなしバランスを入れると HumanEval 40.2 → 46.3、GSM8K 70.7 → 74.5 へ向上。\n- **MTP の副産物**: 推論時に「次の次の単語」予測が 85〜90% の確率で当たり、出力速度が **1.8 倍**になる。\n- **著者が「貢献」として挙げていること**:\n  1. 補助ロスなしの負荷バランスと sequential MTP を組み合わせた MoE レシピ。\n  2. 超大規模での **FP8 訓練の実証**（BF16 基準に対し相対 loss 誤差 < 0.25%）。\n  3. **DualPipe** と専用の all-to-all 通信プログラムで「コンピュータ間の通信」を計算と完全にかぶせて隠した。\n  4. R1（じっくり考える AI）からふつうの AI に推論力を移す「蒸留パイプライン」。\n  5. 671B / 37B 活性化のモデルを 278.8 万 H800 時間（約 557.6 万ドル）で完成させ、オープンソース最高水準に到達。\n  6. 次世代のチップ設計（FP8 累積精度、tile/block 量子化のハード対応、IB-NVLink 統合など）への具体提案。\n\n## キーワード辞典\n\n- **LLM（Large Language Model、大規模言語モデル）** … 大量の文章を読んで「次の単語」を予測する練習をした AI。ChatGPT も同じ仲間。\n- **トークン** … AI が読み書きの最小単位として扱う「単語のかけら」。1 トークンはだいたい英語 0.75 単語、日本語 1〜2 文字くらい。\n- **パラメータ** … AI の脳みそにある「ツマミ」の数。多いほど色々覚えられるが、計算が重い。\n- **MoE（Mixture of Experts、専門家混合）** … 「全員出動」ではなく「得意な人だけ呼び出す」方式の AI。\n- **専門家（Expert）** … MoE のミニ AI。それぞれが得意分野を持つ「ミニ先生」。\n- **活性化（activated）パラメータ** … 1 トークンを処理するときに実際に動かすツマミの数。V3 は 6710 億ツマミのうち 370 億だけ毎回動かす。\n- **MLA（Multi-head Latent Attention、マルチヘッド潜在注意）** … 「文章のどこに注目するか」のメモを圧縮してメモリ節約する仕組み。\n- **DeepSeekMoE** … DeepSeek 社が作った MoE 設計。共通の先生 + 256 人のルーティング専門家で構成。\n- **負荷バランス（load balancing）** … 専門家ごとの仕事量がかたよらないようにすること。\n- **補助ロス（auxiliary loss）** … 本来の目的とは別に「専門家を均等に使わせる」ための罰金。これが大きいとモデルの実力を削る、というのが本論文の前提。\n- **バイアス $b_i$** … 専門家 $i$ ごとに足し引きする「忙しさメーター」。\n- **MTP（Multi-Token Prediction、複数トークン予測）** … 「次の単語」だけでなく「次の次の単語」まで予測する練習法。\n- **causal chain（因果のつながり）** … 「過去だけ見て、未来は見ない」というルール。普通の文章生成 AI の基本。\n- **FP8** … 数を 8 ビットで表す省エネ形式。ふつうは BF16（16 ビット）。半分のメモリ・倍の速度を狙える。\n- **BF16** … Bfloat16。16 ビット浮動小数点。AI 訓練の標準的な精度。\n- **E4M3** … FP8 の方式の 1 つ。指数 4 ビット + 仮数 3 ビット。V3 は全 GEMM（行列計算）に E4M3 統一を採用。\n- **DualPipe** … 計算と通信を同時に進める新しいパイプライン段取り。\n- **H800** … NVIDIA 製の GPU（AI 用の高速計算機）。中国向けに帯域を絞った版。\n- **InfiniBand（IB）/ NVLink** … サーバー間・GPU 間の通信回線。ホースの太さに例えられる。\n- **SFT（Supervised Fine-Tuning）** … 「お手本付きの追加練習」。質問と理想の答えのペアを見せる。\n- **RL（Reinforcement Learning、強化学習）** … 上手にできたらご褒美、失敗したら罰、で学ばせる方法。\n- **GRPO（Group Relative Policy Optimization）** … DeepSeek 社の強化学習レシピ。「批評家役」を作らず、グループ内での相対的なご褒美で更新する。\n- **報酬モデル（Reward Model, RM）** … 「この答えはいい / 悪い」を採点する別の AI。\n- **蒸留（distillation）** … 強い AI（先生）の答えを小さい AI（生徒）に真似させる学習。\n- **R1** … DeepSeek 社の「考えてから答える」推論型 AI。V3 の蒸留教師。\n- **CoT（Chain-of-Thought、思考の鎖）** … 答える前に途中の考えを書き出すこと。\n- **YaRN** … 長い文章を扱えるように、座標感覚（位置情報）を伸ばす技術。V3 では 4K → 32K → 128K トークンまで対応を拡張。\n- **AdamW** … AI を学習させる「歩幅の決め方（オプティマイザ）」の 1 つ。\n- **MMLU / GPQA / DROP / AIME / MATH-500 / HumanEval / SWE-Bench / Arena-Hard / AlpacaEval / C-SimpleQA …** AI の学力テスト名。それぞれ得意分野（知識、推論、コード、対話など）が違う。\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **なぜ「選ぶときだけバイアスを足す」のが上手いのか**: バイアスをスコアの本体に混ぜると、「専門家 $i$ の答え」を最終結果に足し合わせる際の重みも歪み、得意分野で呼ばれた時に弱い答えになる。式①のように「Topk に入るかどうかの判定」だけバイアスを使い、$g'_{i,t}$ には素の $s_{i,t}$ を使うと、「公平に呼ばれるけど、呼ばれた時の貢献度は実力ベース」という両立ができる。著者の主張: バッチ全体で測ったバランスは「ある専門家がある文脈で集中して呼ばれる（=専門化する）」のを潰さない。\n- **MTP（D=1）の中身**: ふつうの AI は「過去 → 次の 1 トークン」を予測するだけ。V3 はそれに加えて「次のトークンの隠れ表現」をもう 1 段の小さなモジュールに渡し、「次の次のトークン」も予測させる。重みは $\\lambda = 0.3$（最初の 10T トークン）→ $0.1$（残り 4.8T）。推論時はこのモジュールを捨ててもいいし、speculative decoding（先回り予測）に転用すれば 2 トークン目の採用率 85〜90%、出力 1.8 倍速。\n- **FP8 の落とし穴と対策**: H800 の FP8 行列計算は「およそ 14 ビットしか累積精度がない」と TeX 中に明記がある。そこで著者は (a) activation を 1×128 タイル、weight を 128×128 ブロックという細かい単位ごとに別々のスケール係数を持たせ、(b) 128 単位ごとに Tensor Core → CUDA Core に部分和を昇格して FP32 で足し直す、ことで誤差を抑えた。embedding / 出力ヘッド / MoE のゲーティング / 正規化 / アテンションは FP8 にせず元精度のまま。結果として BF16 基準との相対 loss 誤差 **< 0.25%**。\n- **DualPipe の肝**: forward と backward を「attention / all-to-all dispatch / MLP / all-to-all combine」に細かく刻み、20 SM（GPU 内の計算ユニット）を 10 個の通信チャネルに割り当てて warp specialization で通信と計算を完全オーバーラップ。トークンは最大 4 ノードまでに制限。「計算と通信の比率を一定に保てば、専門家を全ノードに刻んでも通信オーバーヘッドはほぼゼロ」というスケーリング論を実証。\n- **学習スケジュール**: AdamW（$\\beta_1=0.9, \\beta_2=0.95$、weight decay 0.1）。学習率は 2K ステップで 0 → $2.2\\times10^{-4}$ に上げ、10T トークンまで一定、4.3T で cosine 曲線で $2.2\\times10^{-5}$ まで下げ、最後 500B で $7.3\\times10^{-6}$ までもう一段下げる。バッチサイズは最初の 469B トークンで 3072 → 15360 に拡大。\n- **R1 蒸留の実用レシピ**: 数学・コードなどドメインごとに「専門家モデル」を SFT+RL で作り、`<problem, original answer>` と `<system prompt, problem, R1 response>` の 2 形式を混ぜて RL → 高温サンプリングで R1 の「考える癖」を取り込み → rejection sampling（ハズレを捨てる）で最終 SFT データに蒸留。「reflection / 自己検証」を non-CoT モデルに移すには長い CoT 教師データを直接食わせるのではなく、中間に RL を挟むのがコア。trade-off として応答長は伸びる（例: DeepSeek-V2.5 ベースで MATH-500 74.6 → 83.2 のとき、応答長 769 → 1510）。\n- **著者が明示した限界**: (i) 推論用デプロイ単位が大きい（prefilling 32 GPU、decoding 320 GPU）ので小規模チームに重い、(ii) V2 比 2× の生成速度はまだ伸ばす余地がある、(iii) `5.576M ドル` は本番 run 1 本ぶんのみで、過去の試行錯誤や ablation のコストは含まれていない。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2412.19437v2/`\n- 正規ノート: `notes/arXiv-2412.19437v2.md`\n";
