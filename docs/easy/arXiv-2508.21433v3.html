<script>
const RAW = "# The Complexity Trap: Simple Observation Masking Is as Efficient as LLM Summarization for Agent Context Management（SE エージェントの context management における単純な観測マスキングの位置づけ）\n\n- arXiv: https://arxiv.org/abs/2508.21433\n- 一次ソース: ../papers/arXiv-2508.21433v3/\n- 正規ノート: ../notes/arXiv-2508.21433v3.md\n\n---\n\n## 一言で言うと\n\nLLM ベースの software engineering agent では、長い軌跡の大部分が tool observation で占められるため、古い observation だけを placeholder に置き換える **Observation Masking** が、LLM による軌跡要約 **LLM-Summary** と同程度の solve rate を保ちながら、しばしばより低コストに動くことを示す実験論文である。著者は SWE-agent / SWE-bench Verified を主実験に使い、LLM-Summary が必ずしも複雑さに見合う利益を出さないこと、さらに Observation Masking と LLM-Summary を遅延結合する Hybrid が追加のコスト削減を出すことを主張している。\n\n## 何を議論する論文か\n\n- **問題設定**: ReAct / CodeAct 型の SE agent は、各 turn で reasoning、tool action、tool observation を履歴に追加する。履歴が伸びると token-based pricing と Transformer attention の計算量によりコストが増え、さらに long context で重要情報を使いにくい \"lost in the middle\" 問題が起きる、という設定で context management を比較する。\n- **対象範囲 / 仮定**: 主対象は SWE-agent 上の software engineering task で、benchmark は SWE-bench Verified。TeX では SE 領域の tool observation が \"verbose and noisy\" で、予備実験では SWE-agent の平均 turn の observation tokens が約 $84\\%$ を占めると述べる（`fig:token-type-distr`, `appendix:preliminary-experiments`）。\n- **既存研究との差分**: SWE-agent や SWE-Search は古い observation を省略する比較的単純な approach を使い、OpenHands や Cursor は LLM-based summarization を使う。本論文はこの 2 系統を同じ SWE-agent scaffold 内で formal に揃え、cost in USD と solve rate で体系比較する点が差分である。\n- **この論文で答えたい問い**: 古い context を「捨てる」Observation Masking と、「要約して残す」LLM-Summary のどちらが、SE agent の efficiency-effectiveness tradeoff をよくするのか。特に、LLM-Summary の複雑さが Observation Masking に対する一貫した性能・コスト上の利益を持つのかを問う。\n\n## 背景と前提\n\n- **LLM agent の軌跡**: 論文では agent history / trajectory を、system prompt、user prompt、各 turn の reasoning $r_i$、action $a_i$、observation $o_i$ の列として扱う。SE agent の observation には、ファイル内容、recursive directory listing、test suite log などが入り、単一 action でも thousands of tokens になりうる。\n- **context management が必要な理由**: Raw Agent は履歴をそのまま伸ばすため、著者は「agent costs can more than double」と述べる（`tab:main_results` 参照）。コストだけでなく、長い context 内の情報利用が悪くなる long-context 問題も背景に置く。\n- **baseline の関係**: Raw Agent は context management なしの比較基準。Observation Masking は SWE-agent / SWE-Search 系の observation omission を代表する。LLM-Summary は OpenHands / Cursor 系の prompt-based summarization を代表する。\n- **先行研究との関係**: Related Work では、SE agent 研究の多くが solve rate を上げるための training data scaling、best-of-multiple attempts、critic feedback、search strategy に注目してきたが、それらは inference cost を増やしがちだと整理する。MEM1 は dynamic state management を扱うが omission-based approach と比較しておらず、trajectory も SE agent より短いとされる。\n- **評価の見方**: solve rate は effectiveness、instance cost は efficiency として扱われる。95% confidence interval と † は Raw Agent との差の paired nonparametric bootstrap に基づく。\n\n## 提案手法\n\n### コアアイデア\n\n本論文の中心は、新しい複雑な記憶機構を作ることではなく、既存の context management 戦略を同じ条件で比較することである。著者の出発点は、SE agent の trajectory が reasoning や action よりも environment observation に強く偏っているという観察である。したがって、semantic な要約を作る前に、古い observation だけを機械的に省略する Observation Masking が非常に強い baseline になる。\n\n比較する戦略は 3 つである。\n\n- **Raw Agent**: context management なし。履歴 $\\tau$ が turn ごとに伸び続ける。\n- **Observation Masking**: 最新 $M$ turn の observation は残し、それより古い observation だけを placeholder $p_i$ に置き換える。reasoning $r_i$ と action $a_i$ は全履歴で保持する。\n- **LLM-Summary**: summarizer LLM $\\pi'$ が古い turn 群を summary $s_t$ に圧縮し、summary と最新 $M$ turn だけを main policy $\\pi$ に渡す。\n\n重要なのは、Observation Masking は token growth を遅くするが bounded context にはしない一方、LLM-Summary は古い interaction を summary に畳み込むため、trajectory growth を bounded に近づける点である。それにもかかわらず、実験では Observation Masking が多くの設定で LLM-Summary と同等以上の efficiency を示す。\n\n### 重要な定義・数式\n\n$$\n\\tau_{t-1} = (o_{sys}, o_{user}, (r_1, a_1, o_1), \\dots, (r_{t-1}, a_{t-1}, o_{t-1}))\n$$\n\n**式の意味**: Raw Agent の履歴を表す式である。turn $t$ の直前には、初期 prompt と、過去 $1$ から $t-1$ までの reasoning / action / observation がすべて context に入っている。\n\n**記号の定義**:\n- $\\tau_{t-1}$ ... turn $t$ に入る直前の agent trajectory / history\n- $o_{sys}$ ... task を初期化する immutable system prompt\n- $o_{user}$ ... task を初期化する user prompt\n- $r_i$ ... turn $i$ の agent reasoning\n- $a_i$ ... turn $i$ の action\n- $o_i$ ... turn $i$ の environment observation\n\n**この論文での役割**: Raw Agent の cost が増える理由を定義する基礎式である。Observation Masking と LLM-Summary は、この $\\tau_{t-1}$ をどう変換して main policy $\\pi$ に渡すかの違いとして定義される（`neurips_2025.tex` §3.1, Raw Agent）。\n\n$$\n\\begin{aligned}\n\\tau'_{t-1} &= (o_{sys}, o_{user}, (r_1, a_1, o'_1), \\dots, (r_{t-1}, a_{t-1}, o'_{t-1})) \\\\\no'_i &=\n\\begin{cases}\n      p_i & \\text{if } i < t-M \\\\\n      o_i & \\text{if } i \\geq t-M\n\\end{cases}\n\\end{aligned}\n$$\n\n**式の意味**: Observation Masking の変換である。最新 $M$ turn より古い observation は placeholder $p_i$ に置き換え、最新 $M$ turn の observation はそのまま保持する。\n\n**記号の定義**:\n- $\\tau'_{t-1}$ ... masking 後に main policy に渡される condensed trajectory\n- $o'_i$ ... masking 後の turn $i$ の observation\n- $p_i$ ... masked observation を表す placeholder text。TeX では例として \"Previous 8 lines omitted for brevity.\" が示される\n- $M$ ... rolling window size。主実験では $M=10$\n- $t$ ... 現在の turn index\n\n**この論文での役割**: 論文の最重要 baseline を定義する式である。Observation Masking は complete reasoning chain を残しつつ distant observation fidelity を下げる、という設計になっている。ただし TeX は、この方法が $\\tau$ の無限成長そのものを解くわけではないとも明記する（`eq:rolling_window`）。\n\n$$\n\\begin{aligned}\n\\mathcal{T}_{sum} &= (s_{last}, T_{t_{last}+1}, \\dots, T_{t-1-M}) \\\\\ns_t &\\sim \\pi'(\\cdot|o_{si}, \\mathcal{T}_{sum}) \\\\\nt_{last} &= t-1-M \\\\\n\\tau'_{t-1} &= (o_{sys}, o_{user}, s_t, T_{t-M}, \\dots, T_{t-1})\n\\end{aligned}\n$$\n\n**式の意味**: LLM-Summary の summary 生成と履歴再構成を表す。前回 summary と古い turn 群を summarizer LLM $\\pi'$ に渡して summary $s_t$ を生成し、その summary と最新 $M$ turn だけを使って新しい condensed trajectory を作る。\n\n**記号の定義**:\n- $\\mathcal{T}_{sum}$ ... summary に入れる対象。前回 summary $s_{last}$ と、最新 $M$ turn より前の turn 群からなる\n- $s_t$ ... turn $t$ 時点で生成される新しい summary\n- $\\pi'$ ... summarizer LLM\n- $o_{si}$ ... summary instruction\n- $t_{last}$ ... 最新 summary に含まれた最後の turn index\n- $T_i$ ... turn $i$ の単位。論文では $T_i=(r_i,a_i,o_i)$\n\n**この論文での役割**: LLM-Summary が Observation Masking と異なり、古い interaction を evolving summary に再帰的に畳み込むことを定義する。主実験では $N=21$, $M=10$ なので、蓄積 turn が $N+M=31$ に達したときに summary が発火する（`eq:llm_summary_traj`）。\n\n$$\n\\Delta = \\text{mean(strategy)} - \\text{mean(raw)}, \\qquad\np = 2 \\times \\min(\\Pr(\\Delta^* \\geq 0), \\Pr(\\Delta^* \\leq 0))\n$$\n\n**式の意味**: Raw Agent と各 strategy の差を paired bootstrap で評価するための定義である。$\\Delta$ は同じ $n=500$ instances 上での平均差、$p$ は bootstrap replicate $\\Delta^*$ の符号を使った two-sided p-value である。\n\n**記号の定義**:\n- $\\Delta$ ... strategy と Raw Agent の平均差。solve rate では percentage points、cost では dollars per instance\n- $\\Delta^*$ ... bootstrap replicate で得られる差\n- $p$ ... two-sided bootstrap p-value\n- $n=500$ ... main experiments の common instances 数\n\n**この論文での役割**: Table 1 の † と Appendix Table `tab:appendix_pvals_bootstrap` の根拠である。著者は $B=10{,}000$ replicates の paired nonparametric bootstrap を使い、$p<0.05$ の差に † を付ける。\n\n### 実装 / アルゴリズム上の要点\n\n- **主 scaffold**: SWE-agent。OpenHands (`v0.43.0`) は generality を探る追加実験として使う。\n- **主な model configurations**: Qwen3-32B の thinking / non-thinking（YaRN により context window 122K tokens）、Qwen3-Coder-480B-A35B-Instruct-FP8（default context window 256K tokens）、Gemini 2.5 Flash の thinking / non-thinking（default context window 1M tokens）。\n- **turn limit**: 主実験では long trajectories を見るため、特記がない限り 250 turns。\n- **Observation Masking**: 主実験では rolling window size $M=10$。Appendix の window-size ablation では $M=10$ で performance が peak し、$M=20$ で落ちるとされる。\n- **LLM-Summary**: SWE-agent に OpenHands-style prompt を少し変更して実装する。主実験では $N=21$, $M=10$。agent model temperature は 0.8、summary model temperature は 0。\n- **Gemini thinking**: cost constraints により Gemini 2.5 Flash の thinking budget は zero または 800 tokens に制限され、800 tokens 設定が paper 内で \"thinking\" と表記される。\n- **Hybrid**: Qwen3-Coder 480B + SWE-agent + SWE-bench Verified-50 で試す。Observation Masking を accumulation phase に使い、LLM-Summary は last resort として遅延発火する。著者は $N=43, M=W=10$ を使う。$W$ は Hybrid 内の Observation Masking rolling window size を表し、LLM-Summary の $M$ と記号衝突しないように導入されている。\n\n## 実験・結果\n\n- **データセット / ベンチマーク**: 主実験は SWE-agent on SWE-bench Verified。Appendix の paired bootstrap table は \"n=500 common instances per model\" と明記する。OpenHands generality と Hybrid は SWE-bench Verified-50。予備実験は SWE-bench Lite-50 と GPT-4.1-mini。window / tail-length ablation は randomly sampled 150-instance subset of SWE-bench Verified とされる。\n- **比較対象 / baseline**: Raw Agent、Observation Masking、LLM-Summary。OpenHands 実験では Observation Masking $M=10$ と $M=58$ も比較される。Appendix では critic-enhanced LLM-Summary も検討される。\n- **指標**: Solve Rate (%) を effectiveness、Instance Cost (USD) を efficiency として報告する。Table 1 は 95% bootstrap confidence intervals を含み、Raw Agent との差が $p<0.05$ の場合に † を付ける。\n- **主な結果**: 著者の中心主張は、context management は多くの条件で cost を大きく下げ、LLM-Summary は Observation Masking を一貫して、または有意に上回らない、というもの。\n\nTable `tab:main_results` の主な数値は以下である。括弧内の増減率は TeX の Table 1 と同じく Raw Agent に対する相対変化であり、percentage point ではない。\n\n| Model | Strategy | Solve Rate | Instance Cost |\n|---|---:|---:|---:|\n| Qwen3-32B | Raw Agent | 17.0 ± 3.3 | $1.12 ± 0.18 |\n| Qwen3-32B | Observation Masking | 15.0 ± 3.1 (-11.8%) | $0.55 ± 0.09 (-50.9%)† |\n| Qwen3-32B | LLM-Summary | 16.0 ± 3.3 (-5.9%) | $0.50 ± 0.07 (-55.4%)† |\n| Qwen3-32B (thinking) | Raw Agent | 23.0 ± 3.7 | $0.51 ± 0.07 |\n| Qwen3-32B (thinking) | Observation Masking | 24.6 ± 3.8 (+7.0%) | $0.46 ± 0.05 (-9.8%) |\n| Qwen3-32B (thinking) | LLM-Summary | 24.8 ± 3.9 (+7.3%) | $0.51 ± 0.06 (0.0%) |\n| Qwen3-Coder 480B | Raw Agent | 53.4 ± 4.3 | $1.29 ± 0.26 |\n| Qwen3-Coder 480B | Observation Masking | 54.8 ± 4.4 (+2.6%) | $0.61 ± 0.06 (-52.7%)† |\n| Qwen3-Coder 480B | LLM-Summary | 53.8 ± 4.2 (+0.7%) | $0.64 ± 0.06 (-50.4%)† |\n| Gemini 2.5 Flash | Raw Agent | 32.8 ± 4.1 | $0.41 ± 0.08 |\n| Gemini 2.5 Flash | Observation Masking | 35.6 ± 4.2 (+8.5%) | $0.18 ± 0.03 (-56.1%)† |\n| Gemini 2.5 Flash | LLM-Summary | 36.0 ± 4.1 (+9.8%) | $0.24 ± 0.04 (-41.5%)† |\n| Gemini 2.5 Flash (thinking) | Raw Agent | 40.4 ± 4.3 | $0.56 ± 0.10 |\n| Gemini 2.5 Flash (thinking) | Observation Masking | 36.4 ± 4.2 (-9.9%)† | $0.24 ± 0.04 (-57.1%)† |\n| Gemini 2.5 Flash (thinking) | LLM-Summary | 31.4 ± 4.0 (-22.3%)† | $0.25 ± 0.05 (-55.4%)† |\n\n補足すべき結果は以下である。\n\n- **Observation Masking の効率**: 5 設定中 4 設定で、Observation Masking が最低 instance cost を出す。著者は、summary call の overhead がなく、$M=10$ なので $N+M=31$ の LLM-Summary より warm-up が短いことを理由に挙げる。\n- **solve rate の差**: Appendix Table `tab:appendix_pvals_bootstrap` では、Qwen3-Coder 480B の Observation Masking は Raw 比で +1.4 pp [−1.6, 4.4], p=0.3856、LLM-Summary は +0.4 pp [−3.0, 3.8], p=0.8736。solve rate 上昇は有意ではないが、cost 差はどちらも p=0.0000†。\n- **Gemini thinking の低下**: Table 1 の相対変化では Observation Masking が -9.9%、LLM-Summary が -22.3%。Appendix の percentage point 差では、それぞれ -4.0 pp [−7.8, −0.2], p=0.0406† と -9.0 pp [−13.0, −5.2], p=0.0000† であり、ここは solve rate 低下も有意である。\n- **Qwen3-32B thinking の外れ挙動**: Appendix では、この設定の median trajectory length が 15 turns で、Qwen3-32B non-thinking より約 50% 短いと述べる。LLM-Summary は $N+M=31$ turns まで発火しないため、短い trajectory では効率改善が出にくい。\n- **Trajectory Elongation Effect**: LLM-Summary は一部モデルで trajectory を長くする。Gemini 2.5 Flash では LLM-Summary の mean trajectory length が 52 turns で、Observation Masking の 44 turns に対して 15% 増、Raw Agent の 50 turns に対して 4% 増。Qwen3-Coder 480B でも Raw 比 +15%、Observation Masking 比 +13% とされる（`fig:trajectory_lengths_boxplots`）。\n- **summary generation cost**: Table `tab:summary_instance_costs` では、LLM-Summary 呼び出し自体の平均 instance cost が Qwen3-32B \\$0.0143 / 2.86%、Qwen3-32B thinking \\$0.0033 / 0.65%、Qwen3-Coder 480B \\$0.0439 / 7.20%、Gemini 2.5 Flash \\$0.0161 / 6.71%、Gemini 2.5 Flash thinking $0.0131 / 5.24% と報告される。著者は、summarization call は毎回 unique sequence of turns を処理するため cache reuse が limited で、Gemini のように cache hit が安い API では特に不利だと説明する。\n- **Hybrid**: SWE-bench Verified-50 + Qwen3-Coder 480B で、$N=43, M=W=10$ の Hybrid は Observation Masking 比 7%、LLM-Summary 比 11% の cost reduction を出し、Raw Agent 比で solve rate を 2.6 percentage points 改善したと caption/text に書かれている。著者は full SWE-bench Verified 換算で Observation Masking 比 \\$20、LLM-Summary 比 \\$35 の expected savings と述べる。\n- **OpenHands generality**: OpenHands + Gemini 2.5 Flash no-thinking + SWE-bench Verified-50 では、SWE-agent で最適だった $M=10$ をそのまま使うと Observation Masking が大きく劣化するが、$M=58$ に tuning すると結果を再現できるとされる。著者は、SWE-agent は syntax error retry を dialog history から elide する一方、OpenHands は retry turns を保持するという scaffold 差を仮説として挙げる。\n- **著者が主張する貢献**: SWE-agent 上で 3 戦略を 5 model configurations と SWE-bench Verified で体系比較したこと、LLM-Summary の cost gap を trajectory elongation と summary generation cost に分けて議論したこと、Hybrid を提案したこと、OpenHands で initial evidence を示したこと、code と data を公開したこと。\n\n## 妥当性と限界\n\n- **この主張を支える根拠**: 主実験は同じ SWE-agent scaffold、同じ benchmark、同じ Raw Agent baseline に対して Observation Masking と LLM-Summary を比較している。Table 1 は 95% bootstrap confidence intervals を示し、Appendix Table `tab:appendix_pvals_bootstrap` は paired nonparametric bootstrap with $B=10{,}000$ replicates を使う。instance-level pairing を保つため、単純な非対応比較よりは benchmark instance ごとの相関を考慮している。\n- **cost 評価の根拠**: Gemini は Vertex AI API が返す cost を使う。Qwen は self-hosted vLLM の per-turn token usage から Alibaba API pricing に基づいて post-hoc cost を計算する。ただし TeX は、Alibaba pricing が Qwen3-32B で cache hit / miss input tokens を区別しないため Qwen3-32B experiments の cost は inflated になると明記する。\n- **著者が認めている limitations / future work**: §6 では 3 点を挙げる。第一に、実験は SE domain に限定され、長く冗長な tool outputs が Observation Masking に有利な条件である。第二に、全戦略が simple, non-adaptive heuristic triggers を使い、Observation Masking は relevance / staleness を見ず、LLM-Summary も semantic boundaries や subgoals を無視する。第三に、agent scaffolds 間の generalization は initial evidence に留まる。\n- **読者として注意すべき点**: Table 1 の solve rate 括弧は相対 percentage であり、percentage point ではない。特に Gemini 2.5 Flash thinking の -9.9% / -22.3% は、Appendix では -4.0 pp / -9.0 pp に対応する。\n- **読者として注意すべき点**: Hybrid の結果は SWE-bench Verified-50 + Qwen3-Coder 480B に限られる。主実験のような n=500 全 model configuration 比較ではないため、Hybrid の solve rate +2.6 pp を一般結論として読むには追加検証が必要である。\n- **読者として注意すべき点**: critic-enhanced LLM-Summary について、Additional Studies 冒頭は \"SWE-bench Lite-50\" と書く一方、figure caption と本文は \"150-sample subset of SWE-bench Verified\" / \"Testing on 150 samples from SWE-bench Verified\" と書いており、TeX 内にデータセット記述の不整合がある。結論としては、standard LLM-Summary に対する solve rate 改善はなく、trajectory elongation が悪化した、という点が本文で一貫している。\n- **追加で確認したい実験 / 疑問**: Observation Masking を固定 window ではなく、edited file、test failure、recently accessed file などの relevance に応じて適応的に変えるとどうなるか。Gemini thinking での有意な solve rate 低下が、thinking trace や long-range reasoning のどの部分を切ることで起きるのか。OpenHands 以外の scaffolds でも $M$ tuning だけで同様の結果になるのか。SE 以外の、observation が短く reasoning が長い domain で Observation Masking が同じ強さを持つのか。\n\n## 用語メモ\n\n- **trajectory / history**: agent が task 中に蓄積する context。論文では $\\tau_{t-1}$ として formalize される。\n- **turn $T_i$**: 論文では $T_i=(r_i,a_i,o_i)$。reasoning、action、observation の単位である。\n- **observation $o_i$**: tool action の出力。SE task では source file、directory listing、test log などが入り、context の多くを占める。\n- **Raw Agent**: context management を行わない baseline。履歴をすべて残す。\n- **Observation Masking**: 最新 $M$ turn より古い observation だけを placeholder に置き換える戦略。reasoning と action は保持する。\n- **placeholder $p_i$**: masked observation を表す短い text。TeX の例は \"Previous 8 lines omitted for brevity.\"。\n- **LLM-Summary**: summarizer LLM $\\pi'$ に古い turn 群を要約させ、summary $s_t$ と最新 $M$ turn だけを context に残す戦略。\n- **$N$ と $M$**: LLM-Summary の hyperparameters。$N$ は一度に蓄積して summary 対象にする turn 数、$M$ は変更せず残す tail turns 数。主実験は $N=21, M=10$。\n- **rolling window size $M$**: Observation Masking で何 turn 分の observation を残すか。主実験では $M=10$、OpenHands では tuning 後に $M=58$。\n- **trajectory elongation**: LLM-Summary が agent の turn 数を伸ばす副作用として著者が議論する現象。summary が failure signals を隠し、agent が探索を続ける reinforcing signal になる可能性が述べられる。\n- **Instance Cost**: 1 benchmark instance あたりの cost in USD。Gemini は API 返却値、Qwen は token usage と Alibaba API pricing による post-hoc 計算。\n- **Solve Rate**: benchmark instance の解決率。Table 1 では % で報告される。\n- **paired nonparametric bootstrap**: Raw Agent と strategy の instance 対応を保って差を resampling する統計評価。$B=10{,}000$。\n- **†**: Raw Agent との差が bootstrap p-value $p<0.05$ のときに付く significance marker。\n- **Hybrid**: Observation Masking を warm-up / accumulation phase に使い、LLM-Summary は context が十分膨らんだ後に遅延発火する組み合わせ。主な設定は $N=43, M=W=10$。\n- **scaffold**: SWE-agent や OpenHands のような agent 実装の枠組み。turn の保持、retry の扱い、prompt 形式などが異なるため、同じ context strategy でも hyperparameter が変わりうる。\n\n## 読む順番の提案\n\n- まず Abstract と Introduction を読み、著者の問いが「LLM-Summary の複雑性は Observation Masking より実益があるのか」であることを確認する。正規ノートでは `Summary（著者の主張）` の問題設定に対応する。\n- 次に Fig. `fig:token-type-distr` と §3.1 `Context Management Strategies` を見る。ここで observation tokens が約 $84\\%$ という前提と、Raw Agent / Observation Masking / LLM-Summary の式を押さえる。正規ノートの手法 bullet と対応する。\n- その後 Table `tab:main_results` を読む。solve rate と instance cost の主要数値はこの表が中心で、正規ノートの結果 bullet のほぼ全てがここに接続している。\n- 次に §4.4 `The Trajectory Elongation Effect` と Fig. `fig:trajectory_lengths_boxplots` を読む。LLM-Summary が単に summary cost を払うだけでなく、turn 数を伸ばすという主張の根拠である。\n- §5.2 `The Costs of Summarization` と Table `tab:summary_instance_costs` で、summary generation 自体の cost と cache reuse の問題を確認する。\n- §5.3 `Hybrid` は最後に読むとよい。$N=43, M=W=10$ の決め方は、Raw Agent の $N=21$ turns 時の context size 約 30K tokens と Observation Masking 下の context accumulation を揃える、という説明につながる。\n- Appendix では `tab:appendix_pvals_bootstrap` を見て、Table 1 の相対 % と percentage point 差を区別する。`appendix:ablation:window-size` と `appendix:ablation:tail-length` は $M=10$ と $N=21,M=10$ の根拠、`appendix:llm-summary-prompt` は LLM-Summary prompt の実装確認に使う。\n- 正規ノート `notes/arXiv-2508.21433v3.md` を読むときは、`Critical Thoughts（評価・疑問）` をこの easy note の `妥当性と限界` と照合すると、著者の主張と読者側の評価を分けて読みやすい。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2508.21433v3/`\n- 正規ノート: `notes/
