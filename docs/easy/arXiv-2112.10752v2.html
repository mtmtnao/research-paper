<script>
const RAW = "# High-Resolution Image Synthesis with Latent Diffusion Models（潜在拡散モデルでキレイな高解像度画像をつくる）\n\n- arXiv: https://arxiv.org/abs/2112.10752\n- 一次ソース: ../papers/arXiv-2112.10752v2/\n- 正規ノート: ../notes/arXiv-2112.10752v2.md\n\n---\n\n## 一言で言うと\n\n画像を一度「ぎゅっと縮めた小さな世界」に変換してから、その中でノイズを少しずつ消す練習をさせることで、SD（Stable Diffusion）の元になった、軽くてキレイな画像生成 AI をつくった研究です。\n\n## どんな問題を解こうとしてるの？\n\n- **現実の困りごと**: AI に絵を描かせる「拡散モデル（diffusion model）」は、とてもキレイな絵が描ける代わりに、学習にものすごい計算パワーを使います。本文に「最強クラスの拡散モデルは V100 という高性能 GPU を **150〜1000 日分** 使って学習し、5 万枚生成するのに A100 という GPU 1 台で **5 日**かかる」と書かれています（intro）。これは大企業や大学の一部の研究室しか試せないレベルで、論文では「もっとみんなが使えるようにしたい（democratize）」と表現されています。\n- 例えるなら、「絵を描くのが超うまいけど、1 枚描くのに巨大な工場をフル稼働させる職人」しかいない状況。\n- **既存のやり方の足りなさ**:\n  - そのまま画像（ピクセル空間）で拡散モデルを動かすと、人間の目にはほとんど見えない細かい模様まで律儀に学習してしまい、計算がムダに重い。\n  - 逆に VQ-VAE / VQGAN のような先行研究は画像を「思いきり小さい合言葉」に圧縮してから別の AI で扱うけれど、圧縮しすぎて元画像を完全には戻せなくなる、という問題があった。\n  - そこで「ちょうどよい圧縮率」で軽くしつつ、絵としての品質も保ちたい、というのが目標。\n\n## どうやって解いたの？\n\n### コアアイデア\n\n仕事を **2 段階に分ける** のがミソです。\n1. まず「画像を縮める／元に戻す」専用 AI（オートエンコーダ）を作る。これで、絵の見た目はほぼそのままに、データの量を 1/4 や 1/8 にぎゅっと縮める。\n2. 次に、その縮んだ世界の中で「ノイズだらけの絵 → だんだんキレイな絵」を作る練習（拡散モデル）をさせる。\n\n例えるなら、**料理のレシピを「素材選び」と「味付け」に分ける** ようなもの。素材選び（オートエンコーダ）と味付け（拡散モデル）を別々の人に任せれば、それぞれが得意なことに集中できて、全体の準備時間も短く済みます。論文ではこれを「**知覚的な圧縮**（perceptual compression、見た目に関係ない細部を捨てる作業）と **意味的な圧縮**（semantic compression、絵の中身や構図を学ぶ作業）を分ける」と説明しています。\n\n### 仕組み\n\n- **step 1（第一段：オートエンコーダ）**: 画像 $x$ を encoder $\\mathcal{E}$ で小さなデータ $z$ に縮め、decoder $\\mathcal{D}$ で元の大きさに戻す。学習には「LPIPS（見た目の似てなさを測るスコア）」と「patch GAN という、画像の小さな四角ごとに本物っぽさを判定する仕組み」を組み合わせて、ぼやけない再構成を目指す。縮める比率は $f = H/h$（縦の長さの比）で、$f \\in \\{1, 2, 4, 8, 16, 32\\}$ を試した。\n  - ↑「encoder」は入口、「decoder」は出口の役割をする AI のこと。データをカバンに詰めるのと出すのに例えるとイメージしやすい。\n- **step 2（第二段：潜在拡散）**: 縮んだ $z$ にちょっとずつノイズ（雑音、ザラザラした粒）を T 回（論文では T=1000）加えていって、最後はほぼ砂嵐にする。そのあと AI（UNet という形のネットワーク）に「今のザラザラ具合を見て、混ぜたノイズを当てる」練習をさせる。練習が済めば、本番では砂嵐から始めてノイズを少しずつ取り除き、新しい絵をつくれる。\n  - ↑「拡散モデル」とは、絵に雑音を加える→外す、を学ばせる仕組み。「UNet」は画像処理が得意な形のニューラルネット（NN は、たくさんの足し算かけ算を積み重ねて入力から出力を出す計算機のこと）。\n- **step 3（条件付け）**: 「ネコの絵を描いて」のような注文（テキスト・絵のラベル・低解像度画像など、いろんな種類）を AI に伝えるために、**cross-attention（クロス注意機構）** という仕掛けを UNet の途中に差し込む。注文をいったん別の AI（テキストなら BERT などの Transformer）で数字の並びに変換し、それを「どこを見ながら描くか」のヒントとして使う。\n  - ↑「attention」は「今、入力のどの部分に注目するか」を決めるしくみ。テスト中に問題を読みながら「ここの数字が大事だな」と目を動かす感覚に近い。\n- **step 4（生成）**: 練習が終わったら、ランダムな数字（ノイズ）から出発 → 拡散モデルでだんだんキレイな $z$ にする → decoder $\\mathcal{D}$ で大きな絵に戻す。これで完成。\n\n### 主要な数式\n\n#### ① 普通の拡散モデルの学習目標（ピクセル空間）\n\n$$ L = \\mathbb{E}_{x,\\,\\epsilon \\sim \\mathcal{N}(0,1),\\,t}\\big[\\,\\|\\epsilon - \\epsilon_\\theta(x_t, t)\\|_2^2\\,\\big] $$\n\n**この式が言ってること**: 元の絵 $x$ にあえてノイズ $\\epsilon$ を混ぜた汚れた絵 $x_t$ を AI に見せて、「混ぜたノイズはこれだよね？」と当てさせる。AI の予想 $\\epsilon_\\theta$ と本物のノイズ $\\epsilon$ のズレ（2 乗してから平均）が小さくなるように練習する。\n\n**記号の意味**:\n- $x$ … 元のキレイな画像\n- $\\epsilon$ … 混ぜたノイズ（ランダムな数字。ベル型に散らばる「正規分布 $\\mathcal{N}(0,1)$」から取る）\n- $t$ … 何ステップ目までノイズを混ぜたかを表す数（1〜1000 のどれか）\n- $x_t$ … $t$ ステップ分ノイズを混ぜたあとの絵\n- $\\epsilon_\\theta(x_t, t)$ … AI が「混ぜたノイズはこれだろう」と予想した値（$\\theta$ は AI の中の調整つまみ）\n- $\\|\\cdot\\|_2^2$ … 2 つの数の並びの差を「各成分ごとに 2 乗して足す」やり方\n- $\\mathbb{E}[\\cdot]$ … いろんなパターンで試した時の平均\n\n**身近な例え**: 友達に絵を見せる前にわざと砂消しゴムでこすって汚しておき、「どのくらい消したか当ててごらん」とクイズを出す感じ。AI は何度も練習して「これは消しゴム 5 回分くらい」と当てられるようになる。当てられれば、逆に砂嵐から消しゴムを巻き戻して絵を復元できる、というのが拡散モデルの心。\n\n#### ② この論文の主役：潜在空間での拡散モデル損失\n\n$$ L_{\\text{LDM}} = \\mathbb{E}_{\\mathcal{E}(x),\\,\\epsilon \\sim \\mathcal{N}(0,1),\\,t}\\big[\\,\\|\\epsilon - \\epsilon_\\theta(z_t, t)\\|_2^2\\,\\big] $$\n\n**この式が言ってること**: ①とほぼ同じ練習を、画像そのものではなく **encoder で縮めた $z$** に対してやる。扱う数が少ないので学習も生成もずっと軽くなる。\n\n**記号の意味**:\n- $\\mathcal{E}(x)$ … 画像 $x$ を encoder で縮めた潜在データ $z$（オリジナルより小さい）\n- $z_t$ … $z$ に $t$ ステップ分ノイズを混ぜたもの\n- 他は ① と同じ\n\n**身近な例え**: 大きい段ボール箱（元画像）の中で物を整理しながら片付けるのは大変。なので一度、本当に大事な物だけ小さいリュック（潜在 $z$）に入れて、リュックの中で整理整頓する。終わってからリュックの中身を箱に戻せば、もとの大きさで絵が完成する。\n\n#### ③ クロス注意機構（条件付けのコア）\n\n$$ \\text{Attention}(Q, K, V) = \\text{softmax}\\!\\left(\\frac{Q K^\\top}{\\sqrt{d}}\\right) \\cdot V $$\n\nここで $Q = W_Q^{(i)} \\varphi_i(z_t)$（絵の途中状態から作る）、$K = W_K^{(i)} \\tau_\\theta(y)$、$V = W_V^{(i)} \\tau_\\theta(y)$（注文 $y$ から作る）。\n\n**この式が言ってること**: 絵を描いている途中の AI が、注文文の中の「どの単語に注目すべきか」を点数化（softmax で確率みたいな割合に変換）して、その重みで注文の中身（$V$）を取り込む。これで「赤い帽子の女の子」と言われたら、絵の帽子のあたりを描く時に「赤い」「帽子」という単語に強く目を向けて描ける。\n\n**記号の意味**:\n- $Q$（Query, 質問） … 「今ここを描いてる、どこを見ればいい？」という絵側からの問い合わせ\n- $K$（Key, 鍵） … 注文の各単語につけられた「私はこういう情報だよ」のラベル\n- $V$（Value, 中身） … 注文の各単語の実際の意味の中身\n- $W_Q, W_K, W_V$ … $z$ や注文を $Q, K, V$ に変換するための調整つまみ（学習で決まる）\n- $\\varphi_i(z_t)$ … UNet の途中の絵の状態\n- $\\tau_\\theta(y)$ … 注文 $y$（テキストやラベル）を AI が読める数字列に変換したもの\n- $d$ … $Q$ や $K$ の長さ。$\\sqrt{d}$ で割るのは、数が大きくなりすぎないようにする工夫\n- $\\text{softmax}$ … 数の並びを「全部足したら 1 になる割合」に変える関数。点数を確率っぽくする\n- $\\cdot$ … 行列のかけ算（数の表の中身を順番に組み合わせて新しい表を作る計算）\n\n**身近な例え**: 図書館で課題のレポートを書くシーン。今書いている段落（$Q$）に合いそうな本を、棚の見出し（$K$）で探し、合ったらその本の中身（$V$）を強めに参考にする。複数の本を一気に重み付けして参考にする感じ。\n\n## 何がすごいの？\n\n論文の数値はすべて TeX から：\n- **無条件生成（顔・教会・寝室など）**: CelebA-HQ で FID 5.11、FFHQ で 4.98、LSUN-Churches で 4.02、LSUN-Bedrooms で 2.95。FID は「生成画像と本物がどれだけ似た分布か」を測るスコアで、**小さいほど良い**。LSUN-Bedrooms では強敵 ADM（FID 1.90）に負けるが、論文によると LDM は **パラメータが約半分、学習計算が約 1/4**（55 V100 days vs 232 V100 days）で迫っている。\n- **ImageNet クラス条件付き生成**: LDM-4-G（classifier-free guidance $s=1.5$ 付き）で **FID 3.60 / IS 247.67**、400M パラメータ。比較対象の ADM-G（FID 4.59, 608M）を上回り、しかも学習は 271 V100 days（ADM-G は 962 days）。\n  - ↑「IS（Inception Score）」は「画像の中身がはっきりしていて、かつバラエティに富んでいるか」を測るスコアで、**大きいほど良い**。\n- **テキスト→画像（MS-COCO で評価）**: LDM-KL-8（1.45B params, LAION-400M で学習）で FID 23.31、guidance $s=1.5$ 付きで **FID 12.63 / IS 30.29**。GLIDE（FID 12.24, 6B）や Make-A-Scene（11.84, 4B）と同等で、**パラメータは 1/3〜1/4**。\n- **超解像（ImageNet ×4）**: LDM-4（169M, 100 steps）で **FID 2.8**。SR3（FID 5.2, 625M）を大きく超える。人間の評価実験でも、ピクセル拡散モデルは 16.0% しか「本物より好まれない」のに対し LDM-4 は **30.4%**。\n- **インペインティング（穴埋め, Places 512²）**: LDM-4 big (with fine-tune) で **FID 1.50, LPIPS 0.137**。SOTA だった LaMa（FID 2.21）と CoModGAN（1.82）を上回る。ピクセル拡散（LDM-1）に対して **2.7 倍以上速く、FID も 1.6 倍以上良く** なった。\n- **著者が「貢献（contributions）」として挙げていること（intro 末尾）**:\n  - (i) 従来の Transformer ベース手法より大きな絵に素直に拡張でき、再構成も詳細。メガピクセル級まで描ける。\n  - (ii) 無条件生成・インペインティング・確率的超解像など複数タスクで競争力ある性能を、計算コストを大幅に下げて達成。\n  - (iii) encoder と prior（事前分布）を同時に学ばせる先行研究（LSGM 等）と違い、再構成 vs 生成の重み付けに悩まなくていい。\n  - (iv) 超解像・インペインティング・セマンティック合成では「畳み込み的サンプリング」で 1024² 級の大きな絵にも自然に拡張できる。\n  - (v) cross-attention に基づく汎用条件付け機構を提案し、クラス・テキスト・レイアウトを統一的に扱える。\n  - (vi) 学習済みモデル（LDM と autoencoder）を公開して再利用しやすくした。\n\n## キーワード辞典\n\n- **拡散モデル（Diffusion Model, DM）** … 絵にノイズを混ぜる→外すを練習させて、ノイズから絵を作れるようにする AI の作り方。\n- **LDM（Latent Diffusion Model）** … 絵そのものではなく「縮めたデータ」の中で拡散モデルを動かす方式。本論文の提案。\n- **オートエンコーダ（autoencoder）** … 入口の AI（encoder）でデータを縮め、出口の AI（decoder）で元に戻すペア。\n- **encoder $\\mathcal{E}$ / decoder $\\mathcal{D}$** … それぞれ画像を小さくする AI と、元の大きさに戻す AI。\n- **潜在空間（latent space）** … encoder で縮めた後の「小さい数字の世界」。\n- **UNet** … 入力画像を一度小さく圧縮しながら処理して、また大きく戻す形の AI。お皿の凹みのような形をしているのが名前の由来。\n- **VAE（Variational AutoEncoder, 変分オートエンコーダ）** … 潜在空間を「ベル型のばらつき」に近づけるよう正則化された autoencoder。本論文は KL-reg として弱く採用。\n- **VQ-VAE / VQGAN** … 潜在を「離散的な合言葉」に量子化する autoencoder。本論文は VQ-reg として使う場合がある。\n- **KL（KL ダイバージェンス）** … 2 つの確率分布の違いを測る量。「ベル型からどれだけ離れているか」のペナルティとして使う。\n- **GAN（Generative Adversarial Network, 敵対的生成ネットワーク）** … 「絵を描く役」と「本物か偽物か見破る役」を競わせて学習させる生成モデル。\n- **patch-based adversarial loss** … 絵の小さな四角ごとに本物っぽいか判定する GAN 風の損失。\n- **LPIPS** … 画像同士の「人間目線での近さ」を測るスコア。\n- **FID（Fréchet Inception Distance）** … 生成画像と本物画像の分布のズレを測るスコア。小さいほど良い。\n- **IS（Inception Score）** … 生成画像のはっきりさと多様さを測るスコア。大きいほど良い。\n- **PSNR / SSIM** … 画像の画素レベルでの近さを測る古典的スコア。ぼやけた画像にも甘め。\n- **Precision / Recall** … 生成画像が本物の「どれだけそれっぽいか（Precision）」「本物のバリエーションをどれだけ広くカバーしているか（Recall）」。\n- **Transformer** … 文章などを「どこに注目するか」で処理する AI の一種。BERT もその仲間。\n- **BERT / BERT-tokenizer** … 文章を細かいパーツに区切って数字列にする道具。\n- **attention / cross-attention** … 入力のどの部分に注目するかを学ぶ仕組み。cross-attention は「絵と注文文」のように 2 種類の情報をつなぐ場合に使う。\n- **softmax** … 数の並びを「足したら 1 になる割合」に変える関数。点数を確率風にする。\n- **classifier-free guidance (cfg)** … 「お題ありで描く」と「お題なしで描く」の両方を学ばせておき、本番で両者の差を強調して「お題寄り」の絵を作る技。$s$ がその強さ。\n- **DDPM / DDIM** … 拡散モデルでサンプル（絵）を作る代表的な手順。DDIM は少ないステップでも作れる。\n- **ADM / ADM-G** … 当時 SOTA だったピクセル拡散モデル。本論文の比較相手。\n- **SR3** … 拡散モデルベースの超解像モデル。\n- **LaMa** … インペインティングの強い既存モデル。\n- **ImageNet / CelebA-HQ / FFHQ / LSUN / Places / MS-COCO / LAION-400M / OpenImages** … いろいろな画像データセット。LAION-400M は 4 億枚規模のテキスト付き画像で text-to-image 学習に使用。\n- **V100 days / A100** … NVIDIA の GPU の名前。「V100 1 台で 1 日動かすと 1 V100 day」と数える計算コスト。\n- **megapixel（メガピクセル）** … 100 万画素。1024² ≈ 1 メガピクセル相当の「大きな絵」。\n- **mode-covering / mode-collapse** … 生成モデルが本物のバラエティを広くカバーできるか（covering）／一部に偏ってしまうか（collapse）の話。\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **なぜ「縮めた世界」で拡散モデルが効くのか**: 著者は intro と Method 冒頭で、「ピクセル空間の拡散モデルは知覚的にはほぼ無意味な高周波の細部にまで計算を割いてしまう」と指摘。Fig. fig:perceptualcompression の rate-distortion 曲線で、ある一定の bit 数を超えると「人の目に見える変化」がほぼ無くなることを示し、その先を AI に頑張らせるのは無駄、という直感を視覚化している。\n- **第一段の 2 種類の正則化**: $z$ が暴れすぎないように、KL-reg（標準正規分布へ弱い KL ペナルティ）か VQ-reg（VQGAN のように離散化する。ただし量子化層を decoder 側に吸収）のどちらかを使う。R-FID は $f=4$ で KL → 0.27、VQ → 0.58 とほぼ無損失（小さいほど良い、Tab. tab:firststagetable）。\n- **圧縮率 $f$ の sweet spot**: $f=1$（=普通のピクセル DM）は学習が遅すぎ、$f=32$ は情報が落ちすぎる。2M ステップ学習後の FID で $f=1$ と $f=8$ は約 38 もの差がついた（Sec. 4.1）。著者は **$f=4$ と $f=8$ が一番バランス良い** と結論。\n- **cross-attention 以外の選択肢との比較は無い**: cross-attention の有効性は本文の主張だが、FiLM や adaLN との直接比較 ablation は無い（後続研究の宿題）。\n- **convolutional sampling（畳み込み的サンプリング）**: UNet が畳み込み層（=同じフィルタを画像全体にスライドさせる仕組み）でできているおかげで、$256^2$ で学習したモデルでも、入力サイズを大きくして動かすだけで $512^2$〜$1024^2$ の絵が出せる（Sec. 4.3.2）。ただし潜在空間の SNR（信号 vs ノイズの比）の取り方によって結果が大きく変わるので、標準偏差で rescale する工夫（補遺 suppsec:rescale）が必要。\n- **限界（著者の正直な告白）**: (i) サンプリングは依然 GAN より遅い、(ii) $f=4$ の autoencoder でも完全な再構成ではないので、医用画像など「ピクセル正確さ」が要る場面ではボトルネックになり得る（Sec. 5）。\n- **倫理**: deep fake、特に女性に偏った被害、学習データの記憶（training data extraction）、データ由来のバイアスの増幅、を Societal Impact で列挙。具体的な対策は提示されていない。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2112.10752v2/`\n- 正規ノート: `notes/arXiv-2112.10752v2.md`\n";
