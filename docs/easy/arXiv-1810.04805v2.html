<script>
const RAW = "# BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding（深く・両方向から文を読む大きな AI の作り方）\n\n- arXiv: https://arxiv.org/abs/1810.04805\n- 一次ソース: ../papers/arXiv-1810.04805v2/\n- 正規ノート: ../notes/arXiv-1810.04805v2.md\n\n---\n\n## 一言で言うと\n\n文の **左側と右側を同時に見て** 言葉を予測する練習を大量にやらせると、いろんな国語の問題が一気に得意になる AI ができるよ、という論文。\n\n## どんな問題を解こうとしてるの？\n\n- 現実の困りごと:\n  - コンピュータに「文章を読む」「質問に答える」「文の意味が似てるか判定する」みたいな国語の問題を解かせたい。\n  - けれど、こういう問題ごとに専用の AI をゼロから作るのは大変だし、データもたくさん要る。\n  - そこで「最初に大量の本や Wikipedia で言葉の使い方を勉強しておいて（= 事前学習）」「あとから個別の問題用に少しだけ追加練習する（= ファインチューニング）」という流れが流行ってた。\n    - **事前学習（pre-training）** … 大量の文章を読ませて、言葉の使い方の感覚を身につけさせる準備運動のこと。\n    - **ファインチューニング（fine-tuning）** … 準備運動済みの AI に、本番の問題（例: 質問応答）の練習問題を少し追加で解かせて仕上げること。\n- これまでのやり方の何が足りなかったか:\n  - 当時の主流だった **OpenAI GPT**（← Generative Pre-trained Transformer の略。文章を生成する AI）は **左 → 右の一方向** にしか文を読まなかった。\n    - 例: 「私は ___ が好き」の ___ を当てるとき、左側（「私は」）しか見ない。右側（「が好き」）は見えない。\n  - もうひとつの主流 **ELMo**（← Embeddings from Language Models の略。文脈付き単語ベクトルを作る方法）は、左→右と右→左の 2 本を別々に走らせて最後にくっつけるだけだった。\n    - これだと「左を読みながら同時に右も気にする」みたいな深い読み方ができない。\n  - 特に **QA（Question Answering、質問応答）** みたいに、答えになりそうな単語の **前後どちらも** ちゃんと見ないといけないタスクで、これは致命的だった。\n\n## どうやって解いたの？\n\n### コアアイデア\n\n学校の国語の「穴埋め問題」を、AI にひたすら解かせる、というアイデア。\n\nたとえば「今日は ___ が降っているので傘を持っていこう」という文の ___ を当てるとき、人間は左側（「今日は」）も右側（「が降っているので傘を…」）も両方ヒントに使うよね。BERT もそうやって **左右両方を同時に見て** 穴を当てる練習をする。これを巨大な本と Wikipedia でひたすらやり込むと、「言葉の前後関係」の感覚がめちゃくちゃ強くなる。あとは、その「感覚」を持ったまま、質問応答や感情判定みたいな個別の問題に少しだけ追加練習させると、専用 AI より強くなる、という発想。\n\n### 仕組み\n\n- **step1: 文を細かく分けて並べる**\n  - 入力の文を **WordPiece**（← 単語をさらに小さい部品に分ける方法。「playing」→「play」+「##ing」みたいに分ける。語彙は 30,000 個）で細切れにする。\n  - 文の頭に必ず `[CLS]` という特殊な印を入れる。`[CLS]` は「この文全体をまとめた答えを書く欄」みたいな働き。\n  - 2 つの文を入れるときは間に `[SEP]`（区切り）を入れて、どっちの文に属するかの印（segment embedding）を全単語にくっつける。\n  - 単語の意味、文の所属、何番目か（position）の 3 種類の数字情報を足し合わせて入力とする。\n- **step2: Transformer に通す**\n  - **Transformer**（← 文の中の単語どうしが「お互いをどれくらい気にするか」を計算しながら情報を混ぜていく仕組み。後ろの「キーワード辞典」と「ちょっと深掘り」も参照）を何層も積み重ねる。BERT_BASE は 12 層、BERT_LARGE は 24 層。\n  - 全層で、各単語が **左の単語にも右の単語にも自由に注意を向けられる**。これが「深い双方向」の意味。\n- **step3: 事前学習タスクその 1「穴埋め（Masked LM, MLM）」**\n  - 入力単語のうち、ランダムに **15%** を選ぶ。\n  - 選ばれた単語のうち:\n    - **80%** は `[MASK]` という特殊な記号に置き換える（= 完全に隠す）\n    - **10%** はランダムな別の単語にすり替える（= わざと嘘を混ぜる）\n    - **10%** はそのまま残す\n  - その単語の元の正解を当てさせる。\n  - なぜ 80/10/10 かというと、`[MASK]` だけだと「本番（ファインチューニング）には `[MASK]` が出てこないのにここでだけ出てくる」というズレ（= mismatch）ができるから、混ぜて防いでる。\n- **step4: 事前学習タスクその 2「次の文当て（Next Sentence Prediction, NSP）」**\n  - 文 A と文 B のペアを与えて、「B は A の本当の続き？それとも全然関係ない他の文？」を 2 択で当てさせる。\n  - 50% は本物の続き（IsNext）、50% はランダムな文（NotNext）。\n  - 答えは `[CLS]` の最終ベクトルから出す。\n  - これで「文と文の関係」を学ばせる。QA や NLI（自然言語推論）に効く。\n- **step5: 事前学習データと規模**\n  - **BooksCorpus**（小説 8 億語）+ **English Wikipedia**（25 億語）合計 約 33 億語。\n  - BERT_BASE は Cloud TPU を 16 個、BERT_LARGE は 64 個、それぞれ 4 日間ぶん回して学習。\n    - **TPU**（← Tensor Processing Unit。Google が作った AI 専用の計算チップ。GPU よりさらに行列計算に特化）\n- **step6: ファインチューニング**\n  - 事前学習が終わったら、目的の問題（質問応答、感情判定、など）の正解付きデータで全パラメータをちょっとだけ追加学習する。\n  - 出力層をタスクに合わせて 1 枚足すだけで、本体構造はほぼそのまま。\n  - 文単位の判定（例: 感情がポジ/ネガ）なら `[CLS]` の出力を使う。\n  - 単語ごとの判定（例: 質問の答えがどこから始まってどこで終わるか）なら、各単語の出力 $T_i$ を使う。\n\n### 主要な数式\n\n#### 数式 1: SQuAD（質問応答）の「答えはここから始まる確率」\n\n質問応答では、答えになる文字列が「文章のどこから始まってどこで終わるか」を当てる。「ここから始まる確率」を次の式で計算する。\n\n$$ P_i = \\frac{e^{S \\cdot T_i}}{\\sum_j e^{S \\cdot T_j}} $$\n\n**この式が言ってること**: 単語 $i$ が「答えの開始位置」である確率を計算してるよ。文章の中の全部の単語について「開始らしさ」のスコアを出して、その中で単語 $i$ の割合がどれくらいかを出してる。1 番開始っぽい単語が確率も 1 番高くなる。\n\n**記号の意味**:\n- $P_i$ … 単語 $i$ が答えの開始位置である確率（0〜1 の数）\n- $T_i$ … BERT が出した「単語 $i$ の意味を表す数字の列」（住所の数字みたいに、複数の数で 1 つの単語を表してる。これを「ベクトル」と呼ぶ）\n- $S$ … 「開始位置っぽさを測るものさし」役の数字の列（ベクトル）。ファインチューニング中に学習する\n- $S \\cdot T_i$ … $S$ と $T_i$ の「内積」。2 つの数字の列の対応する位置どうしを掛けて全部足したもの。2 つが似てるほど大きい値になる「相性スコア」だと思えば OK\n- $e^{x}$ … 値をいつもプラスにして、しかも差を強調するための変換。$x$ が大きいほどぐっと大きくなる\n- $\\sum_j$ … 文章の全部の単語 $j$ について足し合わせるという意味。みんなを足したものを「全体」とする\n\n**身近な例え**: クラスで「次の班長は誰が一番ふさわしい？」と投票するイメージ。各人 $i$ に「班長らしさのスコア $S \\cdot T_i$」が付いていて、それを「みんなのスコア合計」で割って、各人の当選確率にしてる感じ。スコアが高い人ほど確率も高くなる。\n\n#### 数式 2: 文の分類（GLUE のような問題）のスコア\n\n文の判定（例: この文はポジティブ？ネガティブ？）では、`[CLS]` の最終ベクトル $C$ を使ってこういう計算をする。\n\n$$ \\log(\\mathrm{softmax}(C W^T)) $$\n\n**この式が言ってること**: 文全体をまとめた数字 $C$ に「分類用のものさし $W$」を掛けて、ラベル（ポジ/ネガなど）ごとのスコアを出し、それを「足したら 1 になる確率」に変換して、最後に log を取って学習に使ってる。\n\n**記号の意味**:\n- $C$ … `[CLS]` トークンの最終ベクトル。文全体の「要約数字」みたいなもの。長さ $H$（BERT_BASE なら 768 個の数）\n- $W$ … 分類のためのものさし。ラベルが $K$ 種類（例: ポジ/ネガなら 2 種類）あるなら $K \\times H$ サイズの数字の表\n- $C W^T$ … $C$ と $W$ を掛け算して、ラベルごとに 1 つずつスコアを出すこと\n- $\\mathrm{softmax}(\\cdot)$ … スコアの並びを「足したら 1 になる確率の並び」に変える関数。大きいスコアほど高い確率になる\n- $\\log(\\cdot)$ … 数が 1 に近いほど 0 に、0 に近いほどマイナスにとても大きくなる関数。学習中は「正解ラベルの確率の $\\log$」をなるべく 0 に近づける（= 確率を 1 に近づける）方向にパラメータを動かす\n\n**身近な例え**: テストの採点で、各選択肢に点数を付けて（$CW^T$）、全部の点数を「合計したら 100% になる選択肢ごとの割合」にして（softmax）、正解の選択肢の割合が大きくなるように勉強し直すイメージ。「正解の確率が低いほど、罰（マイナス）が大きくなる」という採点ルールが log の役割。\n\n## 何がすごいの？\n\n著者が論文で挙げている **貢献（contribution）** はこの 3 つ:\n\n1. **「全層で左右両方を同時に見る」事前学習が大事だと示した**。GPT みたいな左→右だけや、ELMo みたいな浅いくっつけ方より、深い双方向が強いことを実験で証明。\n2. **タスクごとに専用の AI 構造を作らなくて済むようにした**。BERT に出力層を 1 枚足すだけで、文レベル/単語レベルの両方で SOTA（state-of-the-art、その時点の最高性能）に到達。\n3. **11 個の NLP タスクで一気に最高性能を更新**。コードと学習済みモデルを https://github.com/google-research/bert で公開。\n\n具体的な数字（TeX から拾った値）:\n\n- **GLUE**（← 9 個の国語タスクをまとめたベンチマーク）公式リーダーボード: BERT_LARGE **80.5**、OpenAI GPT 72.8 → **+7.7 ポイント**\n- **MultiNLI**（文の含意関係判定）: **86.7%**（+4.6）\n- **SQuAD v1.1**（質問応答）Test F1: BERT_LARGE アンサンブル+TriviaQA で **93.2**、従来トップ 91.7 → **+1.5**。人間の F1 は 91.2。つまり人間より上。\n- **SQuAD v2.0**（答えが本文に無い場合もある質問応答）Test F1: **83.1**、前 SOTA 74.9 → **+5.1**\n- **SWAG**（常識的に次に何が起こるかを 4 択から当てる）: **86.3%**、ESIM+ELMo 59.2 → **+27.1**、OpenAI GPT 78.0 → **+8.3**\n- **CoNLL-2003 NER**（固有名詞抽出）Test F1: BERT_LARGE で **92.8**\n- **アブレーション**（部品を外して影響を測る実験）:\n  - NSP を外す → QNLI が 88.4 → 84.9 に低下、SQuAD F1 も 88.5 → 87.9 に低下\n  - さらに MLM を左→右 LM に変える → MRPC が 86.5 → 77.5、SQuAD F1 が 87.9 → 77.8 と大きく低下\n  - モデルサイズを大きくしていくと、たった 3,600 件しか訓練データがない MRPC でも単調に性能が伸びる（小データでも巨大モデルが効くことを初めて納得感ある形で示した、と著者は主張）\n\n**baseline と書かれているもの**: OpenAI GPT（同サイズで左→右のみ）、ELMo（浅い双方向）、ESIM+ELMo、それぞれのタスクの当時の SOTA。\n\n## キーワード辞典\n\n- **BERT** … Bidirectional Encoder Representations from Transformers の略。「両方向から読む Transformer の言葉表現器」。\n- **事前学習（pre-training）** … 大量の文章で先に「言葉の使い方」を学ばせる準備運動。\n- **ファインチューニング（fine-tuning）** … 準備運動済みのモデルに、本番のタスク用のデータで追加練習させること。\n- **Transformer** … 単語どうしの関係を「お互いどれくらい気にするか」で計算しながら情報を混ぜていく仕組み。\n- **self-attention（自己注意）** … 同じ文の中の単語どうしで「どの単語に注目するか」の重みを計算すること。\n- **双方向（bidirectional）** … 単語の左側だけでなく右側の情報も同時に使うこと。\n- **MLM（Masked Language Model）** … 文の単語の一部を隠して当てさせる事前学習タスク。\n- **NSP（Next Sentence Prediction）** … 2 つの文を見せて、後ろの文が本当に続きかランダムかを当てさせるタスク。\n- **WordPiece** … 単語をさらに小さい部品（playing → play + ##ing など）に分ける方法。語彙 30,000 個。\n- **`[CLS]`** … 文の先頭に必ず入れる特殊トークン。文全体の要約役。\n- **`[SEP]`** … 2 つの文を区切る特殊トークン。\n- **`[MASK]`** … MLM で「ここの単語を隠したよ」と示す特殊トークン。\n- **ベクトル** … 数字を順番にいくつか並べたもの。1 つの単語や文を、たくさんの数字の組で表現するときに使う。\n- **内積（dot product）** … 2 つのベクトルの対応位置どうしを掛けて全部足したもの。似てるほど大きい。\n- **softmax** … 複数のスコアを「足すと 1 になる確率の並び」に変換する関数。大きいスコアほど高い確率になる。\n- **cross entropy（クロスエントロピー）** … 「正解の確率が低いほど罰が大きい」という採点ルール。\n- **GLUE** … 9 個の国語タスクの寄せ集めベンチマーク。\n- **SQuAD** … Stanford Question Answering Dataset。Wikipedia の段落から答えの場所を抜き出す問題。v1.1 は答えが必ずある、v2.0 は答えが無いこともある。\n- **NLI（Natural Language Inference）** … 文 A から文 B が言えるか/矛盾するか/関係ないかを当てる。\n- **NER（Named Entity Recognition）** … 文中の人名・地名・組織名などを抜き出す。\n- **SWAG** … 文の続きを 4 択から選ぶ常識推論データセット。\n- **GPT（OpenAI GPT）** … BERT の比較対象。左→右にしか文を読まない事前学習モデル。\n- **ELMo** … 別の比較対象。左→右と右→左を別々に学習して最後にくっつける。\n- **SOTA（state-of-the-art）** … その時点で最高性能ということ。\n- **アブレーション（ablation）** … 部品をわざと外したり変えたりして、何が効いているか調べる実験。\n- **TPU（Tensor Processing Unit）** … Google が作った AI 用の専用計算チップ。\n- **L, H, A** … BERT のサイズを表す記号。L = 層の数、H = 各層の隠れ状態のベクトルの長さ、A = self-attention の頭の数。\n\n## ちょっと深掘り（中学生は飛ばして OK）\n\n- **なぜ素朴に「両方向に文を読ませる」ではダメだったか?**: 普通の言語モデル（次の単語を当てる練習）で両方向同時に許すと、「自分自身を見て自分を当てる」という不正ができてしまい、何も学ばない。MLM は「自分を `[MASK]` で隠してから当てる」ことで、この不正をブロックしている、と本文に書かれている。\n- **`[CLS]` ベクトルは事前学習だけだと文の意味表現としては微妙**: 著者は脚注で「`[CLS]` の出力 $C$ は NSP だけで学習されてるので、ファインチューニング無しでは意味のある文表現ではない」とハッキリ言っている。`[CLS]` を文埋め込みとして使うなら、必ずタスクに合わせて追加学習が要る。\n- **MLM の学習効率はちょっと悪い**: 各バッチで 15% の単語からしか教師信号を取らないので、左→右 LM より収束に時間がかかる、と本文に書かれている。それでも絶対精度では勝つ、と主張。\n- **モデルサイズ**: BERT_BASE は L=12, H=768, A=12 で 1.1 億パラメータ。これは OpenAI GPT と同サイズに **わざと** 揃えて比較してる。違いは「双方向 attention にしたこと」「MLM+NSP で事前学習したこと」「データが少し違うこと」だけ。BERT_LARGE は L=24, H=1024, A=16 で 3.4 億パラメータ。\n- **ファインチューニング推奨設定**: バッチサイズ {16, 32}、学習率 {5e-5, 3e-5, 2e-5}、エポック {2, 3, 4}、dropout は 0.1 固定。BERT_LARGE は小データだとファインチューニングが不安定で、ランダム再起動して一番良いものを選んだ、と正直に書かれている。\n- **feature-based の使い方も検討**: ファインチューニングせず、BERT の中間層の出力を「単語の特徴量」として固定で取り出し、その上に別の小さいモデルを乗せる使い方も比較。NER では「上位 4 層の出力を連結する」のがベストで、フルでファインチューニングする場合と Dev F1 で 0.3 しか変わらなかった。事前計算したい現場には有用な逃げ道。\n- **SQuAD v2.0 の工夫**: 「答えが無い質問」を、答えの開始/終了をどちらも `[CLS]` の位置に置く、という形で同じ枠組みで扱っている。予測時は「`[CLS]` を答えとするスコア」と「本文中のベストスパンのスコア」を比べて、後者が閾値 $\\tau$ より大きければ非ヌルを返す。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-1810.04805v2/`\n- 正規ノート: `notes/arXiv-1810.04805v2.md`\n";
