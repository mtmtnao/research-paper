<script>
const RAW = "# BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding（深層双方向 Transformer 事前学習による汎用 NLP 表現）\n\n- arXiv: https://arxiv.org/abs/1810.04805\n- 一次ソース: ../papers/arXiv-1810.04805v2/\n- 正規ノート: ../notes/arXiv-1810.04805v2.md\n\n---\n\n## 一言で言うと\n\nBERT は、Transformer encoder を unlabeled text で事前学習し、全層で左文脈と右文脈を同時に条件付ける「deep bidirectional representations」を作る論文である。Masked LM (MLM) と Next Sentence Prediction (NSP) によって、出力層を 1 枚足して fine-tuning するだけで GLUE、SQuAD、SWAG など 11 NLP タスクの性能を大きく上げ、さらに CoNLL-2003 NER で feature-based use も検証した、と著者は主張する（abstract.tex, intro.tex, ablation.tex）。\n\n## 何を議論する論文か\n\n- **問題設定**: sentence-level task（natural language inference, paraphrasing など）と token-level task（named entity recognition, question answering など）に、同じ事前学習済み言語表現を転移する問題を扱う。既存の language model pre-training は有効だったが、standard language model が unidirectional であるため、fine-tuning 用の表現力が制限される、というのが本文の出発点である（intro.tex の \"standard language models are unidirectional\"）。\n- **対象範囲 / 仮定**: 入力は WordPiece token の sequence で、1 文または 2 文を `[CLS]`, `[SEP]`, segment embedding, position embedding とともに 1 つの系列に詰める。事前学習は BooksCorpus 800M words と English Wikipedia 2,500M words からなる document-level corpus を使う。downstream task では、同じ pre-trained parameters から task ごとに別々の fine-tuned model を作る（bert.tex, bert_details.tex）。\n- **既存研究との差分**: ELMo は left-to-right LM と right-to-left LM を別々に学習して最後に concatenate する feature-based approach であり、OpenAI GPT は left-to-right Transformer LM を fine-tuning する approach である。BERT は MLM によって全層で左右文脈を同時に使う bidirectional Transformer encoder を事前学習し、さらに NSP で text-pair representations も同時に事前学習する（intro.tex, bert_details.tex の `fig:BERT_comparisons` caption）。\n- **この論文で答えたい問い**: 深い双方向性は downstream task に効くのか、NSP は QA/NLI のような sentence relationship task に効くのか、pre-trained model を大きくすると小規模データの fine-tuning でも改善するのか、fine-tuning だけでなく feature-based use でも BERT 表現は有効か、を ablation と複数 benchmark で検証する論文である。\n\n## 背景と前提\n\n- **pre-training / fine-tuning**: pre-training では unlabeled data 上で MLM と NSP を学習する。fine-tuning では pre-trained parameters で初期化し、labeled downstream data で全パラメータを end-to-end に更新する。各 downstream task は同じ checkpoint から始まるが、fine-tuned model は task ごとに別になる（bert.tex）。\n- **feature-based / fine-tuning**: feature-based approach は ELMo のように pre-trained representations を task-specific architecture の追加特徴として使う。fine-tuning approach は OpenAI GPT のように task-specific parameters を最小限にして、pre-trained parameters 全体を downstream task で更新する。BERT の主要結果は fine-tuning approach だが、CoNLL-2003 NER では feature-based approach も比較する（intro.tex, ablation.tex）。\n- **bidirectional の意味**: この論文で重要なのは、単に left-to-right と right-to-left の表現を最後に並べることではなく、Transformer の各 self-attention layer で token が左文脈と右文脈を同時に参照できることである。著者は ELMo 型を \"shallow concatenation\" と呼び、BERT を \"jointly conditioned on both left and right context in all layers\" と説明する（intro.tex, bert_details.tex の `fig:BERT_comparisons` caption）。\n- **なぜ普通の LM では深い双方向にしにくいか**: standard conditional language model で左右両方を条件にすると、multi-layered context の中で target word が自分自身を間接的に見てしまい、trivial prediction になる。そこで BERT は、入力 token の一部を隠し、隠す前の original vocabulary id を予測する MLM を使う（bert.tex §3.1）。\n- **baseline との関係**: BERT_BASE は L=12, H=768, A=12, 110M parameters で、OpenAI GPT と同じ model size になるよう選ばれている。ただし GPT との違いは attention mask だけではなく、BERT は Wikipedia 追加、`[CLS]`/`[SEP]`/sentence A/B embeddings の事前学習、batch size 128,000 words 相当、task-specific learning rate selection なども異なるため、著者は ablation で bidirectionality と pre-training tasks の影響を切り分けようとしている（bert.tex, bert_details.tex）。\n\n## 提案手法\n\n### コアアイデア\n\nBERT の中心は、multi-layer bidirectional Transformer encoder を、MLM と NSP という 2 つの unsupervised task で事前学習することである。MLM は input WordPiece tokens の 15% を prediction target にし、その target position の最終隠れ状態 $T_i$ から original token を当てる。NSP は sentence A と sentence B の関係が `IsNext` か `NotNext` かを `[CLS]` の最終隠れ状態 $C$ から当てる。fine-tuning では、classification なら $C$、token-level task なら各 $T_i$ の上に task-specific output layer を追加し、BERT 本体を含む全パラメータを更新する。\n\nモデルサイズは主に 2 種類である。BERT_BASE は L=12, H=768, A=12, Total Parameters=110M、BERT_LARGE は L=24, H=1024, A=16, Total Parameters=340M。入力表現は token embedding、segment embedding、position embedding の和で、WordPiece vocabulary は 30,000、sequence length は最大 512 tokens である（bert.tex）。\n\n### 重要な定義・数式\n\n$$\n\\log({\\rm softmax}(CW^T))\n$$\n\n**式の意味**: GLUE のような classification task で、`[CLS]` token の最終隠れ状態 $C$ から label 分布を作る式である。本文では \"standard classification loss with $C$ and $W$\" としてこの形が書かれている（experiment.tex §4.1）。\n\n**記号の定義**:\n- $C \\in \\mathbb{R}^{H}$ ... `[CLS]` token に対応する final hidden vector。classification task では aggregate representation として使われる。\n- $W \\in \\mathbb{R}^{K \\times H}$ ... fine-tuning で追加される classification layer weights。\n- $K$ ... downstream classification task の label 数。\n- $H$ ... BERT の hidden size。BERT_BASE では 768、BERT_LARGE では 1024。\n\n**この論文での役割**: BERT が「downstream architecture を大きく作り替えず、1 つの output layer を足すだけでよい」という主張を支える最小構成である。GLUE、SWAG、NLI、sentiment classification などの sentence-level task は、この $C$ を中心に fine-tuning される。\n\n$$\nP_i = \\frac{e^{S{\\cdot}T_i}}{\\sum_j e^{S{\\cdot}T_j}}\n$$\n\n**式の意味**: SQuAD v1.1 の extractive question answering で、word $i$ が answer span の start position である確率を計算する式である。end position についても analogous formula を使う（experiment.tex §4.2）。\n\n**記号の定義**:\n- $P_i$ ... word $i$ が answer span の開始位置である確率。\n- $S \\in \\mathbb{R}^{H}$ ... fine-tuning で追加される start vector。\n- $T_i \\in \\mathbb{R}^{H}$ ... $i$ 番目の input token に対応する final hidden vector。\n- $\\sum_j$ ... paragraph 内の全 word position $j$ にわたる正規化。\n\n**この論文での役割**: token-level task でも、BERT 本体の表現 $T_i$ と少数の新規パラメータだけで task-specific prediction ができることを示す具体例である。SQuAD v1.1 の高い Test F1 は、この簡潔な span extraction head で得られている。\n\n$$\nS{\\cdot}T_i + E{\\cdot}T_j \\quad (j \\geq i)\n$$\n\n**式の意味**: SQuAD v1.1 で、position $i$ から position $j$ までの candidate span に与える score である。本文では、この score が最大となる span かつ $j \\geq i$ のものを prediction とする、と説明されている（experiment.tex §4.2）。\n\n**記号の定義**:\n- $S$ ... answer start 用の vector。\n- $E$ ... answer end 用の vector。ここでの $E$ は bert.tex の input embedding $E$ とは別の記号である。\n- $T_i$, $T_j$ ... token $i$, token $j$ の final hidden vectors。\n- $j \\geq i$ ... end position が start position 以降にあるという制約。\n\n**この論文での役割**: BERT の question answering head が、複雑な task-specific architecture ではなく start/end vectors だけで span を選ぶ設計であることを示す。著者の「heavily-engineered task-specific architectures の必要性を減らす」という contribution に直接関係する。\n\n$$\ns_{\\tt null} = S{\\cdot}C + E{\\cdot}C,\\qquad\n\\hat{s_{i,j}} = {\\tt max}_{j \\geq i} S{\\cdot}T_i + E{\\cdot}T_j,\\qquad\n\\hat{s_{i,j}} > s_{\\tt null} + \\tau\n$$\n\n**式の意味**: SQuAD v2.0 で、answer が存在しない場合を `[CLS]` position の span として扱うための scoring と decision rule である。best non-null span の score が null score に threshold $\\tau$ を足した値を上回るときだけ non-null answer を返す（experiment.tex §4.3）。\n\n**記号の定義**:\n- $s_{\\tt null}$ ... answer がないと判断する span、つまり start/end がともに `[CLS]` である場合の score。\n- $C$ ... `[CLS]` token の final hidden vector。\n- $\\hat{s_{i,j}}$ ... 本文中の non-null candidate span のうち最大 score。\n- $\\tau$ ... dev set で F1 を最大化するように選ばれる threshold。\n\n**この論文での役割**: SQuAD v1.1 の span extraction head を大きく変えずに、answerable/unanswerable を含む SQuAD v2.0 に拡張している点を示す。BERT_LARGE single model はこの設定で SQuAD v2.0 Test F1 83.1 を得る（squad_tab.tex）。\n\n### 実装 / アルゴリズム上の要点\n\n- **入力構成**: sequence の最初に `[CLS]` を置き、sentence pair は `[SEP]` で分離する。各 token の input representation は token embedding、segment embedding、position embedding の和である。sentence A/B は linguistic sentence に限らず、contiguous text span を指す（bert.tex）。\n- **MLM target selection**: training data generator は WordPiece token positions の 15% を prediction target にする。target token の 80% は `[MASK]`、10% は random token、10% は unchanged にする。random replacement は全 token の 1.5% に相当するため、著者は language understanding capability を損なわないと述べる（bert.tex, bert_details.tex）。\n- **NSP instance construction**: pre-training example ごとに sentence A と sentence B を選ぶ。50% は B が A の actual next sentence (`IsNext`)、50% は random sentence (`NotNext`) である。combined length は 512 tokens 以下にサンプリングされる（bert.tex, bert_details.tex）。\n- **pre-training setup**: batch size は 256 sequences、512 tokens 換算で 128,000 tokens/batch。1,000,000 steps、3.3 billion word corpus 上で約 40 epochs。Adam learning rate 1e-4、${\\beta}_1=0.9$、${\\beta}_2=0.999$、L2 weight decay 0.01、warmup 10,000 steps、linear decay、dropout 0.1、activation は `gelu`。training loss は mean masked LM likelihood と mean NSP likelihood の和である（bert_details.tex）。\n- **計算資源**: BERT_BASE は 4 Cloud TPUs in Pod configuration、16 TPU chips total。BERT_LARGE は 16 Cloud TPUs、64 TPU chips total。各 pre-training は 4 days。TeX 中に TPU 世代は明示されていない（bert_details.tex）。\n- **sequence length strategy**: attention は sequence length に対して quadratic に高価なので、実験では 90% の steps を sequence length 128 で pre-train し、残り 10% を length 512 で train して position embeddings を学習する（bert_details.tex）。\n- **fine-tuning setup**: 多くの hyperparameter は pre-training と同じで、batch size、learning rate、epochs を task ごとに調整する。推奨範囲は batch size {16, 32}、Adam learning rate {5e-5, 3e-5, 2e-5}、epochs {2, 3, 4}、dropout 0.1 固定。large datasets は small datasets より hyperparameter に鈍感、と著者は述べる（bert_details.tex）。\n\n## 実験・結果\n\n- **データセット / ベンチマーク**: GLUE、SQuAD v1.1、SQuAD v2.0、SWAG、CoNLL-2003 NER を使う。GLUE には MNLI 392k、QQP 363k、QNLI 108k、SST-2 67k、CoLA 8.5k、STS-B 5.7k、MRPC 3.5k、RTE 2.5k が Table 1 に載る。WNLI は construction issue があるため Table 1 の Average から除外され、BERT の GLUE submission では majority class を常に予測したと書かれている（glue_official_tab.tex, experiments_details.tex）。\n- **比較対象 / baseline**: GLUE では Pre-OpenAI SOTA、BiLSTM+ELMo+Attn、OpenAI GPT。SQuAD v1.1 では Human、#1 Ensemble - nlnet、#2 Ensemble - QANet、BiDAF+ELMo、R.M. Reader。SQuAD v2.0 では Human、#1 Single - MIR-MRC (F-Net)、#2 Single - nlnet、unet、SLQA+。SWAG では ESIM+GloVe、ESIM+ELMo、OpenAI GPT、Human。CoNLL-2003 NER では ELMo、CVT、CSE と比較する（各 table tex）。\n- **指標**: GLUE では QQP と MRPC が F1、STS-B が Spearman correlation、それ以外は accuracy。SQuAD は EM と F1。SWAG は accuracy。CoNLL-2003 NER は F1。Table 1 の Average は WNLI を除いた値で、official GLUE score とは少し異なる（glue_official_tab.tex）。\n- **主な結果**: abstract.tex は official GLUE score 80.5（OpenAI GPT 72.8 から +7.7 points）、MultiNLI accuracy 86.7%（+4.6）、SQuAD v1.1 Test F1 93.2（+1.5）、SQuAD v2.0 Test F1 83.1（+5.1）を挙げる。Table 1 では BERT_LARGE が MNLI-m/mm 86.7/85.9、QQP 72.1、QNLI 92.7、SST-2 94.9、CoLA 60.5、STS-B 86.5、MRPC 89.3、RTE 70.1、Average 82.1 で全列最高である（glue_official_tab.tex）。\n- **SQuAD v1.1**: BERT_LARGE (Sgl.+TriviaQA) は Test EM/F1 85.1/91.8、BERT_LARGE (Ens.+TriviaQA) は 87.4/93.2。Human は 82.3/91.2、#1 Ensemble - nlnet は 86.0/91.7。著者は TriviaQA fine-tuning data を使わない場合でも 0.1-0.4 F1 しか落ちないと書くが、Table 2 の見出し値 93.2 は Ens.+TriviaQA である（experiment.tex, squad_tab.tex）。\n- **SQuAD v2.0**: BERT_LARGE (Single) は Dev EM/F1 78.7/81.9、Test EM/F1 80.0/83.1。#1 Single - MIR-MRC (F-Net) の Test F1 78.0 に対する +5.1 F1 improvement として本文で説明されている。TriviaQA data はこの model では使っていない（experiment.tex, squad_tab.tex）。\n- **SWAG**: BERT_LARGE は Dev 86.6、Test 86.3。ESIM+ELMo は Test 59.2、OpenAI GPT は 78.0、Human (expert) は 85.0、Human (5 annotations) は 88.0。著者は ESIM+ELMo に対して +27.1%、OpenAI GPT に対して +8.3% と述べる（experiment.tex, swag_official_tab.tex）。\n- **CoNLL-2003 NER / feature-based**: BERT_LARGE fine-tuning は Dev/Test F1 96.6/92.8、BERT_BASE fine-tuning は 96.4/92.4。feature-based approach では BERT_BASE の \"Concat Last Four Hidden\" が Dev F1 96.1 で最良で、fine-tuning BERT_LARGE の Dev F1 96.6 から 0.5、BERT_BASE fine-tuning から 0.3 低い。本文の「0.3 F1 behind fine-tuning」は BERT_BASE fine-tuning との比較と読むのが自然である（ablation.tex, pretrained_embeddings_tab.tex）。\n- **アブレーション: pre-training tasks**: BERT_BASE は MNLI-m/QNLI/MRPC/SST-2/SQuAD Dev で 84.4/88.4/86.7/92.7/88.5。No NSP は 83.9/84.9/86.5/92.6/87.9。LTR & No NSP は 82.1/84.3/77.5/92.1/77.8。LTR & No NSP + BiLSTM は SQuAD を 84.9 まで戻すが、GLUE 側は悪化する（direction_ablation_tab.tex）。\n- **アブレーション: model size**: Table 6 では L/H/A を 3/768/12 から 24/1024/16 へ増やすと、masked LM perplexity は 5.84 から 3.23 に下がり、MNLI-m は 77.9 から 86.6、MRPC は 79.8 から 87.8、SST-2 は 88.4 から 93.7 に改善する。本文は MRPC が 3,600 labeled training examples しかない点を強調し、小規模 downstream task でも大きな pre-trained model が効くと主張する（ablation.tex, size_ablation_tab.tex）。\n- **著者が主張する貢献**: (1) MLM により deep bidirectional representations の重要性を示した、(2) pre-trained representations により heavily-engineered task-specific architectures の必要性を減らした、(3) 11 NLP tasks で state of the art を進め、code と pre-trained models を公開した、の 3 点である（intro.tex）。\n\n## 妥当性と限界\n\n- **この主張を支える根拠**: BERT_BASE は L=12, H=768, A=12 の 110M parameters で、OpenAI GPT と同じ model size になるよう選ばれており、attention direction と pre-training objective の違いを見やすくしている。さらに No NSP、LTR & No NSP、+ BiLSTM の ablation によって、NSP と bidirectional MLM の寄与を分けて測ろうとしている。GLUE、SQuAD、SWAG、NER という sentence-level / token-level の両方で結果を出している点も、unified architecture の主張を支える。\n- **著者が認めている limitations / future work**: `[MASK]` token は fine-tuning では現れないため、MLM には pre-train/fine-tune mismatch がある。80/10/10 の masking procedure はその緩和策である。また MLM は各 batch で 15% の tokens だけを予測するため、LTR より convergence が遅くなりうる。BERT_LARGE は small datasets で fine-tuning が不安定なことがあり、random restarts から Dev set best を選ぶと書かれている。TeX 中に独立した future work section はない。\n- **読者として注意すべき点**: abstract の GLUE score 80.5 は official leaderboard score であり、Table 1 の Average 82.1 は WNLI を除いた平均である。SQuAD v1.1 の Test F1 93.2 は BERT_LARGE ensemble + TriviaQA の値であり、single + TriviaQA は 91.8 である。GPT との比較では BERT_BASE の model size はそろっているが、pre-training data、batch size、特殊 token の pre-training、learning rate selection などの違いも TeX 中で列挙されている。\n- **追加で確認したい実験 / 疑問**: NSP は外すと QNLI と SQuAD が下がるが、NSP 以外の sentence-pair pre-training objective との比較は TeX 中には明示されていない。masking procedure ablation は MNLI と NER で示されるが、SQuAD や SWAG まで広げた表は TeX 中にはない。feature-based approach は CoNLL-2003 NER で検証されるが、他の downstream tasks で fine-tuning との差が同程度かは TeX 中には示されていない。\n\n## 用語メモ\n\n一般的な辞書的定義ではなく、この論文での使われ方を中心に書く。\n\n- **BERT**: Bidirectional Encoder Representations from Transformers。多層 bidirectional Transformer encoder を MLM と NSP で pre-train し、downstream task で fine-tune するモデル。\n- **deep bidirectional**: 全ての layer で left context と right context の両方に条件付けられること。ELMo のように独立した LTR/RTL 表現を最後に concatenate することとは区別される。\n- **Masked LM (MLM)**: WordPiece token positions の 15% を prediction target にし、original vocabulary id を当てる pre-training objective。target は 80% `[MASK]`、10% random token、10% unchanged にされる。\n- **Next Sentence Prediction (NSP)**: sentence B が sentence A の actual next sentence か random sentence かを、`IsNext` / `NotNext` の二値分類で当てる pre-training task。最終モデルは NSP accuracy 97%-98% に達すると脚注にある。\n- **`[CLS]`**: sequence の先頭に置く special classification token。final hidden state $C$ は classification output に使う。ただし著者は、fine-tuning なしでは $C$ は meaningful sentence representation ではない、と脚注で述べる。\n- **`[SEP]`**: sentence pair を 1 sequence に詰めるときの separator token。question/passage や sentence pair の境界を示す。\n- **segment embedding**: token が sentence A に属するか sentence B に属するかを示す learned embedding。BERT は token embedding、segment embedding、position embedding の和を入力にする。\n- **WordPiece**: BERT の tokenization 単位。語彙サイズは 30,000。MLM の masking は WordPiece tokenization 後に一様 15% で適用され、partial word pieces への特別扱いはない。\n- **BERT_BASE / BERT_LARGE**: BERT_BASE は L=12, H=768, A=12, 110M parameters。BERT_LARGE は L=24, H=1024, A=16, 340M parameters。$L$ は Transformer blocks、$H$ は hidden size、$A$ は self-attention heads。\n- **feature-based approach**: BERT の parameters を fine-tune せず、層の activations を fixed contextual embeddings として取り出し、その上に task-specific model を載せる使い方。この論文では CoNLL-2003 NER で、2-layer 768-dimensional BiLSTM と classifier を使って比較する。\n- **fine-tuning approach**: pre-trained BERT に task-specific output layer を追加し、BERT 本体を含む全パラメータを labeled downstream data で更新する使い方。この論文の主結果はこの方式である。\n- **GLUE**: diverse natural language understanding tasks の benchmark。Table 1 では WNLI を除き、QQP/MRPC は F1、STS-B は Spearman、他は accuracy で報告する。\n- **SQuAD v1.1 / v2.0**: Wikipedia passage に対する extractive QA。v1.1 は answer span を予測する。v2.0 は no short answer の可能性を含み、BERT では `[CLS]` span を null answer として扱う。\n- **SWAG**: Situations With Adversarial Generations。given sentence に対して 4 choices の中から plausible continuation を選ぶ grounded commonsense inference dataset。\n- **CoNLL-2003 NER**: Named Entity Recognition benchmark。BERT では first sub-token の representation を token-level classifier に入力し、CRF layer は使わない。\n\n## 読む順番の提案\n\n- まず abstract.tex と intro.tex を読み、著者が問題視する \"unidirectional\" と、contribution の 3 点を押さえる。正規ノートでは `Summary（著者の主張）` の問題・貢献に対応する。\n- 次に bert.tex §3 を読み、入力表現、MLM、NSP、fine-tuning の流れを確認する。特に `[CLS]`, `[SEP]`, $C$, $T_i$、MLM の 15% と 80/10/10、NSP の 50/50 は正規ノートの `Takeaway` と `Notes / Quotes` に直結する。\n- その後 experiment.tex と各 table を読む。GLUE は glue_official_tab.tex、SQuAD は squad_tab.tex、SWAG は swag_official_tab.tex を本文と並べて見る。official GLUE score 80.5 と Table 1 Average 82.1、SQuAD v1.1 の +TriviaQA 条件を混同しない。\n- ablation.tex を読むと、No NSP、LTR & No NSP、model size、feature-based NER がどう主張を支えているかが分かる。正規ノートでは `Critical Thoughts（評価・疑問）` の強み・疑問に対応する。\n- 最後に bert_details.tex と more_ablation.tex を読む。pre-training の batch/steps/optimizer/TPU、masking procedure ablation、training steps ablation など、再現性と限界に関わる情報が補遺にある。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-1810.04805v2/`\n- 正規ノート: `notes/arXiv-1810.04805v2.md`\n";
