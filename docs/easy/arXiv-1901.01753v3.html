<script>
const RAW = "# Paired Open-Ended Trailblazer (POET): Endlessly Generating Increasingly Complex and Diverse Learning Environments and Their Solutions（open-ended coevolution による環境と解の同時生成）\n\n- arXiv: https://arxiv.org/abs/1901.01753\n- 一次ソース: ../papers/arXiv-1901.01753v3/\n- 正規ノート: ../notes/arXiv-1901.01753v3.md\n\n---\n\n## 一言で言うと\n\nこの論文は、人間があらかじめ課題を固定するのではなく、環境課題 $E$ とその解であるエージェント $\\theta$ をペアで増やし、各ペアを最適化し、さらにペア間で解を transfer する POET を提案する。2-D Bipedal Walker obstacle-course で、POET が生成して解いた難しい環境は ES 単体や direct-path curriculum-building control では届きにくく、特に transfer が探索空間の coverage と extremely challenging 環境の発見に重要だと著者は主張する。\n\n## 何を議論する論文か\n\n- **問題設定**: 通常の ML/RL は「研究者が問題を用意し、アルゴリズムが解く」という形をとる。この論文は、問題そのもの、つまり環境課題もアルゴリズムが生成し、その環境ごとの解も同時に最適化できるかを問う。abstract の短い根拠フレーズは \"problems themselves can be generated by the algorithm at the same time as they are being solved\"。\n- **対象範囲 / 仮定**: POET は、環境をエンコードして mutation できる空間があることを前提にする。本実験では OpenAI Gym の \"Bipedal Walker Hardcore\" を改造した 2-D obstacle-course domain を使い、地形は stump, gap, stairs, roughness などで変わる。body morphology と reward function は固定である。\n- **既存研究との差分**: novelty search や quality diversity は stepping stones を保存するが、多くの場合は環境自体が固定である。MCC は問題と解を共進化させるが、各環境内で解をさらに最適化する圧力が弱く、現在の集団がすぐ解けない問題は棄却される。POET は MCC 的な環境-解の共進化に、ES による各環境内最適化と CMOEA/Innovation Engine 的な goal switching/transfer を組み合わせる。\n- **この論文で答えたい問い**: 1 回の実行の中で、多様でだんだん難しい環境と、それを解くエージェントを同時に作れるか。POET が作った環境は ES 単体や単線的 curriculum でも解けるのか。環境間 transfer は本当に必要なのか。\n\n## 背景と前提\n\n- **open-endedness**: この論文では、明示的な最終ターゲットへ収束するのではなく、新しい課題と能力が継続的に生まれる性質を指す。abstract では \"continue to create novel and increasingly complex capabilities without bound\" と説明される。\n- **stepping stones**: ある最終課題に見た目は近くなくても、後で別の能力につながる中間解や中間環境のこと。POET は多くの環境系列を並行に走らせ、どの系列の解が他の系列で役立つかを transfer で試す。\n- **novelty search / quality diversity / Innovation Engine / CMOEA**: いずれも多様な解や niche を保存する発想を持つ。POET はこの系譜から、ひとつの objective へ一直線に進むよりも、複数の経路を保った方が stepping stones を失いにくいという前提を受け継ぐ。\n- **MCC (Minimal Criterion Coevolution)**: 問題集団と解集団が、相手集団に対する minimal criterion を満たすことで再生産する共進化手法。POET は MCC を直接の前駆としつつ、環境内での mastery のために ES で解を最適化し、さらに現在の集団が即座に解けないが学習で解けそうな子環境も残す。\n- **ES (Evolution Strategies)**: 本論文の実装で各エージェントを最適化する inner-loop optimizer。著者は ES 以外にも TRPO, PPO, genetic algorithms, other variants of ES などで POET を instantiation できると discussion で述べる。\n- **Bipedal Walker domain**: エージェントは 24 入力、4 出力のニューラルネットワークで、2 hidden layers of 40 units each、$tanh$ activation を使う。10 本の LIDAR と 14 個の状態変数を入力し、hip と knee の 4 motor joints を出力で制御する。\n\n## 提案手法\n\n### コアアイデア\n\nPOET は active な environment-agent pair のリスト `EA_list` を維持する。初期状態は、単純な環境 $E^{\\textrm{init}}(\\cdot)$ とランダム初期化されたエージェント $\\theta^{\\textrm{init}}$ の 1 ペアである。各 iteration で行うことは、`POET Main Loop` (`alg:poet`) の通り、(1) 条件を満たす時点で環境を mutation して子環境を作る、(2) 各ペアのエージェントをその環境で ES により最適化する、(3) 条件を満たす時点で他の環境のエージェントを target environment に移してみる transfer を行う、の 3 つである。\n\n重要なのは、POET が「環境を作るだけ」でも「固定された環境で解を最適化するだけ」でもない点である。環境の生成、環境内での最適化、環境間の transfer を同じ実行の中で回すことで、単線的な curriculum では見つからない stepping stones を使えるようにする。\n\n### 重要な定義・数式\n\n$$\n\\theta^{m}_{t+1} = \\theta^{m}_{t} + \\alpha \\frac{1}{n\\sigma} \\sum_{i=1}^{n} E_i \\epsilon_i,\n\\quad\nE_i = E^m(\\theta^{m}_{t} + \\sigma\\epsilon_i),\n\\quad\n\\epsilon_i \\sim \\mathcal{N}(0, I)\n$$\n\n**式の意味**: Algorithm `ES_STEP` と POET main loop の更新をまとめた式である。各エージェントのパラメータに Gaussian noise を加えた候補を評価し、reward が高い方向へ現在のパラメータを動かす。\n\n**記号の定義**:\n- $\\theta^{m}_{t}$ ... iteration $t$ における $m$ 番目の環境に対応するエージェントの policy parameter vector\n- $E^m(\\cdot)$ ... $m$ 番目の環境でエージェントを評価して得る reward\n- $\\alpha$ ... learning rate\n- $n$ ... ES のサンプル数。本実験では 512\n- $\\sigma$ ... noise standard deviation\n- $\\epsilon_i$ ... 標準正規分布からの noise\n\n**この論文での役割**: 各 environment-agent pair の agent を、その paired environment 内で継続的に改善する inner-loop 最適化である。POET の open-ended な環境生成だけではなく、各 niche 内の mastery を作る部分を担う。\n\n$$\n50 \\leq E^{\\textrm{child}}(\\theta^{\\textrm{child}}) \\leq 300\n$$\n\n**式の意味**: 子環境を受理するための minimal criterion (MC) である。新しく作った子環境 $E^{\\textrm{child}}$ に、その子環境に割り当てられたエージェント $\\theta^{\\textrm{child}}$ を走らせ、score が 50 以上 300 以下なら「難しすぎず簡単すぎない」として候補に残す。\n\n**記号の定義**:\n- $E^{\\textrm{child}}$ ... mutation により生成された子環境\n- $\\theta^{\\textrm{child}}$ ... 子環境に paired agent として入る policy parameter vector\n- $E^{\\textrm{child}}(\\theta^{\\textrm{child}})$ ... その agent をその child environment で評価した score\n- 50, 300 ... 実験で使われた MC の下限と上限\n\n**この論文での役割**: 環境生成のフィルタである。POET が「学習できそうな範囲」の子環境だけを保持することで、単なるランダムな難化ではなく、現在の能力から先へ進める curriculum を作る。\n\n$$\nN(e(E), L) = \\frac{1}{|S|}\\sum_{j \\in S} ||e(E) - e(E_j)||_2,\n\\quad\nS = \\textrm{kNN}(e(E), L)\n$$\n\n**式の意味**: Supplemental Information の novelty 計算である。子環境の encoding が、現在の active population と過去に active だった環境の archive に対してどれだけ離れているかを、近傍 $k$ 個との平均 $L2$ 距離で測る。\n\n**記号の定義**:\n- $e(E)$ ... 環境 $E$ の genetic encoding vector\n- $L$ ... active population と archive に含まれる環境 encoding のリスト\n- $S$ ... $e(E)$ の $k$ nearest neighbors。本文では $k=5$\n- $||\\cdot||_2$ ... $L2$ norm\n\n**この論文での役割**: MC を満たした子環境の中で、既存環境と異なるものを優先するための diversity pressure である。POET が複数の環境系列を広げ、transfer に使える多様な stepping stones を保持する助けになる。\n\n$$\n\\theta^{\\textrm{top}} = \\argmax_{\\theta \\in \\mathcal{C}} E(\\theta),\n\\quad\n\\mathcal{C} = \\{\\theta^1,\\ldots,\\theta^M,\\theta^1+\\textrm{ES\\_STEP}(\\theta^1,E,\\alpha,\\sigma),\\ldots,\\theta^M+\\textrm{ES\\_STEP}(\\theta^M,E,\\alpha,\\sigma)\\}\n$$\n\n**式の意味**: Supplemental Information の `EVALUATE_CANDIDATES` を式で書いたもの。target environment $E$ に対して、他環境から来た candidate agents と、それぞれを $E$ 上で 1 ES step だけ進めた proposals を評価し、reward 最大の agent を返す。\n\n**記号の定義**:\n- $\\theta^1,\\ldots,\\theta^M$ ... transfer 候補の agent parameter vectors\n- $E$ ... transfer の target environment\n- $\\mathcal{C}$ ... original candidates と one-step proposals を合わせた候補集合\n- $\\theta^{\\textrm{top}}$ ... target environment 上で最も高い reward を得た候補\n\n**この論文での役割**: POET の transfer 機構そのものである。返された agent が target environment の現 agent より高い score を出せば置換される。最適化なしで置換される場合が direct transfer、1 ES step 後の proposal が置換される場合が proposal transfer である。\n\n$$\n\\text{Reward per step}=\n\\begin{cases}\n-100,& \\text{if robot falls }\\\\\n130 \\times \\Delta x-5\\times\\Delta \\text{hull\\_angle} - 0.00035\\times \\text{applied\\_torque},& \\text{otherwise.}\n\\end{cases}\n$$\n\n**式の意味**: Bipedal Walker 実験で使う 1 step あたりの reward である。前進量に報酬を与え、hull angle の変化と applied torque を罰し、転倒した場合は $-100$ を与える。\n\n**記号の定義**:\n- $\\Delta x$ ... その step で前進した量\n- $\\Delta \\text{hull\\_angle}$ ... hull angle の変化量\n- $\\text{applied\\_torque}$ ... motor torque の使用量\n- $-100$ ... 転倒時の reward\n\n**この論文での役割**: すべての環境で agent の性能を測る基準である。環境が solved とされるには、course の far end に到達し、かつ score が 230 以上である必要がある。\n\n### 実装 / アルゴリズム上の要点\n\n- **POET main loop (`alg:poet`)**: 入力は $E^{\\textrm{init}}(\\cdot)$, $\\theta^{\\textrm{init}}$, learning rate $\\alpha$, noise standard deviation $\\sigma$, iterations $T$, mutation interval $N^{\\textrm{mutate}}$, transfer interval $N^{\\textrm{transfer}}$。各 iteration で、条件付き mutation、全 agent の ES 最適化、条件付き transfer を行う。\n- **親環境の再生産条件**: 実験では、その環境の paired agent が reward 200 以上を達成した環境だけが child environment を作れる。これは solved threshold の 230 より少し低い。\n- **child generation**: eligible parents から一様に parent を選び、環境パラメータの一部または全部を mutation し、新しい random seed を選ぶ。`child_list` は `max_children` まで作られ、本実験では 512。\n- **environment encoding (`env-mutation-table`)**: obstacle parameters は stump height, gap width, step height, step number, roughness。initial value / mutation step / max value は、stump height $(0.0,0.4)$ / $0.2$ / $(5.0,5.0)$、gap width $(0.0,0.8)$ / $0.4$ / $(10.0,10.0)$、step height $(0.0,0.4)$ / $0.2$ / $(5.0,5.0)$、step number $1$ / $1$ / $9$、roughness uniform$(0,0.6)$ / uniform$(0,0.6)$ / $10.0$。\n- **環境の再現性**: 環境パラメータは分布を定義し、実際の terrain は random seed で決まる。seed は環境に保存されるため、同じ環境を再現できる。\n- **agent architecture**: controllers は 3 fully-connected layers、$tanh$ activation。24 inputs, 4 outputs、2 hidden layers of 40 units each。出力は $-1$ から $1$ の範囲。\n- **optimizer details**: ES step の population size は 512。Adam optimizer を使い、learning rate は $0.01$ から $0.001$ へ decay factor $0.9999$ per step、noise standard deviation は $0.1$ から $0.01$ へ decay factor $0.999$ per step。transfer accepted または child pair 作成時には Adam state を reset し、learning rate と noise standard deviation を initial values に戻す。\n- **active population cap**: 実験では active environments の population size は 20。capacity を超えると oldest environments and paired agents を remove する。\n- **parallelization**: 本実験の実装では each run が 256 parallel CPU cores を使う。agent optimization と transfer attempts は環境ごとに独立しやすいので並列化しやすい。\n\n## 実験・結果\n\n- **データセット / ベンチマーク**: OpenAI Gym の \"Bipedal Walker Hardcore\" を改造した 2-D bipedal-walking obstacle-course domain。episode は time limit 2,000 steps、転倒、または course completion で終了する。環境が solved とされる条件は、far end に到達し、score が 230 以上であること。\n- **比較対象 / baseline**: (1) POET が生成して解いた環境に対し、randomly initialized agents を ES だけで直接最適化する ES-alone control、(2) flat ground から target environment へ obstacle parameter を少しずつ近づける direct-path curriculum-building control、(3) transfer を無効化した POET without transfer。\n- **指標**: score、solved threshold 230、target environment と control が到達した closest-to-target environment の normalized distance、coverage。normalized distance は本文で $\\frac{1}{\\beta}\\left\\Vert \\frac{e(E_A)-e(E_B)}{e(E_{\\textrm{Max}})} \\right\\Vert_2$ と定義され、direct-path control の比較で使われる。ここで $\\beta=\\sqrt{5}$、距離計算用の $E_{\\textrm{Max}}$ は roughness $=8$, Gap_lower $=$ Gap_upper $=8$, Stump_lower $=$ Stump_upper $=3$。\n- **ES 単体との比較**: まず one obstacle type enabled の実験で、POET が gaps, roughness, stumps の難環境を生成して解く。各環境に対して ES を 5 runs、最大 16,000 ES steps 実行したが、`fig:comparison_naive_control` の gap / hillside / high stump 環境で最大 score は 17.9 / 39.6 / 13.6。`fig:challenging_envs` の downstairs / mixed gaps and stumps 環境では 24.0 / 19.2。いずれも POET の success threshold 230 を大きく下回る。single-sample t-tests で $p < 0.01$ とされる。\n- **direct-path curriculum-building control との比較**: gaps, roughness, stumps の 3 obstacle types を有効にして、POET が生成・解決した環境を target とする。difficulty は `challenge-table` の条件数で定義される。条件は top value in range of stump height $\\geq 2.4$、top value in range of gap width $\\geq 6.0$、roughness $\\geq 4.5$。OpenAI Gym Hardcore の reference はそれぞれ $2.0$, $3.0$, $1.0$ で、この論文の条件は reference の 1.2, 2.0, 4.5 倍にあたる。1 条件を満たすと challenging、2 条件で very challenging、3 条件で extremely challenging。\n- **POET の実行規模**: direct-path control 比較の POET は 3 runs。各 run は最大 25,200 POET iterations、active environment population size 20、ES sample points per step 512。各 run は 256 CPU cores で約 10 days。\n- **難度別に解くまでの iteration**: 環境が first created されてから solved されるまでの POET iterations の mean と 95% confidence intervals は、challenging $638\\pm133$、very challenging $1,180\\pm343$、extremely challenging $2,178\\pm368$。\n- **direct-path control の主結果**: `fig:control_type_1` と `fig:distance-boxplot` では、direct-path control は lowest challenge level ではしばしば解けるが常にではない一方、very challenging と extremely challenging では POET が作った環境に届かないと著者は述べる。Mann-Whitney U tests では、challenging と very challenging の距離差、very challenging と extremely challenging の距離差がいずれも $p < 0.01$。single-sample t-test でも全 challenge levels で target からの距離が nonzero であることに $p < 0.01$ とされる。\n- **transfer の定性例**: `fig:transfer` では、flat ground の parent environment で crouching/kneeling gait に落ちた agent が、iteration 400 で stumpy child environment に移り、数百 ES iterations 後に立って stumps を jump する技能を獲得する。iteration 1,175 でその skill が parent environment に transfer back され、parent environment でも standing gait が現れる。transfer を切って original parent environment の kneeling agent を 3,000 iterations 走らせても substantive change はなかった。3,000 iterations 後の score は original kneeling gait が 309、transfer 後に最適化された gait が 349。\n- **transfer の定量結果**: RUN 1, RUN 2, RUN 3 の replacement attempts は 18,894 / 19,014 / 18,798。成功率は 53.62% / 49.26% / 48.89%。ここで成功とは、tested agents のどれかが current niche champion より良いことを意味し、direct transfer と proposal transfer の両方を含む。\n- **POET without transfer**: transfer を disabled にした POET を別に 3 runs 実行する。coverage は challenging / very challenging / extremely challenging から各 1,000、合計 3,000 environments を uniform sample し、各 sample から nearest created-and-solved environment への距離の和で評価される。POET with transfer の coverage は POET without transfer より有意に大きい、すなわち nearest-distance sum が小さいとされ、Mann-Whitney U test で $p < 2.2e{-16}$。本文は \"no extremely challenging environments are solved at all\" と述べ、`fig:disable-transfer-barplot` caption は \"no extremely challenging environments are generated\" と述べる。\n- **著者が主張する貢献**: POET は、環境生成、環境内最適化、環境間 transfer を単一 run で組み合わせる open-ended coevolution framework である。結果として、ES alone や単線的 curriculum control では到達しにくい難環境を生成・解決し、transfer がその能力に不可欠であることを示した、というのが著者の主張である。\n\n## 妥当性と限界\n\n- **この主張を支える根拠**: ES alone との比較、direct-path curriculum-building control との比較、POET without transfer との ablation が用意されている。特に ES-alone は POET が生成・解決した 5 環境に対して最大 score 17.9 / 39.6 / 13.6 / 24.0 / 19.2 にとどまり、transfer ablation では coverage が $p < 2.2e{-16}$ で悪化する。\n- **著者が認めている limitations / future work**: Discussion では、現在の 2-D obstacle-course space が direct encoding の最大値で頭打ちになると述べ、CPPN のような indirect encoding を future work とする。agent body morphology も固定で、jump できる gap width などに限界がある。reward function も固定で、環境ごとに unique reward function を作る拡張は future work とされる。\n- **読者として注意すべき点**: POET は open-ended system なので、特定 target を事前に指定して再現的に解く手法ではない。本文自身も、statistical comparisons are challenging と述べる。POET 側は unique environment に対する score が 1 つだけになるため、ES-alone 比較で single-sample t-test を使っている点は、標準的な supervised benchmark の比較とは読み方が違う。\n- **読者として注意すべき点**: direct-path curriculum-building control は比較対象として有用だが、curriculum baseline はこの 1 種類であり、より強い curriculum 設計との比較は TeX 中にはない。direct-path control に与える budget は、target に至る direct line of ancestors 全体で POET が使った ES steps を基準にするため、何を同一予算とみなすかにも注意がいる。\n- **追加で確認したい実験 / 疑問**: indirect encoding にした場合に complexity が本当に頭打ちしにくくなるか。TRPO, PPO, genetic algorithms, other variants of ES で inner-loop optimizer を替えた場合も同じ傾向が出るか。3-D parkour, soft robots, autonomous driving など discussion で挙げられた別ドメインでも、transfer ablation と direct-path curriculum 比較が同じ結論になるか。transfer 成功率だけでなく、成功 transfer の後続 performance への寄与分布も見たい。\n\n## 用語メモ\n\n一般的な辞書的定義ではなく、この論文での使われ方を中心に書く。\n\n- **POET**: Paired Open-Ended Trailblazer。environment challenges の生成と agents の最適化を pair として進め、さらに pair 間 transfer を試すアルゴリズム。\n- **environment-agent pair**: ひとつの環境 $E(\\cdot)$ と、その環境を解くために paired された agent parameter vector $\\theta$ の組。\n- **`EA_list`**: active な environment-agent pairs のリスト。`POET Main Loop` (`alg:poet`) の中心データ構造。\n- **open-ended**: 事前に決めた単一の target に向かうのではなく、新しく複雑な environments と capabilities が継続的に出ること。\n- **stepping stone**: 後の環境や能力に役立つ可能性がある中間環境または中間 agent。どれが役立つかは事前に分からないという前提が transfer の理由になる。\n- **Minimal Criterion (MC)**: 子環境を受け入れるための基準。本論文の実験では $50 \\leq E^{\\textrm{child}}(\\theta^{\\textrm{child}}) \\leq 300$。\n- **reproduction eligibility**: 環境が child environment を作る資格。本実験では paired agent の reward が 200 以上。\n- **encoding / genes**: 環境を表す数値表現。Bipedal Walker では stump height, gap width, step height, step number, roughness のパラメータと seed で環境を定義する。\n- **novelty**: 子環境の encoding が active population と archive からどれだけ離れているか。Supplemental Information では $k=5$ の k-nearest neighbors に対する平均 $L2$ 距離。\n- **archive**: 以前 active population に入ったが、現在は active でない環境も含む記録。novelty 計算の比較対象に使われる。\n- **ES**: 本実装の optimizer。noise を加えた多数の parameter vectors を評価し、reward が高い方向へ parameter を更新する。\n- **transfer**: 他の環境で学んだ agent を target environment で評価し、現在の agent より良ければ置換すること。\n- **direct transfer**: `EVALUATE_CANDIDATES` で、候補 agent が target environment 上の 1 ES step なしで置換に成功する場合。\n- **proposal transfer**: 候補 agent を target environment で 1 ES step 進めた proposal が置換に成功する場合。\n- **direct-path curriculum-building control**: flat ground から target environment まで、obstacle parameters を target 側へ少しずつ増やす単線的 curriculum baseline。\n- **challenging / very challenging / extremely challenging**: `challenge-table` の 3 条件のうち、1 / 2 / 3 個を満たす難度ラベル。条件は stump height top value $\\geq2.4$、gap width top value $\\geq6.0$、roughness $\\geq4.5$。\n- **coverage**: sample した環境群から、POET が created and solved した近傍環境までの距離で、環境空間をどれだけカバーしたかを見る指標。nearest-distance sum が低いほど coverage が良い。\n\n## 読む順番の提案\n\n- まず `main.tex` の abstract と Introduction 末尾を読む。ここで、POET の 4 つの主張、すなわち ES alone では解けない、direct-path curriculum でも届きにくい、transfer が重要、多様な環境が単一 run で生成・解決される、を確認する。正規ノートの `Summary（著者の主張）` に対応する。\n- 次に Section 3 `The Paired Open-Ended Trailblazer (POET) Algorithm` と `POET Main Loop` (`alg:poet`) を読む。`EA_list`、mutation、ES optimization、transfer の流れを押さえる。正規ノートの「手法」部分につながる。\n- その後 Supplemental Information の `MUTATE_ENVS` と `EVALUATE_CANDIDATES` を読む。MC、novelty ranking、direct transfer / proposal transfer はここで具体化される。正規ノートの transfer と novelty の記述を裏取りできる。\n- 実験は Section 4.1 と `env-mutation-table` から読む。reward、solved threshold 230、agent architecture、environment encoding を確認してから、`fig:comparison_naive_control` / `fig:challenging_envs` / `fig:compare-poet-es` の ES-alone 比較、`challenge-table` と `fig:control_type_1` / `fig:distance-boxplot` の direct-path control 比較、`fig:transfer` / `fig:disable-transfer-barplot` の transfer 分析へ進む。\n- 最後に Discussion を読む。direct encoding の上限、fixed body morphology、fixed reward function、alternative optimizers、meta-learning や他ドメインへの拡張が、正規ノートの `Critical Thoughts（評価・疑問）` と `次に試したいこと` に対応する。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-1901.01753v3/`\n- 正規ノート: `notes/arXiv-1901.01753v3.md`\n";
