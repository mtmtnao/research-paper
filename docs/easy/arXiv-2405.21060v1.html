const RAW = "# Transformers are SSMs: Generalized Models and Efficient Algorithms Through Structured State Space Duality（SSM と attention を半分離行列で接続し Mamba-2 を導く研究）\n\n- arXiv: https://arxiv.org/abs/2405.21060\n- 一次ソース: ../papers/arXiv-2405.21060v1/\n- 正規ノート: ../notes/arXiv-2405.21060v1.md\n\n---\n\n## 一言で言うと\n\nこの論文は、選択的 SSM と kernel/linear attention 系の計算を、半分離行列 (semiseparable matrix) という構造化行列を介して同じ枠組みで捉える Structured State Space Duality (SSD) を提案する。さらに、この双対性から行列積中心の SSD アルゴリズムと Mamba-2 アーキテクチャを作り、Mamba の selective scan より 2-8x 高速で、Pile 上の言語モデリングでも Mamba や Transformer++ と競合・上回ることを示す。\n\n## 何を議論する論文か\n\n- **問題設定**: Transformer は学習時に系列長に対して二次計算量を持ち、自己回帰生成では系列長に比例する cache を必要とする。一方、Mamba などの structured state-space models (SSMs) は学習時に線形スケール、生成時に定数状態を持つが、Transformer 側で発達した理論・設計語彙・matmul による高速化から切り離されていた、という問題を扱う。\n- **対象範囲 / 仮定**: 主な対象は causal/autoregressive な sequence transformation であり、論文中で SSM と呼ぶものは structured SSM を指す。SSD の中心モデルは selective SSM のうち $A_t$ を scalar times identity に制限したものと、1-semiseparable mask を持つ structured masked attention の交差部分である。標準 softmax attention 全体を一般化するとは主張していない。\n- **既存研究との差分**: Linear Attention は kernel attention と線形 recurrence の双対性を示したが、この論文は semiseparable matrix によって、SSM、structured masked attention (SMA)、効率的自己回帰 attention をより広く接続する。Mamba からは、$A_t$ の構造を diagonal から scalar-identity に制限する代わりに、matmul 中心の高速アルゴリズムと大きい state expansion を得る。\n- **この論文で答えたい問い**: SSM と attention はどの意味で同じ構造の別表現なのか、その構造を使うとどのような高速アルゴリズムとアーキテクチャ設計が得られるのか、そして Mamba-2 は速度・言語モデル性能・synthetic recall task で既存手法に対して有効か、を検証する。\n\n## 背景と前提\n\n- **SSM / selective SSM**: SSM は内部状態 $h_t$ を更新しながら系列を処理するモデルである。Mamba の selective SSM では $A_t,B_t,C_t$ が時刻ごと、つまり入力依存に変化し、情報密度の高い言語データで LTI SSM より良いとされる。ただし Mamba の selective scan は matmul unit を直接活用しにくい、というのが本論文の出発点である。\n- **sequence transformation と matrix transformation**: 論文は、系列変換を $Y=f_\\theta(X)$、さらに場合によっては $Y=MX$ と表せる matrix transformation として扱う。これにより、SSM も attention も「系列軸 $\\mathtt{T}$ 上の行列 $M$ による変換」として比較できる。\n- **semiseparable matrix**: 下三角部分に含まれる任意の部分行列の rank が高々 $\\mathtt{N}$ の行列を $\\mathtt{N}$-semiseparable と呼ぶ（`def:semiseparable-rank`）。SSM の状態サイズ $\\mathtt{N}$ が、この rank 構造の order と対応する。\n- **kernel / linear attention**: 標準 softmax attention のうち softmax の指数部分を feature map で扱うと、kernel attention として書ける。Linear Attention は $(QK^\\top)V=Q(K^\\top V)$ の結合順序を変え、causal mask の cumsum 構造を使って線形時間 recurrence を得る。\n- **structured masked attention (SMA)**: 本論文は、causal mask だけでなく任意の structured matrix $L$ を mask とする attention を SMA と定義する（`def:sma`）。$L$ が高速な行列積を持てば、attention 側にも線形・準線形の dual form が生じる。\n- **baseline との関係**: 言語モデルでは Mamba、Transformer++、Pythia、RWKV4、Hybrid H3 などと比較する。速度では Mamba の fused associative scan と FlashAttention-2 と比較する。MQAR では standard multi-head softmax attention と Based architecture も baseline に入る。\n\n## 提案手法\n\n### コアアイデア\n\n中心は「SSM を recurrence としてだけでなく、semiseparable matrix multiplication として見る」ことである。SSM の recurrent form は半分離行列を線形時間で掛けるアルゴリズム、attention 風の quadratic form は同じ行列を明示的に作って掛けるアルゴリズムとして解釈できる。\n\nこの見方から、論文は 3 つの接続を作る。第一に、SSM は sequentially semiseparable (SSS) 表現を持つ行列と同一である（`thm:ssm-sss`）。第二に、masked kernel attention を 4-way tensor contraction と見て、mask $L$ を structured matrix に一般化する SMA を定義する。第三に、$A_t=a_t I$ の scalar-identity SSM と、1-semiseparable mask を持つ SMA が同じ linear/quadratic form を共有することを SSD と呼ぶ。\n\nアルゴリズム上は、semiseparable matrix $M$ を $\\mathtt{Q}\\times\\mathtt{Q}$ chunk に分ける。対角 block は attention 風の二次形式で matmul により計算し、非対角 block は semiseparable matrix の低 rank 分解により、chunk 間の小さい recurrence に落とす。この結果、計算の大半が batched matrix multiplication になる。\n\nMamba-2 はこの SSD layer を中心に、$A,X,B,C$ を block の先頭で並列 projection し、出力 projection 直前に extra normalization を置き、$B,C$ を $X$ heads 間で共有する Multi-Input SSM / Multi-Value Attention (MIS/MVA) pattern を使う。\n\n### 重要な定義・数式\n\n$$\nh_t = A_t h_{t-1} + B_t x_t,\\qquad y_t = C_t^{\\top} h_t\n$$\n\n**式の意味**: Mamba の selective SSM に対応する基本 recurrence（`eq:s6`）である。時刻 $t$ の入力 $x_t$ を $B_t$ で状態へ展開し、過去状態を $A_t$ で遷移させ、$C_t$ で出力へ縮約する。\n\n**記号の定義**:\n- $x_t$ ... 時刻 $t$ の入力。単一系列の場合は scalar、一般には head dimension $\\mathtt{P}$ を持つ入力の各 channel として扱われる。\n- $h_t$ ... SSM の内部状態。\n- $A_t$ ... recurrent state matrix。selective SSM では時刻ごとに変わる。\n- $B_t$ ... input projection / expansion matrix。\n- $C_t$ ... output projection / contraction matrix。\n\n**この論文での役割**: 論文全体の出発点であり、Mamba との接続、semiseparable matrix 表現、SSD の scalar-identity 制約を説明する基礎になる。\n\n$$\ny_t = \\sum_{s=0}^t C_t^{\\top} A_{t:s}^{\\times} B_s x_s,\\qquad\ny = \\mathsf{SSM}(A,B,C)(x)=Mx,\\qquad\nM_{ji} \\coloneqq C_j^{\\top} A_j\\cdots A_{i+1}B_i\n$$\n\n**式の意味**: SSM の recurrence を展開し、系列全体の変換を行列 $M$ による $y=Mx$ として書いた式（`eq:ssm-matrix`）である。$M_{ji}$ は、時刻 $i$ の入力が時刻 $j$ の出力へ届く重みを表す。\n\n**記号の定義**:\n- $M$ ... 系列軸 $\\mathtt{T}$ 上の matrix transformation。\n- $M_{ji}$ ... $i$ から $j$ への影響係数。causal なので基本的に $j\\ge i$ の下三角側を見る。\n- $A_{t:s}^{\\times}$ ... 論文の Python-style indexing に基づく $A_t A_{t-1}\\cdots A_{s+1}$ 型の積。\n- $\\mathsf{SSM}(A,B,C)$ ... `def:ssm` で定義される SSM operator。\n\n**この論文での役割**: `thm:ssm-sss` の核であり、SSM が $\\mathtt{N}$-semiseparable matrix の SSS 表現と同一であることを示す。以後の SSD algorithm は、この $M$ をどう効率よく掛けるかという問題に帰着される。\n\n$$\nY = \\mathsf{contract}(\\mathtt{TN},\\mathtt{SN},\\mathtt{SP},\\mathtt{TS}\\to\\mathtt{TP})(Q,K,V,L)\n$$\n\n**式の意味**: Structured Masked Attention (SMA) の定義（`def:sma`）である。通常の masked kernel attention $Y=(L\\circ(QK^\\top))V$ を、$Q,K,V,L$ の 4-way tensor contraction として書く。\n\n**記号の定義**:\n- $Q$ ... query matrix、shape は $\\mathtt{(T,N)}$。\n- $K$ ... key matrix、shape は $\\mathtt{(S,N)}$。\n- $V$ ... value matrix、shape は $\\mathtt{(S,P)}$。自己 attention では主入力と見なされる。\n- $L$ ... mask matrix、shape は $\\mathtt{(T,S)}$。SMA では任意の structured matrix として扱う。\n\n**この論文での役割**: attention 側の一般化である。contraction の順序を変えることで、quadratic mode（通常の masked attention）と linear mode（structured matrix multiplication を使う形）を同じ関数の異なるアルゴリズムとして扱える。\n\n$$\nL \\coloneqq \\mathsf{1SS}(a),\\qquad\nM = L \\circ (CB^{\\top}),\\qquad\nY = (L\\circ(CB^{\\top}))X\n$$\n\n**式の意味**: $A_t=a_t I$ の scalar-identity SSM を quadratic attention 風に書いた SSD の中心式である（`sec:ssd:quadratic-ssm`, `eq:ssm-quad`）。$CB^\\top$ は attention の Gram matrix $QK^\\top$ に対応し、$L$ は 1-semiseparable mask に対応する。\n\n**記号の定義**:\n- $a_t$ ... scalar-identity SSM の scalar recurrent factor。\n- $\\mathsf{1SS}(a)$ ... $a$ から作られる 1-semiseparable lower-triangular matrix。\n- $B,C$ ... SSM 側の expansion / contraction matrix。SSD の対応表では $B$ が keys、$C$ が queries に対応する。\n- $X$ ... SSM 側の入力系列。attention 側の values に対応する。\n\n**この論文での役割**: SSM と structured masked attention が同じ式になる場所を示す。`cor:1ss-sma` は 1-SS SMA が scalar-identity diagonal SSM の特殊例であることを述べ、`thm:ss-sma` は bounded-order の効率的自己回帰 SMA では mask $L$ が semiseparable でなければならない、と主張する。\n\n$$\n\\mathtt{N}=\\mathtt{P}=\\mathtt{Q}\n\\quad\\Longrightarrow\\quad\n\\text{training FLOPs}=O(\\mathtt{T}\\mathtt{N}^2),\\qquad\n\\text{memory}=O(\\mathtt{T}\\mathtt{N})\n$$\n\n**式の意味**: SSD algorithm の total cost の要点である（`sec:efficient`, `thm:algorithm`, `tab:compute`）。state dimension $\\mathtt{N}$、head dimension $\\mathtt{P}$、chunk length $\\mathtt{Q}$ を揃えると、主要な batched matrix multiplication がすべておおむね $(\\mathtt{N},\\mathtt{N})$ サイズになる。\n\n**記号の定義**:\n- $\\mathtt{T}$ ... sequence length / time axis。\n- $\\mathtt{N}$ ... state expansion factor / state dimension。\n- $\\mathtt{P}$ ... head dimension。\n- $\\mathtt{Q}$ ... SSD algorithm の chunk length。\n\n**この論文での役割**: Mamba-2 の速度主張を支える。通常の SSM と同じ $O(\\mathtt{T}\\mathtt{N}^2)$ training FLOPs を保ちながら、計算を matmul unit に載せることで、Mamba の scan 実装より速いという実験結果につながる。\n\n### 実装 / アルゴリズム上の要点\n\n- step1: 入力系列を length $\\mathtt{Q}$ の chunk に分け、semiseparable matrix $M$ を block matrix として見る。\n- step2: 対角 block は chunk 内の入力だけを使う小さい SSM として扱い、SSD の quadratic/SMA form で並列に計算する。\n- step3: 非対角 block は $B$-block-factors、$A$-block-factors、$C$-block-factors の 3 つに低 rank 分解する。\n- step4: $B$ 側で各 chunk の final state を計算し、$A$ 側で chunk 間の 1-SS recurrence を計算し、$C$ 側でその state を chunk 内出力へ戻す。\n- step5: 対角 block の出力と非対角 block の出力を足す。`structure/code.py` の `ssd` 関数では `Y_diag + Y_off` として実装されている。\n- step6: Mamba-2 block では $A,X,B,C$ を入力 $u$ から並列に作る。これにより tensor parallelism で block あたりの all-reduce を Mamba-1 の 2 回から 1 回に減らす設計になる（`sec:systems`, `fig:mamba2_parallelism`）。\n\n## 実験・結果\n\n- **データセット / ベンチマーク**: MQAR (multi-query associative recall)、Pile 上の autoregressive language modeling、Pile validation perplexity、zero-shot downstream evaluation を使う。downstream は LAMBADA、HellaSwag、PIQA、ARC-easy、ARC-challenge、WinoGrande、OpenBookQA で、LM evaluation harness を用いる（`sec:exp-details`）。\n- **比較対象 / baseline**: MQAR では standard multi-head softmax attention と Based architecture を含む。言語モデルでは Mamba、Transformer++、Pythia、RWKV4、Hybrid H3、GPT-Neo、OPT、GPT-J などが表に出る。速度では Mamba fused associative scan と FlashAttention-2 と比較する。\n- **指標**: Pile ppl と LAMBADA ppl は低いほど良く、各 zero-shot task の accuracy と Average は高いほど良い。速度 benchmark では wall-clock speed、scaling law では perplexity、theoretical FLOPs、actual wall-clock time を見る。\n- **主な結果**: SSD は state expansion $N=64$ の large state で Mamba fused scan より 2-8x 速く、sequence length 2k 以上で FlashAttention-2 より速い（`fig:scan_benchmark`）。Introduction では 16K で FlashAttention-2 より 6x faster と述べる。\n- **主な結果**: MQAR では、Mamba-2 が Mamba-1 より大きく良く、figure caption では vanilla attention も上回るとされる（`fig:mqar`）。著者は、state size を $\\mathtt{N}=16$ から $\\mathtt{N}=64,256$ へ増やすと性能が一貫して改善すると述べる。ただし、同じ $\\mathtt{N}=16$ でも Mamba-2 が Mamba-1 より良い理由については、著者自身が predominant factor は不明で future work としている。\n- **主な結果**: Scaling law 実験では、$\\approx125M$ から $\\approx1.3B$ の Pile 学習で、Mamba-2 は Mamba と Transformer++ に対して perplexity、theoretical FLOPs、wall-clock time の観点で Pareto dominant とされる（`fig:lm-scaling`）。\n- **主な結果**: `table:downstream_zeroshot` では、Mamba-2-2.7B が Pile ppl 6.09、Average 60.2 を示し、Mamba-2.8B の 6.22 / 59.9、Pythia-2.8B の 6.73 / 55.7 を上回る。appendix の full table では Pythia-6.9B が 6.51 / 58.3 なので、この表の範囲では Mamba-2-2.7B は Pythia-6.9B も上回る。\n- **主な結果**: Hybrid 実験では、350M・48 layers・7B tokens の設定で、attention block 0 個の Mamba-2 が ppl 8.60、6 個の attention block が 8.26 で最良、Transformer++ が 8.68 である（`tab:ssd_attn`）。2.7B・300B tokens では Mamba-2-Attention が Pile ppl 5.95、Average 61.0 で、Mamba-2 の 6.09 / 60.2 と Transformer++ の 6.13 / 60.2 を上回る（`table:hybrid_eval`）。\n- **主な結果**: Block design ablation では、Mamba-1 型 block（sequential projections、extra normalization なし）が ppl 11.76、Mamba-2 型 block（parallel projections、extra normalization あり）が ppl 11.49 である（`tab:ablations-architecture`）。\n- **主な結果**: Head structure ablation では、125M 設定で Multi-input SSM / Multi-value Attention (MIS/MVA) が ppl 11.66、MCS/MQA が 12.62、MES/MKA が 12.59、MHS が 12.06 であり、360M 設定でも MIS/MVA が 8.73 で最良である（`tab:ablations-heads`）。\n- **主な結果**: Kernel approximation ablation では、none 11.58、Swish 11.66、Exp 11.62、ReLU 11.73、Random Feature Attention 11.57、Performer 12.21 などであり、著者は試した kernel approximation methods が単純な pointwise non-linear activation を有意に改善しなかった、と述べる（`tab:ablations-kernel`, `tab:ablations-kernel-based`）。\n- **著者が主張する貢献**: SSM と attention を semiseparable matrix でつなぐ SSD 理論、block decomposition による hardware-efficient SSD algorithm、Mamba-2 architecture、Pile と MQAR と speed benchmark による empirical validation、少数 attention layer を混ぜる hybrid の有効性である。\n\n## 妥当性と限界\n\n- **この主張を支える根拠**: 理論面では、SSM と SSS/semiseparable matrix の同一性（`thm:ssm-sss`）、1-SS SMA と scalar-identity SSM の対応（`cor:1ss-sma`）、効率的 autoregressive SMA の mask が semiseparable であるという主張（`thm:ss-sma`）が、SSM と attention の接続を支える。\n- **この主張を支える根拠**: アルゴリズム面では、block decomposition により diagonal block を attention-like matmul、off-diagonal block を low-rank factorization + small recurrence に分けることで、`tab:compute` の計算量と matmul 利用の主張につなげている。\n- **この主張を支える根拠**: 実験面では、速度、MQAR、Pile scaling laws、downstream zero-shot、hybrid、architecture/head/kernel ablation が分かれており、単なる perplexity だけでなくシステム効率と設計選択も検証している。\n- **著者が認めている limitations / future work**: SSD は standard softmax attention を一般化しない。TeX では \"does not generalize standard softmax attention\" と明記され、有限 feature map $\\psi$ を持たない attention kernel transformation は対象外である（`sec:related:attention`）。\n- **著者が認めている limitations / future work**: SSD は Mamba より $A_t$ の表現力を制限する。Mamba の diagonal $A_t$ に対して、SSD は scalar-identity form を使い、expressivity と hardware efficiency / ease of implementation を交換している（`sec:related:ssm`）。著者は general diagonal SSM case へ structured matrix algorithms を refined できる可能性を future work として述べる。\n- **著者が認めている limitations / future work**: MQAR で同じ state size にしても Mamba-2 が Mamba-1 を上回る理由について、著者はどの architectural aspect が主因か分からないと書いている（`sec:experiments:mqar`）。\n- **読者として注意すべき点**: SSD layer 単体が FlashAttention-2 より速くても、Mamba-2 model 全体が短系列で Transformer より常に速いとは限らない。著者は sequence length 2K などでは、Transformer が $L/2$ MLP + $L/2$ attention であるのに対し、Mamba-2 は $L$ SSD layers を持つため、全体の training efficiency は別問題だと述べる（`sec:experiments:benchmark`）。\n- **読者として注意すべき点**: Hybrid の「約 10% attention が良い」という結果は、350M・48 layers・7B tokens と 2.7B・300B tokens の実験に基づく。長い context や別データ分布で同じ比率が最適かは、この TeX 中では検証されていない。\n- **追加で確認したい実験 / 疑問**: Mamba-2 の MQAR 改善を、SSD layer、parallel projections、extra normalization、MIS/MVA head pattern、state size の各要因に分けて検証したい。\n- **追加で確認したい実験 / 疑問**: 8K、16K、32K などの長い sequence length で、pure Mamba-2、Mamba-2-Attention、Transformer++ の perplexity / wall-clock / memory の Pareto を同じ training token budget で比較したい。\n- **追加で確認したい実験 / 疑問**: scalar-identity $A_t$ から diagonal $A_t$ へ戻した場合に、どの程度 matmul-friendly な block algorithm が可能かを確認したい。\n\n## 用語メモ\n\n一般的な辞書的定義ではなく、この論文での使われ方を中心に書く。\n\n- **SSM (state space model)** ... 本論文では structured SSM を指す。基本形は `eq:s6` の recurrence で、状態サイズ $\\mathtt{N}$ を持つ。\n- **selective SSM** ... $A,B,C$ が時刻ごとに変わる SSM。Mamba で導入された形で、入力ごとに focus / ignore を選べると説明される。\n- **semiseparable matrix** ... 下三角部分の任意の部分行列の rank が高々 $\\mathtt{N}$ である行列。SSM の matrix transformation はこの構造を持つ。\n- **SSS (sequentially semiseparable) representation** ... $M_{ji}=C_j^\\top A_j\\cdots A_{i+1}B_i$ という表現。SSM recurrence を行列として書いたものと同じ形になる。\n- **1-SS matrix** ... 1-semiseparable matrix。scalar recurrence $y_t=a_t y_{t-1}+x_t$ と対応し、SSD の mask $L$ の中心になる。\n- **SMA (structured masked attention)** ... mask $L$ を structured matrix とする masked kernel attention。標準 linear attention は causal mask の特殊例として扱われる。\n- **SSD (structured state space duality)** ... scalar-identity SSM と 1-SS SMA が同じ linear / quadratic form を持つ、という本論文の双対性の枠組み。\n- **state expansion factor $\\mathtt{N}$** ... SSM の state dimension。Mamba 系では情報を保持する容量と計算量の両方に関わる。\n- **head dimension $\\mathtt{P}$** ... 各 head の入力・出力 channel の幅。Mamba-2 では $\\mathtt{P}=64$ や $128$ が典型と述べられる。\n- **MIS / MVA** ... Multi-input SSM / Multi-value Attention。$X$ は head ごとに分け、$B,C$ は共有する head pattern。Mamba の元々の構造を SSD/attention の語彙で再記述したもの。\n- **GVA / GIS** ... grouped-value attention / grouped-input SSM。MIS/MVA を group 化し、tensor parallelism に合わせやすくする発想。\n- **Transformer++** ... Mamba 論文由来の強い Transformer recipe。rotary embedding、SwiGLU MLP、RMSNorm、no linear bias、高い learning rate などを含む。\n- **MQAR** ... multi-query associative recall。複数の key-value association を覚え、query に対して value を返す synthetic task。SSM の有限状態容量が問題になりやすい task として使われる。\n- **Tensor Parallelism (TP)** ... layer の重み・計算を複数 GPU に分ける手法。Mamba-2 は $A,B,C$ を入力 $u$ から直接 projection することで、block 内 all-reduce を 1 回にする設計になっている。\n- **Sequence / Context Parallelism** ... 長系列を系列軸で分割する手法。SSM では各 device が final state を次に渡す形で扱え、attention より通信が単純になると説明される。\n\n## 読む順番の提案\n\n- まず `structure/abstract.tex` と `structure/intro.tex` を読み、著者が問題にしている「SSM と Transformer の理論・システム最適化の分断」と、SSD / Efficient Algorithms / Architecture Design / Systems Optimizations / Empirical Validation の全体像を掴む。正規ノートでは Summary の前半に対応する。\n- 次に `structure/background.tex` の `eq:s6`、sequence transformation、matrix transformation、attention、structured matrices の定義を確認する。ここを飛ばすと、後の $\\mathtt{T},\\mathtt{N},\\mathtt{P}$ や $M,L,Q,K,V$ の対応が読みにくい。\n- その後 `structure/ssm.tex` の `eq:ssm-matrix`、`def:semiseparable-rank`、`def:sss`、`thm:ssm-sss` を読む。正規ノートの「SSM = semiseparable matrix multiplication」という Takeaway に直結する。\n- 次に `structure/attention.tex` の `eq:sha` と `def:sma` を読む。linear attention を単なる近似手法ではなく、contraction order の違いとして見る箇所である。\n- 続いて `structure/ssd.tex` の `eq:ssm-quad`、`cor:1ss-sma`、`thm:ss-sma`、`fig:ssd` を読む。ここが SSM と attention の交差部分、つまり SSD の本体である。\n- 実装や速度が気になる場合は `structure/efficient.tex` の `thm:algorithm`、block decomposition、`listing`、`tab:compute` を読む。正規ノートの「$\\mathtt{N}=\\mathtt{P}=\\mathtt{Q}$ に揃える」説明につながる。\n- アーキテクチャを追う場合は `structure/architecture.tex` の `fig:architecture`、parallel projections、extra normalization、`prop:mamba-multihead`、MIS/MVA を読む。正規ノートの Mamba-2 block と head pattern の記述に対応する。\n- 実験は `structure/experiments.tex` の `fig:scan_benchmark`、`fig:mqar`、`fig:lm-scaling`、`table:downstream_zeroshot`、`tab:ssd_attn`、`table:hybrid_eval`、`tab:ablations-architecture`、`tab:ablations-heads` を優先する。細かい training recipe と full zero-shot table は `structure/experiment_details.tex` を見る。\n- 最後に `structure/related.tex` の SSM / structured matrices / linear attention 節を読み、SSD が softmax attention を一般化しないこと、scalar-identity $A_t$ の制約、copying / in-context learning との未解決な関係を確認する。正規ノートの Critical Thoughts と Notes / Quotes に対応する。\n\n## もとの論文・正規ノート\n\n- 論文 TeX: `papers/arXiv-2405.21060v1/`\n- 正規ノート: `notes/arXiv-2405.21060v1.md`\n";
